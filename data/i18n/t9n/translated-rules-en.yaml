alimentation . déchets . gestes . acheter en vrac . présent:
  note: |
    Unfortunately, at this stage we don't have any data that would enable us to average out the footprint gains that this practice represents. As far as fruit and vegetables are concerned, the gain is clear and indisputable. In the case of 'normally packaged' products, an <a href="https://librairie.ademe.fr/consommer-autrement/5064-panorama-et-evaluation-environnementale-du-vrac-en-france.html">ADEME study</a> of 10 of them shows that the gain is very significant for liquids (especially those in glass bottles), and less so for cereals (for which packaging reduction work has not yet been completed throughout the distribution chain). 
    But the context is changing fast, and all the faster as consumers get on board, so let's embrace bulk and participate in the evolution of distribution chains.
  note.auto: |
    Unfortunately, at this stage we don't have any data that would enable us to average out the footprint gains that this practice represents. As far as fruit and vegetables are concerned, the gain is clear and indisputable. In the case of 'normally packaged' products, an <a href="https://librairie.ademe.fr/consommer-autrement/5064-panorama-et-evaluation-environnementale-du-vrac-en-france.html">ADEME study</a> of 10 of them shows that the gain is very significant for liquids (especially those in glass bottles), and less so for cereals (for which packaging reduction work has not yet been completed throughout the distribution chain). 
    But the context is changing fast, and all the faster as consumers get on board, so let's embrace bulk and participate in the evolution of distribution chains.
  note.lock: |
    Malheureusement, à ce stade, nous ne disposons pas de données permettant de moyenner le gain d’empreinte que cette pratique représente. Du côté des fruits et légumes, c’est un gain net et indiscutable. Sur les produits “normalement emballés”, une [étude ADEME](https://librairie.ademe.fr/consommer-autrement/5064-panorama-et-evaluation-environnementale-du-vrac-en-france.html) portant sur 10 d’entre eux montre que le gain est très important sur les liquides (surtout ceux que l’on trouve dans des bouteilles en verre), moins sur les céréales (dont le travail de réduction d’emballage n’a pas encore été réalisé sur toute la chaîne de distribution). 
    Mais le contexte évolue vite, et d’autant plus vite que les consommateurs et consommatrices s’y mettent, donc adoptons le vrac et participons à l’évolution des chaînes de distribution.
  question: Do you buy in bulk?
  question.auto: Do you buy in bulk?
  question.lock: Achetez-vous en vrac ?
  titre: present
