    the consumption is already included in the electricity bill of the home.
    However, if it is taken in a café, the consumption footprint must be
    added. We have chosen not to include the consumption of hot drinks (the
    share linked to consumption being negligible for coffee and hot
    chocolate before coffee beans or cocoa)
  note.auto: |
    For the footprint of a cup of coffee or hot chocolate, the portion related to consumption (heating of the water in particular) is not taken into account in the emission factor
    this is not the case for the tea emission factor from Agribalyse. If the drink is drunk at home, the consumption is already included in the electricity bill of the home.
    However, if it is taken in a café, the consumption footprint must be added.
    We choose not to include the consumption in the hot drinks
    (the share linked to consumption being negligible for coffee and hot chocolate before coffee beans or cocoa)
  note.lock: |
    Pour l'empreinte d'une tasse de café ou chocolat chaud, la part liée à la consommation (chauffage de l'eau notamment) n'est pas prise en compte dans le facteur d'émission
    ce qui n'est pas le cas du facteur d'émission du thé issu d'Agribalyse. Si la boisson est bue à domicile, la consommation est déjà incluse dans la facture électrique du logement.
    En revanche, si elle est prise dans un café, l'empreinte de la consommation doit être ajoutée.
    Nous faisons le choix de ne pas inclure la consommation dans les boissons chaudes
    (la part liée à la consommation étant négligeable pour le café et chocolat chaud devant les grains de café ou le cacao)
