transport . ferry . empreinte moyenne . durée moyenne par français:
  titre: average time per French person
  titre.auto: average time per French person
  titre.lock: durée moyenne par français
  note: |
    According to <a href="https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transport-2021/17-transport-maritime-de-voyageurs">SDES</a> figures,
    around 22.9 million passengers, excluding cruise passengers, embarked and disembarked in mainland France in 2019 (2020 excluded as COVID year not representative).

    Nevertheless, we don't know the proportion of unique travelers, nor whether these are French travelers... Let alone the distance travelled.

    Ferry journeys are mainly on the Channel / North Sea, which can be approximated to "Cherbourg-Poole" journeys (8h return).

    We are therefore making a strong assumption here, estimating that 10 million French people travel by ferry each year, for an average duration of 8 hours.
  note.auto: |
    According to <a href="https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transport-2021/17-transport-maritime-de-voyageurs">SDES</a> figures,
    around 22.9 million passengers, excluding cruise passengers, embarked and disembarked in mainland France in 2019 (2020 excluded as COVID year not representative).

    Nevertheless, we don't know the proportion of unique travelers, nor whether these are French travelers... Let alone the distance travelled.

    Ferry journeys are mainly on the Channel / North Sea, which can be approximated to "Cherbourg-Poole" journeys (8h return).

    We are therefore making a strong assumption here, estimating that 10 million French people travel by ferry each year, for an average duration of 8 hours.
  note.lock: |
    Selon les chiffres du [SDES](https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transport-2021/17-transport-maritime-de-voyageurs),
    environ 22,9 millions de voyageurs, hors croisiéristes, ont embarqués et débarqués en France métropolitaine en 2019 (2020 exclu car année COVID non représentative).

    Néanmoins, on ne connaît pas la propotion de voyageurs uniques, ni si ce sont des voyageurs français... Encore moins la distance que les voyageurs parcourent.

    Les trajets en ferry sont majoritairement effectués sur la Manche / mer du Nord, que l'on peut approximer à des voyages "Cherbourg-Poole" (8h aller-retour).

    On fait donc une hypothèse forte ici en estimant que 10 millions de français voyagent en ferry chaque année pour une durée moyenne de 8 heures.
transport . ferry . empreinte:
  titre: footprint
  titre.auto: footprint
  titre.lock: empreinte
  description: |
    The ferry model comes from <a href="https://futur.eco/ferry">Futur.eco</a>.
    This model is explained in simplified form on the <a href="https://nosgestesclimat.fr/documentation/transport/ferry/empreinte-par-km-volume">"Footprint per km and passenger"</a> page, and is based on an in-depth study <a href="https://hackmd.io/@laem/empreinte-ferry">(see the complete methodological note</a>)

    In order to simplify the assessment of the user's footprint, we propose an estimate based on travel time (in hours). We then set the other calculation parameters as such:
      - Cabin travel
      - One car on board
      - 2 people share cabin, car
      - Ferry model considered (layout, average speed): <a href="https://www.greenferries.org/ships/mega-express-four-9086590/">Mega Express Four</a>
  description.auto: |
    The ferry model comes from <a href="https://futur.eco/ferry">Futur.eco</a>.
    This model is explained in simplified form on the <a href="https://nosgestesclimat.fr/documentation/transport/ferry/empreinte-par-km-volume">"Footprint per km and passenger"</a> page, and is based on an in-depth study <a href="https://hackmd.io/@laem/empreinte-ferry">(see the complete methodological note</a>)

    In order to simplify the assessment of the user's footprint, we propose an estimate based on travel time (in hours). We then set the other calculation parameters as such:
      - Cabin travel
      - One car on board
      - 2 people share cabin, car
      - Ferry model considered (layout, average speed): <a href="https://www.greenferries.org/ships/mega-express-four-9086590/">Mega Express Four</a>
  description.lock: |
    Le modèle ferry provient de [Futur.eco](https://futur.eco/ferry).
    Ce modèle est explicité de manière simplifiée sur la page ["Empreinte par km et passager"](https://nosgestesclimat.fr/documentation/transport/ferry/empreinte-par-km-volume), et basé sur une étude approfondie ([voir la note méthodo complète](https://hackmd.io/@laem/empreinte-ferry))

    Afin de simplifier pour l'utilisateur l'évaluation de son empreinte, nous proposons une estimation via la durée des voyages (en heure). Nous fixons ainsi les autres paramètres du calcul comme tels:
      - Voyage en cabine
      - Une voiture à bord
      - 2 personnes partagent la cabine, la voiture
      - Modèle de ferry considéré (plan, vitesse moyenne) : [Méga Express Four](https://www.greenferries.org/ships/mega-express-four-9086590/)
