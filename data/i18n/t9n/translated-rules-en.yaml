divers . numérique . appareils . allongement:
  description: |
    **Did you know?

    On average, 80% of the footprint of a digital device comes from its manufacture. The usage part (consumption of electricity to power it, or to generate data flows) is really secondary to the "construction of the device" part. Whether in terms of carbon footprint or water footprint!

    Unfortunately, these objects are the target of a race to obsolescence that encourages us to replace them long before they are really useless. This may be due to hardware (the device no longer accepts updates, the battery fails too quickly, etc.) or marketing (the new model takes photos with a few more pixels). But it is possible, and essential, to extend the lifespan of our devices to reduce the colossal digital footprint on our planet.

    To do this, there are a number of good practices you can adopt:
      - Buy reconditioned: you'll often benefit from the same warranty
      - Get repairs done: the repair bonus is designed to make repairs more affordable
      - Find out the reparability index of the appliance you are buying: from the French <a href="https://www.indicereparabilite.fr">government</a> (via Spareka), or from <a href="https://fr.ifixit.com/reparabilite">iFixIt</a>.
      - Join the association that fights against programmed obsolescence: <a href="https://www.halteobsolescence.org/">HOP</a>.
  description.auto: |
    **Did you know?

    On average, 80% of the footprint of a digital device comes from its manufacture. The usage part (consumption of electricity to power it, or to generate data flows) is really secondary to the "construction of the device" part. Whether in terms of carbon footprint or water footprint!

    Unfortunately, these objects are the target of a race to obsolescence that encourages us to replace them long before they are really useless. This may be due to hardware (the device no longer accepts updates, the battery fails too quickly, etc.) or marketing (the new model takes photos with a few more pixels). But it is possible, and essential, to extend the lifespan of our devices to reduce the colossal digital footprint on our planet.

    To do this, there are a number of good practices you can adopt:
      - Buy reconditioned: you'll often benefit from the same warranty
      - Get repairs done: the repair bonus is designed to make repairs more affordable
      - Find out the reparability index of the appliance you are buying: from the French <a href="https://www.indicereparabilite.fr">government</a> (via Spareka), or from <a href="https://fr.ifixit.com/reparabilite">iFixIt</a>.
      - Join the association that fights against programmed obsolescence: <a href="https://www.halteobsolescence.org/">HOP</a>.
  description.lock: |
    **Le saviez-vous ?**

    En moyenne, 80% de l’empreinte d’un appareil numérique vient de sa fabrication. La partie usage (consommation d’électricité pour l’alimenter, ou pour générer les flux de données) est vraiment secondaire par rapport à la partie “construction de l’appareil”. Que ce soit en matière d’empreinte carbone, ou eau !

    Ces objets sont malheureusement la cible d’une course à l’obsolescence qui invite à les remplacer bien avant leur réelle inutilité. Elle peut être matérielle (l’appareil n’accepte plus les mises à jour, la batterie est trop rapidement défaillante…) ou marketing (le nouveau modèle fait des photos avec quelques pixels de plus). Mais il est bien possible, et essentiel, d’allonger la durée de vie de nos appareils pour réduire l’empreinte colossale du numérique sur notre planète.

    Pour ce faire, plusieurs bonnes pratiques sont possibles :
      - Acheter reconditionné : vous bénéficierez souvent de la même garantie
      - Faire réparer : le bonus réparation a pour vocation de rendre la réparation plus abordable
      - Se renseigner sur l’indice de réparabilité de l’appareil que l’on achète : celui de [l’État](https://www.indicereparabilite.fr) (via Spareka), ou de [iFixIt](https://fr.ifixit.com/reparabilite).
      - Rejoindre l’association qui lutte contre l’obsolescence programmée : [HOP](https://www.halteobsolescence.org/).
  titre: Renew your digital devices less regularly
  titre.auto: Renew your digital devices less regularly
  titre.lock: Renouveler moins régulièrement ses appareils numériques
