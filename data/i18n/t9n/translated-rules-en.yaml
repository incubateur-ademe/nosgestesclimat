    and <a href="https://librairie.ademe.fr/dechets-economie-circulaire/4804-la-collecte-des-dechets-par-le-service-public-en-france.html#/44-type_de_produit-format_electronique">La collecte des déchets par le service public en France - Résultats et zooms thématiques 2019 - ADEME 2021</a>
