alimentation . repas . poisson faible empreinte:
  description: |
    The choice of fish we eat has an impact on our carbon footprint. Fishing, transporting, preparing and storing white fish rather than oily fish consumes more energy and therefore emits more greenhouse gases.

    On average, a meal with white fish has a carbon footprint 50% higher than a meal with fish such as tuna, mackerel, salmon or sardines.
  description.auto: |
    The choice of fish we eat has an impact on our carbon footprint. Fishing, transporting, preparing and storing white fish rather than oily fish consumes more energy and therefore emits more greenhouse gases.

    On average, a meal with white fish has a carbon footprint 50% higher than a meal with fish such as tuna, mackerel, salmon or sardines.
  description.lock: |
    Le choix des poissons que nous consommons a un impact sur notre empreinte carbone. Pêcher, transporter, préparer, stocker des poissons blancs plutôt que des poissons gras consomment plus d’énergie et émet donc plus de gaz à effet de serre.

    En moyenne, un repas avec du poisson blanc a une empreinte carbone 50% supérieure à un repas avec un poisson comme le thon, le maquereau, le saumon ou les sardines.
  titre: Prefer oily fish (tuna, salmon...)
  titre.auto: Prefer oily fish (tuna, salmon...)
