logement . électricité . empreinte eau mix électrique:
  note.auto: |
    Here we attempt to estimate the water footprint of the French electricity mix using the paper <a href="https://www.waterfootprint.org/resources/Report29-WaterFootprintBioenergy.pdf">Water footprint of bio-energy and other primary energy carriers</a> (Gerbens-Leenes, Winnie & Hoekstra, Arjen & Meer, Th.H., 2008) which gives the water equivalent (green, blue, grey water) for each energy source.

    We use the <a href="https://app.electricitymaps.com/map">Electricity map</a> data (displayed by year, 2023) to obtain the composition of the French mix.
    Curiously, the composition does not reach 100%?

    | part | m3/GJ | l/kWh | |
    | --------- | ----------- | ----- | ------- | ------------- |
    | 63.65% | 0.086 | 0.31 | Biomass
    | Biomass | 1.24% | 24.2 | 87.12 | (Netherlands) |
    | Coal | 0.17% | 0.164 | 0.59 |
    | Wind | 9.56% | 0 | 0.00 | |
    | Solar | 4.29% | 0.265 | 0.95 | |
    | Hydro | 10.11% | 22.3 | 80.28 | |
    | Gas | 5.58% | 0.109 | 0.39 | |
    | Fuel oil | 0.33% | 1.058 | 3.81 | |
    | | **94,93%** | | **9,47** | |


    Nevertheless, the use of this study to calculate the water footprint in Nos Gestes Climat is questionable insofar as this study does not use the AWARE method to calculate the water footprint. This result should therefore be updated as soon as possible.

    In addition, through Ecobalyse, we have had access to more recent data on the water footprint of the electricity mix (Ecoinvent), but publication agreements for non-aggregated data such as this do not allow us to use them for the time being.
  note.lock: |
    On tente ici une approche pour estimer l'empreinte eau du mix électrique français en utilisant le papier [Water footprint of bio-energy and other primary energy carriers](https://www.waterfootprint.org/resources/Report29-WaterFootprintBioenergy.pdf) (Gerbens-Leenes, Winnie & Hoekstra, Arjen & Meer, Th.H., 2008) qui donne l'équivalent eau (eau verte, bleue, grise) pour chaque source d'énergie.

    Nous utilisons les données de [Electricity map](https://app.electricitymaps.com/map) (affichage par année, 2023) pour obtenir la composition du mix Français.
    Curieusement, la composition n'atteint pas 100% ..?

    |           | part        | m3/GJ | l/kWh    |               |
    | --------- | ----------- | ----- | -------  | ------------- |
    | Nucléaire | 63,65%      | 0,086 | 0,31     |               |
    | Biomasse  | 1,24%       | 24,2  | 87,12    | (Netherlands) |
    | Charbon   | 0,17%       | 0,164 | 0,59     |               |
    | Eolien    | 9,56%       | 0     | 0,00     |               |
    | Solaire   | 4,29%       | 0,265 | 0,95     |               |
    | Hydro     | 10,11%      | 22,3  | 80,28    |               |
    | Gaz       | 5,58%       | 0,109 | 0,39     |               |
    | Fioul     | 0,33%       | 1,058 | 3,81     |               |
    |           | **94,93%**  |       | **9,47** |               |


    Néanmoins, l'utilisation de cette étude pour le calcul de l'empreinte eau dans Nos Gestes Climat est discutable dans la mesure ou cette étude n'utilise pas la méthode AWARE pour le calcul de l'empreinte eau. Ce résultat est donc à mettre à jour dès que possible.

    Par ailleurs, nous avons eu accès, par l'intermédiaire d'Ecobalyse, à des données d'empreinte eau du mix électrique plus récentes (Ecoinvent) mais les accords de publication de données non aggrégées telles que celle-ci ne nous permettent pas de les utiliser pour le moment.
