    Cette variable intermédiaire est nécessaire car elle permet de considérer l'âge renseigné dans les anciennes simulations, tout en permettant d'utiliser les 3 nouvelles possibilités d'ancienneté du logement (on conserve la même règle `logement . âge`, on peut même toujours utiliser cette règle pour un input numérique).
