logement . propriétaire:
  description.auto: |
    As a tenant, it is obviously difficult to make investments that improve the footprint of the dwelling: insulation, change of energy source are impossible unless you find a particularly accommodating landlord.

    However, the law could be a strong support as soon as 2023: thermal flats <a href="https://www.gouvernement.fr/interdiction-a-la-location-des-logements-avec-une-forte-consommation-d-energie-des-2023">will be forbidden to rent</a>, forcing landlords to launch substantial works.
  description.lock: |
    En tant que locataire, il est évidemment délicat de faire les investissements qui améliorent l'empreinte du logement : isolation, changement de source d'énergie sont impossibles sauf à tomber sur un propriétaire particulièrement conciliant.

    Pourtant, la loi pourrait dès 2023 être un soutien de poids : les passoires thermiques [seront interdites à la location](https://www.gouvernement.fr/interdiction-a-la-location-des-logements-avec-une-forte-consommation-d-energie-des-2023), forçant les propriétaires à lancer des travaux substentiels.
  question: Do you own or rent your home?
  question.auto: Do you own or rent your home?
  question.lock: Êtes-vous propriétaire ou locataire de votre logement ?
  titre: owner
  titre.auto: owner
  titre.lock: propriétaire
  note: |
    As a tenant, it's obviously tricky to make investments that improve the property's footprint: insulation, changing energy sources are impossible unless you find a particularly accommodating landlord.

    However, from 2023 onwards, the law could provide a major boost: thermal flats <a href="https://www.gouvernement.fr/interdiction-a-la-location-des-logements-avec-une-forte-consommation-d-energie-des-2023">will be banned from being rented out</a>, forcing landlords to carry out substantial work.
