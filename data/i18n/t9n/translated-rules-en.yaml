alimentation . boisson . réduire café . max un par jour:
  titre: Limit yourself to one coffee a day
  titre.auto: Limit yourself to one coffee a day
  titre.lock: Se limiter à un café par jour
  description: |
    Did you know that coffee consumption could play a significant role in calculating your carbon footprint? Each cup of coffee adds 120 grams of CO₂e to your carbon footprint.

    What if you started by reducing your consumption by drinking just one coffee a day?

    Want to find out more about the carbon footprint of your favourite drinks? Visit the <a href="https://Impactco2.fr/boissons">ImpactCO2</a> website.
  description.auto: |
    Did you know that coffee consumption could play a significant role in calculating your carbon footprint? Each cup of coffee adds 120 grams of CO₂e to your carbon footprint.

