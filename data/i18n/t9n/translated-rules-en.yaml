alimentation . de saison . pourcentage de saison:
  description: |
    In a first approach, we have chosen to estimate the share of the footprint of seasonal products in the footprint of the <a href="https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm">average French meal</a>
    calculated from the INCA 3 survey (2017).

    These products include fruits and vegetables that can be purchased "directly" in season, as well as other processed products, such as
    fruit juices, soups and compotes, which can be purchased with knowledge of the product's production date.

    We have chosen to exclude potatoes from the calculation, as they can be harvested almost all year round, thanks to their many varieties.
  description.auto: |
    In a first approach, we have chosen to estimate the share of the footprint of seasonal products in the footprint of the <a href="https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm">average French meal</a>
    calculated from the INCA 3 survey (2017).

    These products include fruits and vegetables that can be purchased "directly" in season, as well as other processed products, such as
    fruit juices, soups and compotes, which can be purchased with knowledge of the product's production date.

    We have chosen to exclude potatoes from the calculation, as they can be harvested almost all year round, thanks to their many varieties.
  description.lock: |
    Dans une première approche, nous avons choisi d'estimer la part de l'empreinte des produits de saison dans l'empreinte du [repas moyen français](https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm)
    calculé à partir de l'enquête INCA 3 (2017).

    Ces produits correspondent aux fruits et légumes susceptibles d'être achetés "directement" de saison, mais également d'autres produits transformés, tels que
    les jus de fruits, soupes, compotes, pouvant être achetés en connaissance de la date de production du produit.

    Nous avons choisi d'exclure les pommes de terre du calcul étant donné que la récolte est possible presque toute l'année grâce aux nombreuses variétés de pommes de terre.
  note: |
    This method of calculation is imperfect: ideally, we could make the difference between seasonal and out-of-season on each dish in the user's personalised diet. However, in a future version of the calculation we will be able to differentiate the percentage for each element of the diet.

    However, it does have the merit of giving an initial order of magnitude.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1SVYvBaaYDOUDcg5jX0eZFEColnWWIL8PCLMGrPR000o/edit#gid=1694091424">available here</a> in spreadsheet format.
  note.auto: |
    This method of calculation is imperfect: ideally, we could make the difference between seasonal and out-of-season on each dish in the user's personalised diet. However, in a future version of the calculation we will be able to differentiate the percentage for each element of the diet.

    However, it does have the merit of giving an initial order of magnitude.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1SVYvBaaYDOUDcg5jX0eZFEColnWWIL8PCLMGrPR000o/edit#gid=1694091424">available here</a> in spreadsheet format.
  note.lock: |
    Cette méthode de calcul est imparfaite : idéalement, nous pourrions faire la différence saison / de saison sur chaque plat du régime personnalisé de l'utilisateur. Nous pourrons cependant dans une prochaine version du calcul différencier le pourcentage pour chaque élément du régime.

    Elle a cependant le mérite de donner un premier ordre de grandeur.

    🧮 Le calcul détaillé est [disponible ici](https://docs.google.com/spreadsheets/d/1SVYvBaaYDOUDcg5jX0eZFEColnWWIL8PCLMGrPR000o/edit#gid=1694091424) sous forme de tableur.
  titre: Percentage of season of the average meal footprint
  titre.auto: Percentage of season of the average meal footprint
  titre.lock: Pourcentage de saison de l'empreinte d'un repas moyen
alimentation . de saison . ratio:
  description: |
    This coefficient of 2.26 is derived from Agribalyse by averaging the
    ratios of the same product considered "in season" and "out of season".

    This coefficient is subject to a high degree of uncertainty since the
    in-season/out-of-season data only concerns 2 products in Agribalyse
    (tomatoes and strawberries).
  description.auto: |
    This coefficient of 2.26 is derived from Agribalyse by averaging the ratios of the same product considered "in season" and "out of season".

    This coefficient is subject to a high degree of uncertainty since the in-season/out-of-season data only concerns 2 products in Agribalyse (tomatoes and strawberries).
  description.lock: |
    Ce coefficient de 2,26 est issu d'Agribalyse en réalisant la moyenne des ratios d'un même produit considéré "de saison" et "hors saison".

    Ce coefficient est sujet à une forte incertitude étant donné que la donnée de saison/hors saison ne concerne que 2 produits dans Agribalyse (la tomate et la fraise).
  note: |
    This calculation method is imperfect: ideally, we could make the seasonal/unseasonal difference for each dish in the user's personalised diet. But Agribalyse does not yet give the seasonal/unseasonal breakdown for each food.

    It does, however, have the merit of giving an initial order of magnitude.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1SVYvBaaYDOUDcg5jX0eZFEColnWWIL8PCLMGrPR000o/edit#gid=1694091424">available here</a> in spreadsheet form.
  note.auto: |
