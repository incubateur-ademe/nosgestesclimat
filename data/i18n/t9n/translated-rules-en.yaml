alimentation . boisson . alcool:
  description: |
    Surprisingly, our alcohol consumption plays a significant role in our
    footprint.

    The good news is that we can improve it in very simple ways: more than
    food, a drink is heavy, travels a lot, and its packaging has a
    significant footprint.

    > Let's take the example of a 🍺 25cl beer: brewed at the end of the
    > world, it has traveled thousands of miles and its contents (the drink)
    > are packaged in a container that weighs almost the same (200g of
    > glass).

    > By favoring a locally brewed beer, served on draft (the keg being
    > reused for years), we can drastically reduce the footprint without
    > changing the consumption.
  description.auto: |
    Surprisingly, our alcohol consumption plays an important role in our footprint.

    The good news is that we can improve it in very simple ways: more than food, a drink is heavy, travels a lot, and its packaging has a significant footprint.

    > Let's take the example of a 25cl 🍺 beer: brewed at the end of the world, it has traveled thousands of miles and its contents (the drink) are packaged in a container that weighs almost the same (200g of glass).

    > By favouring a locally brewed beer, served on draught (the cask being reused for years), we can drastically reduce the footprint without changing the consumption.
  description.lock: |
    Étonnamment, notre consommation d'alcool prend un rôle important dans notre empreinte.

    La bonne nouvelle, c'est que nous pouvons l'améliorer de façon très simple : plus que l'alimentation, une boisson est lourde, voyage beaucoup, et son emballage a une empreinte significative.

    > Prenons l'exemple d'une 🍺 bière de 25cl : brassée au bout du monde, elle a voyagé des milliers de kilomètres et son contenu (la boisson) est emballé dans un contenant qui fait presque le même poids (200g de verre).

    > En privilégiant une bière brassée localement, servie à la pression (le fût étant réutilisé des années), on peut réduire drastiquement l'empreinte sans changer la consommation.
  titre: alcohol
  titre.auto: alcohol
  titre.lock: alcool
