    > La cigarette électronique n'est pas encore prise en compte dans nos calculs, faute de données !
  note: |
    According to French customs ( <a href="https://www.douane.gouv.fr/la-douane/opendata/mots-cles/tabacs">Sales of manufactured tobacco in mainland France and Corsica</a>), in 2025 :

    - More than 23 billion single cigarettes
    - Nearly 6 million kg of smoking tobacco (around 190 million 30g packets)

    Furthermore, <a href="https://www.insee.fr/fr/statistiques/7764897">according to INSEE</a>, foreign supplies account for at least 9.5% of tobacco sales in France. We will round this figure up to 10%.

    This represents the equivalent of around 1.35 billion packets of cigarettes in all, or an average of almost 20 packets per person per year, or 0.387 packets per week per person per year.
  note.auto: |
    According to French customs ( <a href="https://www.douane.gouv.fr/la-douane/opendata/mots-cles/tabacs">Sales of manufactured tobacco in mainland France and Corsica</a>), in 2025 :

    - More than 23 billion single cigarettes
    - Nearly 6 million kg of smoking tobacco (around 190 million 30g packets)

    Furthermore, <a href="https://www.insee.fr/fr/statistiques/7764897">according to INSEE</a>, foreign supplies account for at least 9.5% of tobacco sales in France. We will round this figure up to 10%.

    This represents the equivalent of around 1.35 billion packets of cigarettes in all, or an average of almost 20 packets per person per year, or 0.387 packets per week per person per year.
  note.lock: |
    D'après les douanes françaises (document [Ventes de tabacs manufacturés en France continentale et en Corse](https://www.douane.gouv.fr/la-douane/opendata/mots-cles/tabacs)), il s'est vendu en France en 2025 :

    - Plus de 23 milliards de cigarettes à l'unité
    - Près de 6 millions de kg de tabac à fumer (à peu près 190 millions de paquets de 30 g)

    Par ailleurs, [d'après l'INSEE](https://www.insee.fr/fr/statistiques/7764897), les approvisionnements à l’étranger représentent au moins 9,5 % des ventes de tabac en France. Nous arrondissons ce chiffre à 10%.

    Cela représente l'équivalent d'à peu près 1,35 milliards de paquets de cigarettes en tout, soit une moyenne de près de 20 paquets par personne et par an, ou 0,387 paquet par semaine, par personne et par an.
  avertissement: |
    We consider an upper limit of 3 packs per day.
  avertissement.auto: |
    We consider an upper limit of 3 packs per day.
  avertissement.lock: |
    Nous considérons une limite haute de 3 paquets par jour.
