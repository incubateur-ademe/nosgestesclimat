  titre: Becoming a photovoltaic electricity producer
  titre.auto: Becoming a photovoltaic electricity producer
  titre.lock: Devenir producteur d'électricité photovoltaïque
  description: |-
    To limit global warming, we need to limit the use of fossil fuels as much as possible and develop renewable energies. At present, less than 20% of France's energy mix is made up of renewable energies. There is an urgent need to speed up the development of all renewable energy sources, which help to diversify the mix and ensure security of supply. The adaptability of photovoltaics is a valuable asset. Photovoltaic panels can be installed in many different locations, all over France. By installing photovoltaic panels, you are helping to find solutions for building a greener world.

    > To find out more, see the ADEME guide <a href="https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html">"10 questions about photovoltaic electricity"
    </a>
  description.auto: |-
    To limit global warming, we need to limit the use of fossil fuels as much as possible and develop renewable energies. At present, less than 20% of France's energy mix is made up of renewable energies. There is an urgent need to speed up the development of all renewable energy sources, which help to diversify the mix and ensure security of supply. The adaptability of photovoltaics is a valuable asset. Photovoltaic panels can be installed in many different locations, all over France. By installing photovoltaic panels, you are helping to find solutions for building a greener world.

    > To find out more, see the ADEME guide <a href="https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html">"10 questions about photovoltaic electricity"
    </a>
  description.lock: |
    Pour limiter le réchauffement de la planète, nous devons limiter le plus possible l'utilisation des énergies fossiles et développer les énergies renouvelables. À ce jour, le mix énergétique de la France compte moins de 20 % d'énergies renouvelables. Il est urgent d'accélérer le développement de toutes les filières électriques d'énergies renouvelables qui participent à la diversification du mix et à la sécurité d'approvisionnement. La capacité d'adaptation du photovoltaïque est un atout précieux. Les panneaux photovoltaïques peuvent être installés dans de nombreux endroits, partout en France. En installant des panneaux photovoltaïques, vous participez à trouver des solutions pour construire un monde plus écologique.

    > Pour en savoir plus, consulter le guide ADEME ["L'électricité photovoltaïque en 10 questions"](https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html)
logement . installer photovoltaique:
  titre: Installing photovoltaic panels
  titre.auto: Installing photovoltaic panels
  titre.lock: Installer des panneaux photovoltaïques
  description: |-
    Installing photovoltaic solar panels reduces your carbon footprint.

    In fact, **the carbon footprint of a kilowatt-hour of photovoltaic electricity is almost half** that of a kilowatt-hour of grid electricity.

    As a general rule, photovoltaic systems are installed on the roofs of homes, as this is where the space required (10 to 30 m2) and the most favourable inclination can be found. Good orientation is required (south, south-east or south-west). A well-exposed facade can also be an alternative to the roof.

    If you're looking for a simpler installation, you can also opt for solar kits, a market that has been booming for the last 3 years. Marketed in a number of supermarkets and online, these 'Plug & Play' kits, which do not feed into the grid, can be installed by private individuals themselves. They plug directly into an electrical socket and benefit from simplified administrative procedures. With kit purchase prices of between €1.5 and €2 per Wp, they pay for themselves in less than 10 years (if they're properly installed!). They can cover some of the home's permanent consumption (HVAC, fridge, freezer, etc.) during the day, but cannot meet all needs. Homes must remain connected to the grid.

    > You can also take part in a community or participatory project. These projects allow people to invest part of their savings and help set up projects that are good for the environment and create local jobs. They also provide an opportunity to meet other residents who share the same values. There are two ways in which local residents can get involved in photovoltaic projects:

    > Via participatory financing: by lending a sum of money to the project leader and receiving interest.
    > Via investment in a locally-governed project: by acquiring shares in the capital of the project company and becoming involved in the governance of the project so as to have a say in decision-making.

    To find out more, consult the ADEME guide <a href="https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html">"10 questions about photovoltaic electricity"
    </a>
  description.auto: |-
    Installing photovoltaic solar panels reduces your carbon footprint.

    In fact, **the carbon footprint of a kilowatt-hour of photovoltaic electricity is almost half** that of a kilowatt-hour of grid electricity.

    As a general rule, photovoltaic systems are installed on the roofs of homes, as this is where the space required (10 to 30 m2) and the most favourable inclination can be found. Good orientation is required (south, south-east or south-west). A well-exposed facade can also be an alternative to the roof.

    If you're looking for a simpler installation, you can also opt for solar kits, a market that has been booming for the last 3 years. Marketed in a number of supermarkets and online, these 'Plug & Play' kits, which do not feed into the grid, can be installed by private individuals themselves. They plug directly into an electrical socket and benefit from simplified administrative procedures. With kit purchase prices of between €1.5 and €2 per Wp, they pay for themselves in less than 10 years (if they're properly installed!). They can cover some of the home's permanent consumption (HVAC, fridge, freezer, etc.) during the day, but cannot meet all needs. Homes must remain connected to the grid.

    > You can also take part in a community or participatory project. These projects allow people to invest part of their savings and help set up projects that are good for the environment and create local jobs. They also provide an opportunity to meet other residents who share the same values. There are two ways in which local residents can get involved in photovoltaic projects:

    > Via participatory financing: by lending a sum of money to the project leader and receiving interest.
    > Via investment in a locally-governed project: by acquiring shares in the capital of the project company and becoming involved in the governance of the project so as to have a say in decision-making.

    To find out more, consult the ADEME guide <a href="https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html">"10 questions about photovoltaic electricity"
    </a>
  description.lock: |
    Installer des panneaux solaires photovoltaïques permet de réduire son empreinte carbone.

    En effet, **l'empreinte carbone d'un kilowattheure d'électricité photovoltaïque est presque inférieure de moitié** à celle d'un kilowattheure d'électricité du réseau.

    En règle générale, le photovoltaïque s’installe en toiture des habitations car c’est là que l’on trouve la place nécessaire (10 à 30 m2) et l’inclinaison la plus favorable. Une bonne orientation est requise (sud, sud-est ou sud-ouest). Une façade bien exposée peut aussi constituer une alternative à la toiture.

    Si l'on souhaite une installation plus simple, il est aussi possible de se tourner vers les kits solaires dont le marché est en plein essor depuis 3 ans. Commercialisés dans plusieurs enseignes de la grande distribution ou en ligne, les kits « Plug & Play » sans injection sur le réseau peuvent être installés par des particuliers eux-mêmes. Ils se branchent directement à une prise électrique et bénéficient de démarches administratives simplifiées. Avec des tarifs d’achat des kits compris entre 1,5 et 2 € par Wc, ils sont rentables en moins de 10 ans (s’ils sont bien installés !). Ils peuvent couvrir une partie des consommations permanentes du logement (consommation VMC, réfrigérateur, congélateur…) pendant la journée mais ne peuvent pas satisfaire tous les besoins. Les foyers doivent rester connectés au réseau.

    > Vous pouvez aussi participer à un projet citoyen ou participatif. Ces projets permettent aux citoyens d'investir une partie de leur épargne et de participer au montage de projets vertueux pour l'écologie et créateurs d'emplois locaux. Ils permettent aussi de rencontrer d'autres habitants partageant des valeurs communes. Les citoyens peuvent ainsi participer à des projets photovoltaïques de deux façons :

    > - Via le financement participatif : en prêtant une somme d’argent au porteur de projet et en étant rémunéré par des intérêts.
    > - Via l’investissement dans un projet à gouvernance locale: en faisant l’acquisition de parts du capital de la société porteuse de projet et en s’investissant dans la gouvernance du projet pour pouvoir peser dans les prises de décision.

    Pour en savoir plus, consulter le guide ADEME ["L'électricité photovoltaïque en 10 questions"](https://librairie.ademe.fr/7545-l-electricite-photovoltaique-en-10-questions.html)
