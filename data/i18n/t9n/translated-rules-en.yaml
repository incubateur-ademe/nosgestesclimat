  titre: carbon intensity
  titre.auto: carbon intensity
  titre.lock: intensité carbone
  description: |
    Here we use the average footprint of the mix in the simulation region.

    We could do better, by separating the air heating part from the rest of the home's consumption, as heating is used mainly in winter, when coal and gas-fired power stations are running harder and worsening the mix's footprint. But this would require households heated with electricity to find these two values and fill them in, which is not easy to do.

    > By way of example, the carbon intensity of residential heating is defined as 80gCO2e/kWh in France by the RE2020, <a href="https://www.batiactu.com/edito/facteur-energie-primaire-contenu-carbone-electricite-58485.php">source</a>.
  description.auto: |
    Here we use the average footprint of the mix in the simulation region.

    We could do better, by separating the air heating part from the rest of the home's consumption, as heating is used mainly in winter, when coal and gas-fired power stations are running harder and worsening the mix's footprint. But this would require households heated with electricity to find these two values and fill them in, which is not easy to do.

    > By way of example, the carbon intensity of residential heating is defined as 80gCO2e/kWh in France by the RE2020, <a href="https://www.batiactu.com/edito/facteur-energie-primaire-contenu-carbone-electricite-58485.php">source</a>.
  description.lock: |
    Nous utilisons ici l'empreinte moyenne du mix de la région de simulation.

    Nous pourrions faire mieux, en séparant la partie chauffage de l'air et le reste de la consommation du logement, car le chauffage est utilisé principalement l'hiver, au moment où les centrales à charbon et gaz tournent davantage et empirent l'empreinte du mix. Mais cela demanderait pour les foyers chauffés à l'électricité de trouver ces deux valeurs et les renseigner, chose peu évidente.

    > A titre d'exemple, l'intensité carbone du chauffage résidentiel est ainsi définie à 80gCO2e/kWh en France par la RE2020, [source](https://www.batiactu.com/edito/facteur-energie-primaire-contenu-carbone-electricite-58485.php).
