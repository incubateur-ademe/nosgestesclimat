    in particular due to the accuracy of the initial data.
  description.lock: |
    Ce sous-poste permet de capter l'empreinte des achats de produits neufs, liée aux dépenses et niveau de vie d'une personne, via une approche macro-économique.
    À l'image de la méthode utilisée pour les services sociétaux, on utilise [les résultats du travail du SDES](https://nosgestesclimat.fr/documentation/empreinte-SDES) afin de reconstituer l'empreinte carbone des achats non captés "ailleurs" dans le test pour un français moyen.

    Malgré des limites importantes (on en parle juste après), ce poste est présent pour élargir le scope de consommations couvert par Nos Gestes Climat : on prend en compte ici les dépenses qui ne sont pas captées dans le reste du test tel que **la décoration, les plantes, le jardinage, le matériel de cuisine, le linge de maison, les matériaux pour les loisirs créatifs, le bricolage.** Ces achats étant souvent utilisés sur le long terme et devraient donc être amortis selon le type de produit, mais dans cette approche nous considérons que l'empreinte des achats est équivalente d'année en année et que l'amortissement n'est pas nécessaire.

    Afin d'éviter de surcharger le test avec une multitude de questions ( combien de vases ? Combien de livres ? Combien de tapis de bain ? Combien de couverts ? etc.), nous avons choisi de ventiler l'empreinte des "autres produits neufs" selon les réponses déjà recueillies dans le test telles que la surface du logement, nombre d'habitants, volume de textile acheté...

    Ainsi, nous avons considéré dans cette question une [répartition](https://github.com/incubateur-ademe/nosgestesclimat/blob/master/scripts/services-societaux/input/r%C3%A9partition_autres_produits.yaml) des postes suivants dont le contenu carbone a été attribué parmi l'ensemble des branches / sous branches économiques :
      - Horticulture (plantes, accessoires, livraison)
      - Verrerie, vaisselle, ustensiles de cuisine
      - Maroquinerie, accessoires (briquet, parapluie, lunettes de soleil…), équipements pour bébés
      - Tapis et autres revêtements, pose et réparation
      - Outillage pour la maison et le jardin
      - Services de réparation d'ordinateurs et de biens personnels et domestiques
      - Produits destinés aux travaux courants d’entretien et de réparation du logement
      - Autres produits manufacturés type jeux, jouets, article sport, instrument musique, joaillerie/horlogerie

    > Par exemple, le poste horticulture est constitué de la sous-branche "Reproduction de plantes" représentant, en chiffre d'affaires, 2% de la branche "Produits de l'agriculture et de la chasse et services annexes par habitant", de la sous-branche "Commerce de gros de fleurs et plantes" représentant 0,2% de la branche "Commerce de gros, à l'exclusion des automobiles et des motocycles par habitant" et enfin de la sous-branche "Commerce de détail de fleurs, plantes, graines, engrais, animaux de compagnie et aliments pour ces animaux en magasin spécialisé" représentant 1,5% de la branche "Commerce de détail, à l'exclusion des automobiles et des motocycles par habitant"

    Cependant, **l'empreinte captée dans cette question est à prendre avec des pincettes**.

    En effet, l'approche macro-économique présente plusieurs limites exposées dans [notre guide technique sur les services sociétaux](https://github.com/incubateur-ademe/nosgestesclimat/wiki/Guide-technique-services-sociétaux),
    notamment du fait de la précision des données de départ.
  titre: New manufactured products
  titre.auto: New manufactured products
  titre.lock: Produits manufacturés neufs
