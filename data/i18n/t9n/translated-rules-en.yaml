  description: Scooter, gyropod, hoverboard...
  description.auto: Scooter, gyropod, hoverboard...
  description.lock: Trottinette, gyropode, hoverboard...
  note: |
    Small motorized vehicles are booming, driven largely by the explosion in sales of VAEs and electric scooters. But we can also find electric unicycles, gyropods, hoverboards...

    The carbon database does not allow us to distinguish all categories of small motorized vehicles.
    However, as the footprint of this type of vehicle is closely linked to its weight, and as these weights are similar for all this category of vehicles,
    we'll consider that the footprint of all MPVs, excluding EVs, is equivalent to that of the electric scooter.
  note.auto: |
    Small motorized vehicles are booming, driven largely by the explosion in sales of VAEs and electric scooters. But we can also find electric unicycles, gyropods, hoverboards...

    The carbon database does not allow us to distinguish all categories of small motorized vehicles.
    However, as the footprint of this type of vehicle is closely linked to its weight, and as these weights are similar for all this category of vehicles,
    we'll consider that the footprint of all MPVs, excluding EVs, is equivalent to that of the electric scooter.
  note.lock: |
    Les petits véhicules à moteur sont en plein développement, tiré en grande partie par l'explosion des ventes de VAE, et de trottinettes électriques. Mais nous pouvons aussi trouver des monocycles électriques, gyropodes, hoverboards...

    La base de données carbone ne permet pas de distinguer toutes les catégories de petits véhicules à moteur.
    Cependant, l'empreinte de ce type de véhicule étant très liée à son poids, et ceux-ci étant similaires pour toute cette catégorie de véhicules,
    nous considérerons que l'empreinte de tous les EDPM hors VAE est équivalente à celui de la trottinette électrique.
