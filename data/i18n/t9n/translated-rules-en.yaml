  titre: consumption via DPE per m2
  titre.auto: consumption via DPE per m2
  titre.lock: consommation via DPE par m2
  note: |
    The limits observed for each ECD class are as follows. We have chosen to use a realistic average value in each class.

    | Official range (kWhEP/m²/year) | Average realistic value (kWhEP/m²/year) |
    |---|---:|---:|
    | A | ≤ 70 | 55 |
    | B | 71-110 | 90 |
    | C | 111-180 | 145 |
    | D | 181-250 | 215 |
    | E | 251-330 | 290 |
    | F | 331-420 | 375 |
    | G | > 420 | 500 |

    **These consumption figures cover heating and domestic hot water, but exclude cooking **
  note.auto: |
    The limits observed for each ECD class are as follows. We have chosen to use a realistic average value in each class.

    | Official range (kWhEP/m²/year) | Average realistic value (kWhEP/m²/year) |
    |---|---:|---:|
    | A | ≤ 70 | 55 |
    | B | 71-110 | 90 |
    | C | 111-180 | 145 |
    | D | 181-250 | 215 |
    | E | 251-330 | 290 |
    | F | 331-420 | 375 |
    | G | > 420 | 500 |

    **These consumption figures cover heating and domestic hot water, but exclude cooking **
  note.lock: |
    Les bornes observées selon les classes de DPE sont les suivantes. Nous avons choisi d'utiliser une valeur moyenne réaliste dans chaque classe.

    | Classe DPE | Plage officielle (kWhEP/m²/an) | Valeur moyenne réaliste (kWhEP/m²/an) |
    |---|---:|---:|
    | A | ≤ 70 | 55 |
    | B | 71–110 | 90 |
    | C | 111–180 | 145 |
    | D | 181–250 | 215 |
    | E | 251–330 | 290 |
    | F | 331–420 | 375 |
    | G | > 420 | 500 |

    **Ces consommations couvrent le chauffage, l'eau chaude sanitaire mais excluent la cuisson.**
