transport . voiture . barème construction . barème électrique:
  titre: electricity tariff
  titre.auto: electricity tariff
  titre.lock: barème électrique
  note: |
    The construction of an electric car emits more greenhouse gases than an equivalent internal combustion car.
    This is due to the production of the battery, which consumes a lot of energy and has a large carbon footprint.

    > The extra emissions are around +50% (but vary from around +20% to more than a 2-fold increase depending on the study).
    https://bonpote.com/la-voiture-electrique-solution-ideale-pour-le-climat/
  note.auto: |
    The construction of an electric car emits more greenhouse gases than an equivalent internal combustion car.
    This is due to the production of the battery, which consumes a lot of energy and has a large carbon footprint.

    > The extra emissions are around +50% (but vary from around +20% to more than a 2-fold increase depending on the study).
    https://bonpote.com/la-voiture-electrique-solution-ideale-pour-le-climat/
  note.lock: |
    La construction d'une voiture électrique émet plus de gaz à effet de serre qu'une voiture thermique de gamme équivalente.
    Cela est dû à la production de la batterie, qui est très énergivore et à une empreinte carbone importante.

    > Ce surplus d'émissions est d'environ +50% (mais varie d'environ +20% à plus d'une multiplication par 2 selon les études).
    https://bonpote.com/la-voiture-electrique-solution-ideale-pour-le-climat/
transport . voiture . utilisateur:
  titre: user
  titre.auto: user
  titre.lock: utilisateur
  question: Do you ever travel by car (as a passenger or driver)?
  question.auto: Do you ever travel by car (as a passenger or driver)?
  question.lock: Vous arrive t-il de vous déplacer en voiture (en tant que passager ou conducteur) ?
  description: |
    Choose what corresponds to the majority of your journeys.
  description.auto: |
    Choose what corresponds to the majority of your journeys.
  description.lock: |
    Choisissez ce qui correspond à la majorité de vos trajets.
  note: |
    Two factors are important when calculating the construction footprint:

    - Whether or not the same vehicle is used for all the kilometres travelled (if not: you are assigned an "average" vehicle)
    - Whether or not you own the same vehicle, if it is always the same

    We chose to allocate the construction footprint in proportion to the number of kilometres driven. But this approach had two drawbacks:

    - It was extremely advantageous for short-distance drivers, whereas a vehicle that is driven less may wear out more quickly (an engine needs to run regularly) and therefore have a shorter lifespan.
    - It did not make it possible to value the commitment of not owning one's own vehicle, and instead to practise car-sharing or occasional rental (because the construction footprint was the same, whether or not one owned one's own vehicle).

    > To overcome these two problems, and to better represent the fact that a vehicle that is owned but underused wears out faster and deserves a larger construction footprint, **we apply a threshold for the construction part of the footprint, for owners**.
  note.auto: |
    Two factors are important when calculating the construction footprint:

    - Whether or not the same vehicle is used for all the kilometres travelled (if not: you are assigned an "average" vehicle)
    - Whether or not you own the same vehicle, if it is always the same

    We chose to allocate the construction footprint in proportion to the number of kilometres driven. But this approach had two drawbacks:

    - It was extremely advantageous for short-distance drivers, whereas a vehicle that is driven less may wear out more quickly (an engine needs to run regularly) and therefore have a shorter lifespan.
    - It did not make it possible to value the commitment of not owning one's own vehicle, and instead to practise car-sharing or occasional rental (because the construction footprint was the same, whether or not one owned one's own vehicle).

    > To overcome these two problems, and to better represent the fact that a vehicle that is owned but underused wears out faster and deserves a larger construction footprint, **we apply a threshold for the construction part of the footprint, for owners**.
  note.lock: |
    Deux données sont importantes dans le cadre du calcul de l'empreinte liée à la construction :

    - L'usage ou non d'un même véhicule pour tous les kilomètres parcourus (si non : on vous attribue un véhicule "moyen")
    - La propriété ou non dudit véhicule s'il s'agit toujours du même

    Nous avons fait le choix d'attribuer l'empreinte de construction au pro-rata des kilomètres parcourus. Mais cette approche avait deux défauts :

    - Elle était extrêmement avantageuse pour les petits rouleurs, alors que leur véhicule qui roule moins peut s'user plus vite (un moteur a besoin de tourner régulièrement) et donc avoir une durée de vie inférieure.
    - Elle ne permettait pas de valoriser l'engagement de ne pas disposer de son propre véhicule, et de pratiquer à la place l'autopartage, ou la location ponctuelle (car l'empreinte de construction était la même, que l'on soit propriétaire ou non).

    > Pour pallier ces deux problèmes, et mieux représenter qu'un véhicule possédé mais sous-utilisé s'use plus vite et mérite une empreinte de construction plus importante, **nous appliquons un seuil pour la partie construction de l'empreinte, pour les propriétaires**.
transport . voiture . barème construction:
  titre: construction scale
  titre.auto: construction scale
  titre.lock: barème construction
  description: |
    A car is a big, big thing, often weighing over a tonne and a half. As a result, its construction has a significant footprint.

    In particular, the construction of an electric car in the same range as a combustion engine emits more greenhouse gases. This is mainly due to the battery and its considerable weight.

    Despite this, in France, over the lifetime of the car and therefore the number of kilometres travelled, choosing an electric car is clearly better for the climate.

    Better, but far from bad! Today, it's no longer just a question of comparing technical solutions; it's a question of evaluating purchases in relation to climate objectives.
  description.auto: |
    A car is a big, big thing, often weighing over a tonne and a half. As a result, its construction has a significant footprint.

    In particular, the construction of an electric car in the same range as a combustion engine emits more greenhouse gases. This is mainly due to the battery and its considerable weight.

    Despite this, in France, over the lifetime of the car and therefore the number of kilometres travelled, choosing an electric car is clearly better for the climate.

    Better, but far from bad! Today, it's no longer just a question of comparing technical solutions; it's a question of evaluating purchases in relation to climate objectives.
  description.lock: |
    Une voiture est un gros, très gros objet, qui pèse souvent plus d'une tonne et demie. En conséquence, sa construction a une empreinte importante.

    En particulier, la construction d'une voiture électrique de gamme équivalente à une thermique émet plus de gaz à effet de serre. C'est notamment dû à la batterie et son poids important.

    Malgré cela, en France, sur la durée de vie de la voiture et donc les km parcourus, le choix de la voiture électrique est nettement mieux pour le climat.

    Mieux, mais loin d'être faible ! Aujourd'hui, il ne s'agit plus seulement de comparer des solutions techniques entre elles, il s'agit d'évaluer ses achats par rapport aux objectifs climat.
  note: |
    There is a wide range of data on vehicle manufacturing emissions. The first approach used the <a href="https://github.com/betagouv/ecolab-data/files/5945898/vehicule_electrique_rapport.pdf">FNH-Carbone4</a> study, which proposes emission factors for the construction of 2 sizes of vehicle, distinguishing between internal combustion, electric and hybrid vehicles. Some of the data for vehicles seemed inconsistent, and from a methodological point of view we needed greater precision in calculating the footprint of electric vehicles.

    This is why we are now adopting the following approach:

    - For internal combustion vehicles, we use data from ADEME's Empreinte database, which gives a value of 4.5 kgCO2e/kg for the construction of a car. We apply this factor to the mass of the car to obtain the construction footprint, the mass being determined by the size of the vehicle.
    - For electric vehicles, we calculate the footprint of the battery as a function of its capacity, then add the footprint of the construction of a combustion car of equivalent range.
    - For hybrid vehicles, we use the same data as for electric vehicles (strong hypothesis, see note on the hybrid scale).
  note.auto: |
    There is a wide range of data on vehicle manufacturing emissions. The first approach used the <a href="https://github.com/betagouv/ecolab-data/files/5945898/vehicule_electrique_rapport.pdf">FNH-Carbone4</a> study, which proposes emission factors for the construction of 2 sizes of vehicle, distinguishing between internal combustion, electric and hybrid vehicles. Some of the data for vehicles seemed inconsistent, and from a methodological point of view we needed greater precision in calculating the footprint of electric vehicles.

    This is why we are now adopting the following approach:

    - For internal combustion vehicles, we use data from ADEME's Empreinte database, which gives a value of 4.5 kgCO2e/kg for the construction of a car. We apply this factor to the mass of the car to obtain the construction footprint, the mass being determined by the size of the vehicle.
    - For electric vehicles, we calculate the footprint of the battery as a function of its capacity, then add the footprint of the construction of a combustion car of equivalent range.
    - For hybrid vehicles, we use the same data as for electric vehicles (strong hypothesis, see note on the hybrid scale).
  note.lock: |
    Les données autour des émissions liées à la fabrication de véhicules sont nombreuses et variées. La première approche utilisait l'étude [FNH-Carbone4](https://github.com/betagouv/ecolab-data/files/5945898/vehicule_electrique_rapport.pdf) qui propose des facteurs d'émissions pour la construction pour 2 gabarits, en distinguant les véhicules thermiques, électriques et hybrides. Certaines données pour le véhicules paraissaient incohérentes, et nous avions besoin, d'un point de vue méthodologique, de plus de finesse dans le calcul de l'empreinte des véhicules électriques.

    C'est pouquoi, désormais, nous adoptons l'approche suivante:

    - Pour les véhicules thermiques, nous utilisons les données de la Base Empreinte de l'ADEME donnant une valeur de 4,5 kgCO2e/kg pour la construction d'une voiture. Nous appliquons ce facteur à la masse de la voiture pour obtenir l'empreinte de la construction, masse étant déterminée par le gabarit du véhicule.
    - Pour les véhicules électriques, nous calculons l'empreinte de la batterie en fonction de sa capacité, puis nous ajoutons l'empreinte de la construction d'une voiture thermique de gamme équivalente.
    - Pour les véhicules hybrides, nous utilisons les mêmes données que pour les véhicules électriques (hypothèse forte, voir note sur le barème hybride).
