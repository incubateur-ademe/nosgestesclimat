transport . voiture . électrique . consommation estimée:
  titre: estimated consumption
  titre.auto: estimated consumption
  titre.lock: consommation estimée
  note: |
    We are adopting a similar approach to that used for internal combustion cars.

    > While we have worked on proposals for average fuel consumption, ideally, given the impact of this data, users should enter their own actual fuel consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    consumption if electric in kWh/100km (actual) | **Vehicle category** | Electricity consumption if electric in kWh/100km (actual) |
    | --- | --- |
    | Small** | 14.5 kWh/100km (20) |
    | Medium** | 16 kWh/100km (42) |
    | LCV** | 20.6 kWh/100km (6) |
    | Berline** (estate car) | 19.3 kWh/100km (40) |
    **SUV** | 21.2 kWh/100km (26) |

    > An approximation is undoubtedly made here on the choice of size, given that the weight of electric vehicles is higher than that of combustion vehicles, which may have an impact on the consumption/size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport department, it was decided to correct these figures using a factor that would make it possible to approximate actual consumption on the basis of type approval consumption (manufacturer). It was decided to retain the 20% figure, even though electric vehicles are quite sensitive to outside temperature (heating is not "free" in terms of energy, as it is with an internal combustion engine, from which waste heat is recovered to heat the passenger compartment).

    There is another limitation, however: this database contains data from recent vehicles, which are not necessarily representative of vehicles on the road.
  note.auto: |
    We are adopting a similar approach to that used for internal combustion cars.

    > While we have worked on proposals for average fuel consumption, ideally, given the impact of this data, users should enter their own actual fuel consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    consumption if electric in kWh/100km (actual) | **Vehicle category** | Electricity consumption if electric in kWh/100km (actual) |
    | --- | --- |
    | Small** | 14.5 kWh/100km (20) |
    | Medium** | 16 kWh/100km (42) |
    | LCV** | 20.6 kWh/100km (6) |
    | Berline** (estate car) | 19.3 kWh/100km (40) |
    **SUV** | 21.2 kWh/100km (26) |

    > An approximation is undoubtedly made here on the choice of size, given that the weight of electric vehicles is higher than that of combustion vehicles, which may have an impact on the consumption/size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport department, it was decided to correct these figures using a factor that would make it possible to approximate actual consumption on the basis of type approval consumption (manufacturer). It was decided to retain the 20% figure, even though electric vehicles are quite sensitive to outside temperature (heating is not "free" in terms of energy, as it is with an internal combustion engine, from which waste heat is recovered to heat the passenger compartment).

    There is another limitation, however: this database contains data from recent vehicles, which are not necessarily representative of vehicles on the road.
  note.lock: |
    Nous adoptons ici une approche similaire à celle des voitures thermiques.

    > Si nous avons travaillé les propositions de consommation moyenne, l'idéal au vu de l'impact de cette donnée est bien que l'utilisateur ou l'utilisatrice saisisse sa propre consommation réelle, moyennée sur son usage.

    Le calcul des consommations moyennes est basé sur la base de données ADEME [Car Labelling](https://carlabelling.ademe.fr/index/). Nous avons utilisé directement les [données brutes](https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58) via un script permettant d'extraire directement les consommations moyennes pour chaque gabarit et motorisation sur la base de ce mapping:

      - Carosserie = COMBISPACE : "VUL"
      - Poids < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg et gamme Luxe ou Supérieure: "SUV"
      - Poids > 1600kg, autre gammes: "berline"

    | **Catégorie de véhicule** | Conso si électrique en kWh/100km (effectif) |
    | --- | --- |
    | **Petite** | 14.5 kWh/100km (20) |
    | **Moyenne** | 16 kWh/100km (42) |
    | **VUL** | 20.6 kWh/100km (6) |
    | **Berline** (voiture type “break”) | 19.3 kWh/100km (40) |
    | **SUV** | 21.2 kWh/100km (26) |

    > Une approximation est sans doute faite ici sur les choix de gabarits étant donné que le poids des véhicules électriques et plus élevé que les véhicules thermiques ce qui peut impacter le rapprochement consommation / gabarit.

    Cette consommation est une consommation "constructeur". En lien avec le service Transport de l'ADEME, il a été décidé de les corriger via un facteur permettant d’approcher la consommation réelle à partir des consommation d’homologation (constructeur). Il a été décidé de conserver l’ordre de grandeur de 20% même si l'électrique est assez sensible à la température extérieure (le chauffage n'est pas "gratuit" en énergie comme avec un moteur thermique sur lequel on vient récupérer la chaleur perdue pour chauffer l'habitacle).

    Une autre limite reste tout de même: cette base rassemble des données de véhicules récents, pas forcément représentatifs des véhicules en circulation.
