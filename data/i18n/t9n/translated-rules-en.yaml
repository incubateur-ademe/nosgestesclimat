alimentation . bonus . manger de saison:
  description: |
    Eating fruit and vegetables when they're in season means you don't have to transport produce from distant countries or grow food in heated glasshouses.
    It's a good way of saving energy and avoiding greenhouse gas emissions.

    And seasonal fruit and vegetables often taste so much better!

    If you're looking for inspiration for preparing your meals, check out <a href="https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html">the recipes for the 4 seasons in our booklet</a>.

    > To find out just one click about the greenhouse gas emissions generated by growing fruit and vegetables and check their seasonality, <a href="https://impactco2.fr/fruitsetlegumes">check out our simulator</a>.
  description.auto: |
    Eating fruit and vegetables when they're in season means you don't have to transport produce from distant countries or grow food in heated glasshouses.
    It's a good way of saving energy and avoiding greenhouse gas emissions.

    And seasonal fruit and vegetables often taste so much better!

    If you're looking for inspiration for preparing your meals, check out <a href="https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html">the recipes for the 4 seasons in our booklet</a>.

    > To find out just one click about the greenhouse gas emissions generated by growing fruit and vegetables and check their seasonality, <a href="https://impactco2.fr/fruitsetlegumes">check out our simulator</a>.
  description.lock: |
    Manger des fruits et des légumes quand c’est la bonne saison permet d’éviter de transporter les produits de pays éloignés ou de faire pousser des aliments sous serre chauffée.
    C’est un bon moyen pour économiser l’énergie et éviter des émissions de gaz à effet de serre.

    Et les fruits et légumes de saison sont souvent bien meilleurs au goût !

    En mal d’inspiration pour préparer vos repas, découvrez [des recettes des 4 saisons dans notre livret](https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html).

    > Pour découvrir en un clic les émissions de gaz à effet de serre générées par la culture des fruits et légumes et vérifier leur saisonnalité, [consultez notre simulateur](https://impactco2.fr/fruitsetlegumes).
  note.auto: |
    To learn more about the calculation method, browse its formula, the variables will be explained.
  note.lock: |
    Pour en savoir plus sur la méthode de calcul, parcourez sa formule, les variables seront expliquées.
  titre: Eat according to the seasons
  titre.auto: Eat according to the seasons
  titre.lock: Manger en respectant les saisons
alimentation . bonus . manger de saison . recalcul:
  titre: recalculation
  titre.auto: recalculation
  titre.lock: recalcul
alimentation . bonus . manger local:
  description: |
    Eating food that has not been produced at the other end of the planet and in the right season helps to avoid greenhouse gas emissions.

    But be careful not to make too many car journeys to visit local producers to buy your fruit, then your vegetables, then your cheese and eggs... If you do, you run the risk of cancelling out the benefits of your action by emitting a lot of greenhouse gases in the process.

    But there's an added benefit: buying local produce means supporting local farmers!

    Discover <a href="https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html">recipes for the 4 seasons in our booklet</a>.
  description.auto: |
    Eating food that has not been produced at the other end of the planet and in the right season helps to avoid greenhouse gas emissions.

    But be careful not to make too many car journeys to visit local producers to buy your fruit, then your vegetables, then your cheese and eggs... If you do, you run the risk of cancelling out the benefits of your action by emitting a lot of greenhouse gases in the process.

    But there's an added benefit: buying local produce means supporting local farmers!

    Discover <a href="https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html">recipes for the 4 seasons in our booklet</a>.
  description.lock: |
    Manger des aliments qui n’ont pas été produits à l’autre bout de la planète et à la bonne saison permet d’éviter des émissions de gaz à effet de serre.

    Mais attention à ne pas multiplier les trajets en voiture pour aller faire le tour des producteurs locaux afin d’acheter vos fruits puis vos légumes puis vos fromages et œufs… Vous risquez alors d’annuler les bénéfices de votre action en émettant beaucoup de gaz à effet de serre pour vos déplacements.

    Avantage supplémentaire : acheter des produits locaux permet de soutenir les agriculteurs de nos régions !

    Découvrez [des recettes des 4 saisons dans notre livret](https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses-9791029709593.html).
  titre: Eat mostly local products
  titre.auto: Eat mostly local products
  titre.lock: Manger essentiellement des produits locaux
