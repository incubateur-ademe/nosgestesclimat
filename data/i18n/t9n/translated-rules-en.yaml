divers . numérique . appareils . coefficient préservation:
  titre: preservation coefficient
  titre.auto: preservation coefficient
  titre.lock: coefficient préservation
  note: |
    For the sake of clarity, we have chosen to apply a preservation coefficient based on the phone renewal rate. This is a strong assumption, as it is not certain that the rate of renewal of the telephone is correlated with that of other devices, especially as the telephone is often "the worst pupil".

    We assume that people who say they often renew their phones keep them for half their average lifespan, and that people who keep their phones for as long as possible extend their average lifespan. This grid may evolve if new sources or studies are added.
  note.auto: |
    For the sake of clarity, we have chosen to apply a preservation coefficient based on the phone renewal rate. This is a strong assumption, as it is not certain that the rate of renewal of the telephone is correlated with that of other devices, especially as the telephone is often "the worst pupil".

    We assume that people who say they often renew their phones keep them for half their average lifespan, and that people who keep their phones for as long as possible extend their average lifespan. This grid may evolve if new sources or studies are added.
  note.lock: |
    Dans un souci de pédagogie, nous avons choisi d'appliquer un coefficient de préservation basé sur le taux de renouvellement de son téléphone. C'est une hypothèse forte car il n'est pas certain que le taux de renouvellement du téléphone soit corrélé avec celui des autres appareils, d'autant que le téléphone est souvent "le pire élève".

    Nous considérons que la personne qui déclare renouveller souvent son téléphone garde ses appareils la moitié de leur durée de vie moyenne constatée, à l'inverse celui qui conserve son téléphone au maximum repousse leur durée de vie moyenne. Cette grille pourra évoluer si de nouvelles sources ou études viennent compléter tout cela.
