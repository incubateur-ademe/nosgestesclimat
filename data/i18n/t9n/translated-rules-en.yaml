empreinte branche . C21 par hab . services publics:
  description: |
    A large proportion of pharmaceutical products are medicines that are available to us or to the public in hospital departments. 
    However, some pharmaceutical products are distributed without a prescription and are now commercial products (e.g. food supplements).

    As an initial approach, we have only taken into account the share (in terms of turnover) of reimbursable products in public services.
    (90% in 2017, see <a href="https://drees.solidarites-sante.gouv.fr/sites/default/files/2022-09/CNS2022%20Fiche%2012%20-%20La%20structure%20des%20ventes%20de%20m%C3%A9dicaments%20d%E2%80%99officine.pdf">Table 1</a>). We have now revised this breakdown to include 100% of this sector, given the essential nature of the medicines, medical equipment, vaccines, etc. available to us.

    We also plan to work on the reimbursable portion of each type of product (higher for essential products) and thus allocate part of this item to market services.
  description.auto: |
    A large proportion of pharmaceutical products are medicines that are available to us or to the public in hospital departments. 
    However, some pharmaceutical products are distributed without a prescription and are now commercial products (e.g. food supplements).

    As an initial approach, we have only taken into account the share (in terms of turnover) of reimbursable products in public services.
    (90% in 2017, see <a href="https://drees.solidarites-sante.gouv.fr/sites/default/files/2022-09/CNS2022%20Fiche%2012%20-%20La%20structure%20des%20ventes%20de%20m%C3%A9dicaments%20d%E2%80%99officine.pdf">Table 1</a>). We have now revised this breakdown to include 100% of this sector, given the essential nature of the medicines, medical equipment, vaccines, etc. available to us.

    We also plan to work on the reimbursable portion of each type of product (higher for essential products) and thus allocate part of this item to market services.
  description.lock: |
    Une grande partie des produits pharmaceutiques sont des médicaments qui sont à notre disposition ou disponibles pour les citoyens dans les services hospitaliers. 
    En revanche, certains produits pharmaceutiques sont distribués sans prescription et sont aujourd'hui des produits commerciaux (ex: un complément alimentaire).

    Dans une première approche, nous avons pris en compte dans les services publics seule la part (en chiffre d'affaire) des produits remboursables.
    (90% en 2017, voir [Tableau 1](https://drees.solidarites-sante.gouv.fr/sites/default/files/2022-09/CNS2022%20Fiche%2012%20-%20La%20structure%20des%20ventes%20de%20m%C3%A9dicaments%20d%E2%80%99officine.pdf)). Nous avons finalement revu cette répartition en considérant 100% de cette branche au vu du caractère indispensable des médicaments, matériel médical, vaccins etc... à notre disposition.

    Il est également envisagé de travailler sur la part remboursable de chaque type de produit (plus élevée pour les produits essentiels) et ainsi attribuer une partie de ce poste dans les services marchands.
  titre: 100% pharmacy
  titre.auto: 100% pharmacy
  titre.lock: 100% pharmacie
