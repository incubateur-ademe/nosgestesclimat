transport . voiture . hybride rechargeable . consommation elec estimée:
  titre: estimated electricity consumption
  titre.auto: estimated electricity consumption
  titre.lock: consommation elec estimée
  note: |
    > While we have worked on proposals for average consumption, the ideal situation, given the impact of this data, is for users to enter their own actual consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    hybrid (HR) in kWh/100km (effective) | **Vehicle category** | Hybrid (HR) in kWh/100km (effective) |
    | --- | --- |
    | Citadine** | / |
    | **Compact / "average "** | 14.2 (22) |
    | **VUL** | / |
    | Sedan** (station wagon) | 17 (49) |
    | Large saloon** | 20.4 (100) |

    > An approximation is undoubtedly made here on the choice of body sizes, given that the weight of hybrid vehicles is higher than that of internal combustion vehicles, which may have an impact on the fuel consumption / body size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport Department, it has been decided to correct these figures using a factor that approximates actual fuel consumption on the basis of the manufacturer's type-approval fuel consumption. It was decided to retain the 20% figure, even though electric vehicles are quite sensitive to outside temperature (heating is not "free" in terms of energy, as it is with an internal combustion engine, from which waste heat is recovered to heat the passenger compartment).

    As Labelling does not offer data for LCV hybrids, we have chosen to apply the LCV data for this model.

    However, there is another limitation: this database gathers data from recent vehicles, which are not necessarily representative of vehicles on the road.
  note.auto: |
    > While we have worked on proposals for average consumption, the ideal situation, given the impact of this data, is for users to enter their own actual consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    hybrid (HR) in kWh/100km (effective) | **Vehicle category** | Hybrid (HR) in kWh/100km (effective) |
    | --- | --- |
    | Citadine** | / |
    | **Compact / "average "** | 14.2 (22) |
    | **VUL** | / |
    | Sedan** (station wagon) | 17 (49) |
    | Large saloon** | 20.4 (100) |

    > An approximation is undoubtedly made here on the choice of body sizes, given that the weight of hybrid vehicles is higher than that of internal combustion vehicles, which may have an impact on the fuel consumption / body size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport Department, it has been decided to correct these figures using a factor that approximates actual fuel consumption on the basis of the manufacturer's type-approval fuel consumption. It was decided to retain the 20% figure, even though electric vehicles are quite sensitive to outside temperature (heating is not "free" in terms of energy, as it is with an internal combustion engine, from which waste heat is recovered to heat the passenger compartment).

    As Labelling does not offer data for LCV hybrids, we have chosen to apply the LCV data for this model.

    However, there is another limitation: this database gathers data from recent vehicles, which are not necessarily representative of vehicles on the road.
  note.lock: |
    > Si nous avons travaillé les propositions de consommation moyenne, l'idéal au vu de l'impact de cette donnée est bien que l'utilisateur ou l'utilisatrice saisisse sa propre consommation réelle, moyennée sur son usage.

    Le calcul des consommations moyennes est basé sur la base de données ADEME [Car Labelling](https://carlabelling.ademe.fr/index/). Nous avons utilisé directement les [données brutes](https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58) via un script permettant d'extraire directement les consommations moyennes pour chaque gabarit et motorisation sur la base de ce mapping:

      - Carosserie = COMBISPACE : "VUL"
      - Poids < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg et gamme Luxe ou Supérieure: "SUV"
      - Poids > 1600kg, autre gammes: "berline"

    | **Catégorie de véhicule**  | Hybride (HR) en kWh/100km (effectif) |
    | --- | --- |
    | **Citadine** | / |
    | **Compact / “moyenne”** | 14.2 (22) |
    | **VUL** | / |
    | **Berline** (voiture type “break”) | 17 (49) |
    | **Grande berline** | 20.4 (100) |

    > Une approximation est sans doute faite ici sur les choix de gabarits étant donné que le poids des véhicules hybrides et plus élevé que les véhicules thermiques ce qui peut impacter le rapprochement consommation / gabarit.

    Cette consommation est une consommation "constructeur". En lien avec le service Transport de l'ADEME, il a été décidé de les corriger via un facteur permettant d’approcher la consommation réelle à partir des consommation d’homologation (constructeur). Il a été décidé de conserver l’ordre de grandeur de 20% même si l'électrique est assez sensible à la température extérieure (le chauffage n'est pas "gratuit" en énergie comme avec un moteur thermique sur lequel on vient récupérer la chaleur perdue pour chauffer l'habitacle).

    Car Labelling ne propose pas de données pour les hybrides "VUL", nous avons choisi d'appliquer les données "VUL" pour ce gabarit.

    Une autre limite reste tout de même: cette base rassemble des données de véhicules récents, pas forcément représentatifs des véhicules en circulation.
