  note: |
    Here is an explanatory note on the integration of the figure from the Empreinte database into NGC, and its limitations.

    <details><summary>Their justification is in the documentation [unfold]
    </summary>
    For methodological reasons, this approach is not compatible with the logic used to construct the emissions factors in the Empreinte database and cannot be used to produce a GHG emissions balance. Additional work has therefore been carried out, resulting in an update of the LCA in 2020 <a href="https://bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/references.htm">[144]</a> and an emissions factor of 44.1 gCO2e / kWh ICP. This latter value reflects the GHG impact induced by the production of one kWh of biomethane, unlike the value of 23.4 gCO2e / kWh NCV taken from the previous study, which reflects the overall impact of the methanisation and injection process, integrating the induced impacts and reductions in GHG emissions brought about by this process. </details>
    <br/>

    We need to clarify what in NGC prevents us from using the lowest factor in this consumption calculation model, which is a global calculation that also covers agriculture via food.

    Another crucial point is that gas can be stored, unlike 'green' electricity, which is why their emission factor has not yet been included in NGC.

    In addition, leaks from biomethane installations, which are by their very nature much smaller and more numerous than fossil gas and therefore difficult to control, could be underestimated. Is this <a href="https://www.cell.com/one-earth/fulltext/S2590-3322(22">study (202200267-6</a>) taken into account in the above emissions factor (2020)?

    ## About land use

    The link in the Base Empreinte documentation to the GRDF study is no longer online. <a href="https://github.com/incubateur-ademe/nosgestesclimat/files/9542516/evaluation-des-impacts-ges-biomethane-_synthese-quantis_2017.pdf">Here it is in PDF</a>. It shows :

    ![image](https://user-images.githubusercontent.com/1177762/189527416-4e8a3725-ef5a-448e-8557-0ad0007e0720.png)

    The red part is detailed here:

    ![image](https://user-images.githubusercontent.com/1177762/189527431-3fdcc5b2-22c0-49e1-b5f0-68762f780d57.png)

    It shows that the proportion of dedicated crops is very low, which is very reassuring.

    Having said that, and I'm not sure how to define it precisely, I do have the strong impression that a large proportion of these components could be recycled differently: in practical terms, we're burning and therefore recovering at a very high price (wholesale gas <a href="https://twitter.com/i/timeline">prices in September 2022 will cost</a> almost twice the biogas production price (€90/MWh)) the chicken scraps from the canteen that we could just not have produced (blue); the domestic lawn that the neighbour mows every week (light blue); the manure from crops that could have been dedicated to human plants (purple); and so on.

    In short, while some of the energy present in the materials used by biomethane was simply lost, another part simply undergoes a change of allocation, from something useful to the agricultural world to the combustion of gas to heat homes in particular. Not to mention the windfall effect for activities that emit, which can be substituted by others that emit less. The study seems to be very comprehensive, though, so it's worth looking into. Perhaps it answers all the questions that I haven't seen (it's complex).

    There's also <a href="https://reporterre.net/methanisation-un-digestat-bien-indigeste-pour-les-sols-et-les-eaux">an article in Reporterre</a> that worries about bacterial contamination due to the spreading of digestate and the leakage of methane and nitrous oxide N2O, which are underestimated (because they are present and therefore assessed in the study cited by the Base Empreinte). Please note, however, that Reporterre is not a research organisation, but an opinion medium.

    A very recent investigation into methanisation plants in Brittany is along the same lines, cataloguing the incidents that have taken place in the region: https://basta.media/des-methaniseurs-menacent-l-environnement-la-carte-inedite-des-accidents-en-Bretagne-Splann.

    In my opinion, this does not call into question the inclusion of this factor in UCS. Fossil gas production is also affected by problems of this kind, by way of example.

    Another question that may be answered here is this: can the sector increase production by a factor of 10 without introducing negative externalities that are currently under control? It would be interesting to answer this question for UCS users, to show them that their choices can be passed on to society as a whole. Carbone4 seems to be responding in the negative: replacing fossil gas with biomethane should not lead to a failure to reduce gas consumption in general, and even less to a rebound effect!

    ![image](https://user-images.githubusercontent.com/1177762/189527887-931ee20a-8ad6-431f-bd4d-d705fa9eefca.png)

    A **warning** is therefore included in the simulation to highlight the impossibility of scaling up:

    > Biomethane reduces **enormously** the CO₂ emissions of the gas you consume, but current production is **unable to scale up**: the overall reduction of all gas consumption remains **essential**, whether you consume biogas or fossil gas.
