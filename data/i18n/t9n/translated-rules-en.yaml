logement . climatisation:
  description.auto: |
    Here we estimate the footprint of air conditioning.
    Its footprint is fourfold:
    - electricity consumption (included in housing consumption)
    - the footprint of equipment construction
    - the footprint of heat transfer fluid leaks
      - annual
      - end-of-life
  description.lock: |
    Nous estimons ici l'empreinte de la climatisation.
    Son empreinte est quadruple :
    - la consommation d'électricité (elle est incluse dans la consommation du logement)
    - l'empreinte de la construction du matériel
    - l'empreinte des fuites du liquide caloriporteur
      - annuelle
      - en fin de vie
  note: |
    Here we estimate the footprint of air conditioning.
    Its footprint is fourfold:
      - electricity consumption (included in the home's consumption)
      - the footprint of the construction of the equipment
      - the heat transfer fluid leakage footprint
        - annual
        - at end of life

    There is a certain difference with the ADEME study, because the assumptions are different from those of the Base Empreinte, whereas the Base Empreinte claims to be based on this study.

    The main differences come from

    - the annual leakage rate considered: 1% in the ADEME study (tab p38), whereas our model takes the average of the annual leakage rates for the residential sector given in the Empreinte Base (i.e. 4.2%)
    - the fact that the ADEME study does not seem to take into account the end-of-life leakage rate (even if amortised), which is enormous in the Empreinte database (average of 66.4%)
    - the fact that our initial estimate is based on R410a refrigerant, whereas the study considers R134a
  note.auto: |
    Here we estimate the footprint of air conditioning.
    Its footprint is fourfold:
      - electricity consumption (included in the home's consumption)
      - the footprint of the construction of the equipment
      - the heat transfer fluid leakage footprint
        - annual
        - at end of life

    There is a certain difference with the ADEME study, because the assumptions are different from those of the Base Empreinte, whereas the Base Empreinte claims to be based on this study.

    The main differences come from

    - the annual leakage rate considered: 1% in the ADEME study (tab p38), whereas our model takes the average of the annual leakage rates for the residential sector given in the Empreinte Base (i.e. 4.2%)
    - the fact that the ADEME study does not seem to take into account the end-of-life leakage rate (even if amortised), which is enormous in the Empreinte database (average of 66.4%)
    - the fact that our initial estimate is based on R410a refrigerant, whereas the study considers R134a
  note.lock: |
    Nous estimons ici l'empreinte de la climatisation.
    Son empreinte est quadruple :
      - la consommation d'électricité (elle est incluse dans la consommation du logement)
      - l'empreinte de la construction du matériel
      - l'empreinte des fuites du liquide caloriporteur
        - annuelle
        - en fin de vie

    Nous avons une certaine différence avec l'étude ADEME car les hypothèses sont différentes de celles de la Base Empreinte alors que cette dernière dit s'appuyer sur cette étude.

    Les principales différences proviennent

    - du taux de fuite annuelle considéré : 1% dans l'étude ADEME (tab p38) là ou notre modèle fait la moyenne des taux de fuites annuel du secteur résidentiel donnés dans la Base Empreinte (soit 4,2 %)
    - du fait que l'étude ADEME ne semble pas prendre en compte le taux de fuite en fin de vie (même amorti) qui lui est énorme dans la Base Empreinte (moyenne de 66,4 %)
    - du fait que nous considérons en première estimation le fluide frigo R410a là ou l'étude considère le R134a
