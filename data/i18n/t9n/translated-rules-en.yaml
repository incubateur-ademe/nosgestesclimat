divers . numérique . appareils:
  description: |
    The footprint of **shared devices** at household level (television or desktop computer, for example) is **divided by the number of inhabitants**.

    The footprint of **individual devices** (such as mobile phones) is **allocated to you personally**.
  description.auto: |
    The footprint of **shared devices** at household level (television or desktop computer, for example) is **divided by the number of inhabitants**.

    The footprint of **individual devices** (such as mobile phones) is **allocated to you personally**.
  description.lock: |
    L'empreinte des **appareils partagés** au niveau du foyer (télévision ou ordinateur fixe par exemple) est **divisée par le nombre d'habitants**.

    L'empreinte des **appareils individuels** (comme le téléphone portable) vous est **attribuée personnellement**.
  note: |
    This category is a little different in terms of depreciation. Unlike furniture, where everything is considered to be shared within the household, here some appliances are shared while others are considered to be individual.

    We have therefore arbitrarily defined individual devices (telephone, tablet, Bluetooth speaker, laptop, portable console) and collective devices (TV, desktop computer, home console).

    For the time being, we are not considering the end-of-life of these devices here, but rather in the "waste" section.

    According to <a href="https://www.arcep.fr/uploads/tx_gspublication/barometre-du-numerique_edition_2025_RAPPORT_mars2025.pdf">the Digital Barometer 2025</a>, the average French household has 9.6 digital devices with screens, or 4.4 devices per person. According to the same report, of these 9.6 devices, 1.8 are unused, which suggests that seizures are often underestimated.
  note.auto: |
    This category is a little different in terms of depreciation. Unlike furniture, where everything is considered to be shared within the household, here some appliances are shared while others are considered to be individual.

    We have therefore arbitrarily defined individual devices (telephone, tablet, Bluetooth speaker, laptop, portable console) and collective devices (TV, desktop computer, home console).

    For the time being, we are not considering the end-of-life of these devices here, but rather in the "waste" section.

    According to <a href="https://www.arcep.fr/uploads/tx_gspublication/barometre-du-numerique_edition_2025_RAPPORT_mars2025.pdf">the Digital Barometer 2025</a>, the average French household has 9.6 digital devices with screens, or 4.4 devices per person. According to the same report, of these 9.6 devices, 1.8 are unused, which suggests that seizures are often underestimated.
  note.lock: |
    Cette catégorie est un peu particulière au niveau de l'amortissement. En effet, à l'inverse de l'ameublement ou l'on considère que tout est partagé au sein du foyer, ici, certains appareils sont partagés alors que d'autres sont considérés comme étant individuels.

    Ainsi nous avons défini arbitrairement les appareils individuels (téléphone, tablette, enceinte bluetooth, ordinateur portable, console portable) et collectifs (TV, ordinateur fixe, console de salon).

    Pour le moment, nous ne considérons pas la fin de vie des appareils ici mais dans le poste "déchets".

    Selon [le baromètre du numérique 2025](https://www.arcep.fr/uploads/tx_gspublication/barometre-du-numerique_edition_2025_RAPPORT_mars2025.pdf), un foyer français possède en moyenne 9,6 équipements numériques avec écran, soit 4,4 équipements par personne. Selon ce même rapport, parmi ces 9,6 équipements, 1,8 sont inutilisés, ce qui peut laisser penser que les saisies seront souvent sous-estimées.
