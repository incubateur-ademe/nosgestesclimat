transport . voiture . hybride . consommation thermique estimée:
  titre: Estimated car consumption
  titre.auto: Estimated car consumption
  titre.lock: Consommation estimée voiture
  note: |
    > While we have worked on proposals for average consumption, the ideal situation, given the impact of this data, is for users to enter their own actual consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    | Hybrid (HR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective)
    | --- | --- | --- |
    | Citadine** | / | 4.37 (304) |
    | **Compact / "average "** | 1 (22) | 4.69 (134) |
    | **VUL** | / | / |
    **Berline** (estate car) | 1.23 (263) | 5.4 (263) |
    **Large saloon** | 1.52 (417) | 5.92 (417) |

    > An approximation is undoubtedly made here on the choice of size, given that the weight of hybrid vehicles is higher than that of internal combustion vehicles, which may have an impact on the fuel consumption/size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport Department, it has been decided to correct these figures using a factor that approximates actual fuel consumption on the basis of the manufacturer's type-approval fuel consumption.

    According to <a href="https://climate-energy.eea.europa.eu/topics/transport/real-world-emissions/data">EAA</a> (source provided by ADEME's transport department), the figures for rechargeable hybrids are as follows:
      - HR (petrol): +306
      - HR (diesel): +348

    This represents an increase of 325%.

    Finally, for the consumption of non-rechargeable hybrids, we have applied an increase of 20%, a figure that remains within the order of magnitude of the excess consumption for internal combustion engines.

    As Labelling does not provide data for LCV hybrids, we have chosen to apply the 'average' data for this model.

    However, there is another limitation: this database contains data for recent vehicles, which are not necessarily representative of vehicles on the road.
  note.auto: |
    > While we have worked on proposals for average consumption, the ideal situation, given the impact of this data, is for users to enter their own actual consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    | Hybrid (HR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective) | Hybrid (HNR) in L/100km (effective)
    | --- | --- | --- |
    | Citadine** | / | 4.37 (304) |
    | **Compact / "average "** | 1 (22) | 4.69 (134) |
    | **VUL** | / | / |
    **Berline** (estate car) | 1.23 (263) | 5.4 (263) |
    **Large saloon** | 1.52 (417) | 5.92 (417) |

    > An approximation is undoubtedly made here on the choice of size, given that the weight of hybrid vehicles is higher than that of internal combustion vehicles, which may have an impact on the fuel consumption/size ratio.

    This consumption is a "manufacturer" consumption. In conjunction with ADEME's Transport Department, it has been decided to correct these figures using a factor that approximates actual fuel consumption on the basis of the manufacturer's type-approval fuel consumption.

    According to <a href="https://climate-energy.eea.europa.eu/topics/transport/real-world-emissions/data">EAA</a> (source provided by ADEME's transport department), the figures for rechargeable hybrids are as follows:
      - HR (petrol): +306
      - HR (diesel): +348

    This represents an increase of 325%.

    Finally, for the consumption of non-rechargeable hybrids, we have applied an increase of 20%, a figure that remains within the order of magnitude of the excess consumption for internal combustion engines.

    As Labelling does not provide data for LCV hybrids, we have chosen to apply the 'average' data for this model.

    However, there is another limitation: this database contains data for recent vehicles, which are not necessarily representative of vehicles on the road.
  note.lock: |
    > Si nous avons travaillé les propositions de consommation moyenne, l'idéal au vu de l'impact de cette donnée est bien que l'utilisateur ou l'utilisatrice saisisse sa propre consommation réelle, moyennée sur son usage.

    Le calcul des consommations moyennes est basé sur la base de données ADEME [Car Labelling](https://carlabelling.ademe.fr/index/). Nous avons utilisé directement les [données brutes](https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58) via un script permettant d'extraire directement les consommations moyennes pour chaque gabarit et motorisation sur la base de ce mapping:

      - Carosserie = COMBISPACE : "VUL"
      - Poids < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg et gamme Luxe ou Supérieure: "SUV"
      - Poids > 1600kg, autre gammes: "berline"

    | **Catégorie de véhicule** | Hybride (HR) en L/100km (effectif) | Hybride | Hybride (HNR) en L/100km (effectif) |
    | --- | --- | --- |
    | **Citadine** | / | 4.37 (304) |
    | **Compact / “moyenne”** | 1 (22) | 4.69 (134) |
    | **VUL** | / | / |
    | **Berline** (voiture type “break”) | 1.23 (263) | 5.4 (263) |
    | **Grande berline** | 1.52 (417) | 5.92 (417) |

    > Une approximation est sans doute faite ici sur les choix de gabarits étant donné que le poids des véhicules hybrides et plus élevé que les véhicules thermiques ce qui peut impacter le rapprochement consommation / gabarit.

    Cette consommation est une consommation "constructeur". En lien avec le service Transport de l'ADEME, il a été décidé de les corriger via un facteur permettant d’approcher la consommation réelle à partir des consommation d’homologation (constructeur).

    D’après [EAA](https://climate-energy.eea.europa.eu/topics/transport/real-world-emissions/data) (source fournie par le service transport de l'ADEME), on a, pour les hybrides rechargeables :
      - HR (essence): +306%
      - HR (diesel): +348%

    On considère une augmentation de 325%.

    Enfin pour la consommation des hybrides non rechargeables, nous avons appliqué une augmentation de 20%, chiffre qui reste dans l'ordre de grandeur des surconsommations pour le thermique.

    Car Labelling ne propose pas de données pour les hybrides "VUL", nous avons choisi d'appliquer les données "moyenne" pour ce gabarit.

    Une autre limite reste tout de même: cette base rassemble des données de véhicules récents, pas forcément représentatifs des véhicules en circulation.
