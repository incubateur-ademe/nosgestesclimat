divers . produits consommables:
  description: |
    The aim here is to remove consumables, which are not amortised, from the 'expenditure' question, in the same way as 'long-term' purchases such as a musical instrument.
    The second challenge is to quantify the climate footprint of hygiene and cleaning products using a bottom-up approach: emission factors are available for these products, but the difficulty lies in capturing consumption information from users. We have chosen to propose an approach based on 'consumption levels' (low, normal, high) based on the answer to the 'zero waste' question. We are therefore making a strong assumption by correlating the consumption of consumables and the production of waste.
  description.auto: |
    The aim here is to remove consumables, which are not amortised, from the 'expenditure' question, in the same way as 'long-term' purchases such as a musical instrument.
    The second challenge is to quantify the climate footprint of hygiene and cleaning products using a bottom-up approach: emission factors are available for these products, but the difficulty lies in capturing consumption information from users. We have chosen to propose an approach based on 'consumption levels' (low, normal, high) based on the answer to the 'zero waste' question. We are therefore making a strong assumption by correlating the consumption of consumables and the production of waste.
  description.lock: |
    L'objectif ici est de sortir de la question "dépenses" les produits consommables, qui ne sont donc pas amortis, au même titre que les achats "long terme" comme un instrument de musique.
    Le deuxième enjeu est de permettre de quantifier l'empreinte climat des produits d'hygiène et d'entretien via une approche "bottom-up": les facteurs d'émission sont bien disponibles pour ces produits, mais la difficulté réside dans la manière de capter l'information de consommation auprès des utilisateurs. Nous avons choisi de proposer une approche par "niveaux de consommation" (faible, normale, élevée) basée la réponse à la question "zéro déchet". On fait donc une hypothèse forte en corrélant consommation de produits consommables et production de déchets.
  titre: consumables
  titre.auto: consumables
  titre.lock: produits consommables
divers . produits consommables . empreinte:
  titre: Consumables Footprint
  titre.auto: Consumables Footprint
  titre.lock: Empreinte des produits consommables
divers . produits consommables . empreinte par mois:
  note: |
    For this question, and to make it easier to answer, we are basing our answers on 3 levels, assuming that a product weighs around 500 grams.

      - Low consumption of 1 kg of products per month
      - Normal consumption: 2 kg per month
      - High consumption of 5 kg per month

    These levels of consumption are linked to the level of waste production as follows:
      - "zero waste" corresponds to low consumption
      - "reduction" corresponds to normal consumption
      - "basic" corresponds to high consumption

    To help us define these levels, we have assumed that a 'normal' consumption of these products per person per year is:

    For hygiene products:
      - perfumery (perfumes, eau de toilette, etc.): 500g
      - toiletries (soaps, shower gels, deodorants, toothpaste, etc.): 3kg
      - hair products (shampoos, hairsprays, gels, styling foams, colouring, etc.): 3kg
      - cosmetics (make-up, skincare creams, baby products, sun creams, etc.): 2kg

    For cleaning products :
      - Dishwashing liquid: 2kg
      - Dishwashing liquid: 3kg (3 washes per week, 20g per wash)
      - Liquid detergent: 5kg (2 washes a week, 50g per wash)
      - Multi-purpose cleaner: 5kg

    A 'normal amount' consumed by one person is therefore estimated at 2kg per month.
  note.auto: |
    For this question, and to make it easier to answer, we are basing our answers on 3 levels, assuming that a product weighs around 500 grams.

      - Low consumption of 1 kg of products per month
      - Normal consumption: 2 kg per month
      - High consumption of 5 kg per month

    These levels of consumption are linked to the level of waste production as follows:
      - "zero waste" corresponds to low consumption
      - "reduction" corresponds to normal consumption
      - "basic" corresponds to high consumption

    To help us define these levels, we have assumed that a 'normal' consumption of these products per person per year is:

    For hygiene products:
      - perfumery (perfumes, eau de toilette, etc.): 500g
      - toiletries (soaps, shower gels, deodorants, toothpaste, etc.): 3kg
      - hair products (shampoos, hairsprays, gels, styling foams, colouring, etc.): 3kg
      - cosmetics (make-up, skincare creams, baby products, sun creams, etc.): 2kg

    For cleaning products :
      - Dishwashing liquid: 2kg
      - Dishwashing liquid: 3kg (3 washes per week, 20g per wash)
      - Liquid detergent: 5kg (2 washes a week, 50g per wash)
      - Multi-purpose cleaner: 5kg

    A 'normal amount' consumed by one person is therefore estimated at 2kg per month.
  note.lock: |
    Pour cette question et afin de faciliter la réponse, nous nous basons sur 3 niveaux de réponse, en considérant qu'un produit fait environ 500 grammes.

      - Une consommation faible à raison de 1 kg de produits par mois
      - Une consommation normale à raison de 2 kg par mois
      - Une consommation élevée à raison de 5 kg par mois

    Ces niveaux de consommations sont reliés au niveau de production de déchets de la manière suivante :
      - "zéro déchet" correspond à une consommation faible
      - "réduction" correspond à une consommation normale
      - "base" correspond à une consommation élevée

    Afin de nous aider dans la définition de ces niveaux, nous avons fait l'hypothèse qu'une consommation "normale" de ces produits par personne et par an est:

    Pour les produits d'hygiène:
      - la parfumerie (parfums, eaux de toilette, etc.) : 500g
      - les produits de toilette (savons, gels douche, déodorants, dentifrices...) : 3kg
      - les produits capillaires (shampoings, laques, gels, mousses coiffantes, coloration...) : 3kg
      - les cosmétiques (maquillage, crèmes de soins, produits pour bébé, crèmes solaires...) : 2kg

    Pour les produits d'entretien :
      - Liquide vaisselle: 2kg
      - Produit lave-vaisselle: 3kg (3 lavages par semaine, 20g par lavage)
      - Lessive liquide: 5kg (2 lessives par semaine, 50g par lavage)
      - Nettoyant multi-usages: 5kg

    Ainsi, on estime à 2kg par mois une "quantité normale" consommée pour une personne.
  titre: Footprint of consumables over a month
  titre.auto: Footprint of consumables over a month
  titre.lock: Empreinte des produits consommables sur un mois
