alimentation . repas . viande faible empreinte:
  description: |
    Not all meat has the same impact on the climate. To reduce your carbon footprint, it's better to eat poultry than pork, beef, veal, mutton or lamb.

    Poultry requires less food than other animals to grow. So less energy and water are used to produce the cereals that will feed the animals. Above all, chickens do not emit methane, a powerful greenhouse gas.

    What's more, eating less meat and charcuterie is good for your health, because eaten in excess, meat and charcuterie increase the risk of colorectal cancer. It's best to avoid eating meat every day (for adults, limit to 500g of meat, i.e. 2 to 3 steaks, and 15g of charcuterie, the equivalent of 3 slices of sausage per week)

    > To find out more about the impact of what we eat on our health and the planet, see <a href="https://librairie.ademe.fr/consommer-autrement/6260-preserver-sa-sante-et-la-planete.html">the guide "Protecting your health and the planet"</a>
  description.auto: |
    Not all meat has the same impact on the climate. To reduce your carbon footprint, it's better to eat poultry than pork, beef, veal, mutton or lamb.

    Poultry requires less food than other animals to grow. So less energy and water are used to produce the cereals that will feed the animals. Above all, chickens do not emit methane, a powerful greenhouse gas.

    What's more, eating less meat and charcuterie is good for your health, because eaten in excess, meat and charcuterie increase the risk of colorectal cancer. It's best to avoid eating meat every day (for adults, limit to 500g of meat, i.e. 2 to 3 steaks, and 15g of charcuterie, the equivalent of 3 slices of sausage per week)

    > To find out more about the impact of what we eat on our health and the planet, see <a href="https://librairie.ademe.fr/consommer-autrement/6260-preserver-sa-sante-et-la-planete.html">the guide "Protecting your health and the planet"</a>
  description.lock: |
    Toutes les viandes n’ont pas le même impact sur le climat. Pour réduire son empreinte carbone, il est plus intéressant de manger de la volaille que du porc, du bœuf, du veau, du mouton ou de l’agneau.

    La volaille demande moins de nourriture que les autres animaux pour grossir. On consomme donc moins d’énergie et d’eau pour produire des céréales qui nourriront les animaux. Surtout, les poules n'émettent pas de méthane, qui est un puissant gaz à effet de serre.

    De plus, manger moins de viande et de charcuterie est bon pour la santé car consommées en excès, la viande et la charcuterie augmentent le risque de cancer colorectal. Mieux vaut éviter de manger de la viande tous les jours (pour les adultes, limiter à 500 g de viande, soit 2 à 3 steaks, et 15 g de charcuterie, l'équivalent de 3 tranches de saucisson par semaine)

    > Pour en savoir plus sur les impacts de notre alimentation sur notre santé et la planète, consultez [le guide « Préserver sa santé et la planète »](https://librairie.ademe.fr/consommer-autrement/6260-preserver-sa-sante-et-la-planete.html)
  titre: Favour poultry
  titre.auto: Favour poultry
  titre.lock: Privilégier la volaille
bilan:
  description.auto: |
    Here is an estimate of your footprint for the year. It will change according to your answers.

    "The 'footprint' is the basis of our calculations: for each metric, we recalculate this footprint by adapting the data in the context of carbon or water (for the moment).

     *Please note: this simulator gives an order of magnitude of your footprint: the estimate should not be taken to the nearest tenth*

    ## Climate footprint

    This is your share of greenhouse gas emissions, and therefore of global warming.

    The entire footprint of companies is included. For example, if you drive in a car for 10 km, the emissions are not attributed to the country that extracted the oil from the ground, nor to the company that refined it and distributed it in petrol stations, but to the end consumer in his car.

    If we add up this footprint for each French person and each other 🌍 earthling, we get the total impact of human activities on the climate.

    But what does this ten tonnes of CO₂ equivalent mean? Why does it matter? **We tell you all about the climate footprint** and how to place this footprint (low, high?) <a href="https://nosgestesclimat.fr/blog/budget">➡ in this article</a>.
    <RavijenChart/>

    ## Water footprint

    The water footprint is the amount of water consumed to produce the goods and services you consume. It is expressed in litres of water, but these litres are virtual: for each stage in the life cycle of a product, we estimate the quantity of water needed to produce it, taking into account the scarcity of water in the region where it is consumed. A litre of water consumed in France does not have the same impact as a litre of water consumed in India, and just as well, that's taken into account in the calculation!

    For the moment, this footprint is partial (due to a lack of available data): we are currently capturing the footprint of food, textiles, digital technology and electricity.
  description.lock: |
    Voici une estimation de votre empreinte à l'année. Elle évolue en fonction de vos réponses.

    "bilan" est la base de nos calculs : pour chaque métrique, nous recalculons ce bilan en adaptant les données dans le contexte du carbone ou l'eau (pour le moment).

     *À noter : ce simulateur donne l'ordre de grandeur de votre empreinte : l'estimation n'est pas à prendre au dixième près.*

    ## Empreinte climat

    C'est votre part des émissions de gaz à effet de serre, donc du réchauffement climatique.

    Toute l'empreinte des entreprises y est intégrée. Par exemple, si vous roulez en 🚗 voiture sur 10 km, les émissions ne sont pas attribuées au pays qui a extrait du sol ce pétrole, ni à l'entreprise qui l'a raffiné et distribué en station essence, mais au consommateur final dans sa voiture.

    Si l'on fait la somme de cette empreinte pour chaque français et chaque autre 🌍 terrien, on obtient l'impact total des activités humaines sur le climat.

    Mais qu'est-ce qu'elle signifie, cette dizaine de tonnes d'équivalent CO₂ ? Pourquoi c'est important ? **On vous dit tout sur l'empreinte climat** et comment situer cette empreinte (faible, élevée ?) [➡ dans cet article](https://nosgestesclimat.fr/blog/budget).
    <RavijenChart/>

    ## Empreinte eau

    L'empreinte eau correspond à la quantité d'eau consommée pour produire les biens et services que vous consommez. Elle est exprimée en litres d'eau mais ces litres sont virtuels : pour chaque étape du cycle de vie d'un produit, on estime la quantité d'eau nécessaire à sa production en tenant compte de la rareté de l'eau dans la région où elle consommée. En effet, un litre d'eau consommé en France n'a pas le même impact qu'un litre d'eau consommé en Inde, et ça tombe bien, c'est pris en compte dans le calcul !

    Pour le moment, cette empreinte est partielle (faute de données disponibles) : nous captons aujourd'hui l'empreinte de l'alimentation, du textile, du numérique, de l'électricité.
  titre: Balance sheet
  titre.auto: Balance sheet
  titre.lock: Bilan
