empreinte branche . C30 par hab . services marchands:
  description: |
    This division manufactures transport vehicles (excluding cars) for freight (sea, rail, air) or passenger transport (bus, metro, ferry, commercial aircraft).

    It covers civil, military and recreational equipment.

    It is a common commercial service, because public transport is a service accessible to all citizens, and freight is used to transport all the products we consume.

    We have not included 100% of this item to avoid double counting. In fact, the construction of trains, buses, trams, planes, etc. is already taken into account in the emission factors used to calculate the footprint of your journeys in the Transport section.

    We are therefore considering here the construction of ships and floating structures (30.11), 50% of the aeronautical and space construction sub-division (30.3, helicopters, Canadair), military combat vehicles (30.4), cycles and vehicles for the disabled (30.92) and other transport vehicles (30.99, sledges, trolleys, carts), all of which contribute 51% of the turnover of this branch.
  description.auto: |
    This division manufactures transport vehicles (excluding cars) for freight (sea, rail, air) or passenger transport (bus, metro, ferry, commercial aircraft).

    It covers civil, military and recreational equipment.

    It is a common commercial service, because public transport is a service accessible to all citizens, and freight is used to transport all the products we consume.

    We have not included 100% of this item to avoid double counting. In fact, the construction of trains, buses, trams, planes, etc. is already taken into account in the emission factors used to calculate the footprint of your journeys in the Transport section.

    We are therefore considering here the construction of ships and floating structures (30.11), 50% of the aeronautical and space construction sub-division (30.3, helicopters, Canadair), military combat vehicles (30.4), cycles and vehicles for the disabled (30.92) and other transport vehicles (30.99, sledges, trolleys, carts), all of which contribute 51% of the turnover of this branch.
  description.lock: |
    Cette division concerne la construction des véhicules de transport (hors automobile) pour le frêt (maritime, ferrovière, aérien) ou les déplacements de personnes (bus, métro, ferry, avion commercial).

    Le champ concerne les matériels civils, militaires ou de plaisance.

    C'est un service marchand commun car le déplacement en transport en commun est un service accessible à tout citoyen et le fret permet d'acheminer tous les produits que nous consommons.

    Nous ne coinsidérons pas 100% de ce poste pour éviter un double-comptage. En effet, la construction des train, bus, trams, avion etc... est déjà prise en compte dans les facteurs d'émission utilisés pour le calcul de l'empreinte de vos déplacements dans la section Transport.

    Nous considérons donc ici la construction de navires et de structures flottantes (30.11), 50% de la sous-division construction aéronautique et spatiale (30.3, hélicoptères, canadair), les véhicules de combat militaires (30.4), les cycles et véhicules pour personnes invalides (30.92) et les autres véhicules de transport (30.99, traineaux, chariots, charettes), le tout contribuant à hauteur de 51% du chiffre d'affaire de cette branche.
  titre: 51% vehicle manufacturing (non-automotive)
  titre.auto: 51% vehicle manufacturing (non-automotive)
  titre.lock: 51% fabrication de véhicules (hors automobile)
