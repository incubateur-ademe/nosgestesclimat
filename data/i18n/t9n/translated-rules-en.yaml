  description: |
    Per person and per kilometre, the train pollutes 14 times less than the plane (and the TGV 3 times less than a conventional train).

    You can use it to travel both within France and abroad. The journey will certainly take longer by train than by plane, but it's an opportunity to see a lot of the country, and why not make a few stopovers wherever you like. You don't necessarily have to cross the oceans to enjoy great experiences.

