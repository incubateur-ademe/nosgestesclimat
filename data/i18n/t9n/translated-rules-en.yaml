logement . électricité . empreinte:
  titre: footprint
  titre.auto: footprint
  titre.lock: empreinte
  description: |
    The electricity footprint of the home is the sum of the footprints of the electricity from the grid and the electricity produced by the photovoltaic panels.

    If you have photovoltaic panels. The footprint of the electricity produced by these panels can be up to 2 times smaller than that of the grid.

    To calculate your footprint, we assign you the footprint of the electricity linked to the production of your panels, **up to the maximum amount of energy you consume in total**.
    We don't care whether or not this electricity is consumed by you or fed back into the grid before being withdrawn later.

    If we had to be exact, we would have restricted ourselves to the self-consumed part of the production. We would have given you nothing for the kWh reinjected into the grid (because it is very difficult to imagine a fair calculation of their contribution to the decarbonisation of the French mix), and would have given you the footprint of the French electricity mix for everything you draw from the grid. More generally, the notion of compensation is not considered in the philosophy of this calculator.

    But we didn't think this was very fair, or a very good incentive to install photovoltaic panels, even though they do help to improve France's carbon intensity and should therefore be valued.
  description.auto: |
    The electricity footprint of the home is the sum of the footprints of the electricity from the grid and the electricity produced by the photovoltaic panels.

    If you have photovoltaic panels. The footprint of the electricity produced by these panels can be up to 2 times smaller than that of the grid.

    To calculate your footprint, we assign you the footprint of the electricity linked to the production of your panels, **up to the maximum amount of energy you consume in total**.
    We don't care whether or not this electricity is consumed by you or fed back into the grid before being withdrawn later.

    If we had to be exact, we would have restricted ourselves to the self-consumed part of the production. We would have given you nothing for the kWh reinjected into the grid (because it is very difficult to imagine a fair calculation of their contribution to the decarbonisation of the French mix), and would have given you the footprint of the French electricity mix for everything you draw from the grid. More generally, the notion of compensation is not considered in the philosophy of this calculator.

    But we didn't think this was very fair, or a very good incentive to install photovoltaic panels, even though they do help to improve France's carbon intensity and should therefore be valued.
  description.lock: |
    L'empreinte de l'électricité du logement est la somme des empreintes de l'électricité du réseau et de l'électricité produite par les panneaux photovoltaïques.

    Si vous disposez de panneaux photovoltaïques. L'empreinte de l'électricité produite par ces panneaux peut être jusqu'à 2 fois plus faible que celle du réseau.

    Pour calculer votre empreinte, nous vous attribuons l'empreinte de l'électricité liée à la production de vos panneaux, **à hauteur maximum de ce que vous consommez comme énergie au total**.
    Nous n'attachons pas d'importance au fait que cette électricité soit consommée, ou non, par vous ou réinjectée dans le réseau avant d'être retirée plus tard.

    S'il avait fallu être exacts, nous nous serions restreints à la seule partie de la production auto-consommée. Nous ne vous aurions rien attribué pour les kWh réinjectés dans le réseau (car il est très difficile d'imaginer un calcul juste de leur contribution à la décarbonation du mix français), et vous aurions attribué l'empreinte du mix électrique français pour tout ce que vous tirez du réseau. Plus généralement, la notion de compensation n'est pas considérée dans la philosophie de ce calculateur.

    Mais cela ne nous paraissait pas très juste, ni très incitatif à l'installation de panneaux photovoltaïque, alors que cette dernière contribue effectivement à l'amélioration de l'intensité carbone en France et est donc à valoriser.
