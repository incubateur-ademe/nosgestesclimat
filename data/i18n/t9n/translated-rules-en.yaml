divers . textile . facteur qualité:
  description: |
    These quality factors are calculated using the Ecoablyse simulator:
      - "new fast fashion": -33% (Large company with no repair service, €10 t-shirt, no traceability, very high reference number, 100,000)
      - "Ethical new": +33% (Company with repair service, €20 t-shirt, traceability, small number of references, 1000)

    The second-hand character has an impact on the size of the wardrobe. We have also chosen to work on a specific quality factor for second-hand clothes, considering that when buying second-hand, quality is not the primary criterion. On the other hand, if the purchase is considered, we assume that the quality of the items purchased is better.
  description.auto: |
    These quality factors are calculated using the Ecoablyse simulator:
      - "new fast fashion": -33% (Large company with no repair service, €10 t-shirt, no traceability, very high reference number, 100,000)
      - "Ethical new": +33% (Company with repair service, €20 t-shirt, traceability, small number of references, 1000)

    The second-hand character has an impact on the size of the wardrobe. We have also chosen to work on a specific quality factor for second-hand clothes, considering that when buying second-hand, quality is not the primary criterion. On the other hand, if the purchase is considered, we assume that the quality of the items purchased is better.
  description.lock: |
    On calcule ces facteurs de qualité à partir du simulateur Ecoablyse :
      - "neuf fast fashion": -33% (Grande entreprise sans service de réparation, t-shirt à 10€, pas de traçabilité, nombre de référence très élevé, 100000)
      - "neuf éthique": +33% (Entreprise avec service de réparation, t-shirt à 20€, traçabilité, nombre de référence peu élevé, 1000)

    Le caractère seconde main impacte la taille de la garde robe. Nous avons également choisi de travailler un facteur qualité spécifique pour les vêtements d'occasion en considérant que lors des achats d'occasion, la qualité n'est pas le premier critère. En revanche, si l'achat est réfléchi, on fait l'hypothèse que la qualité des pièces achetées est meilleure.
  titre: quality factor
  titre.auto: quality factor
  titre.lock: facteur qualité
