  note: |
    Please note: in the absence of a "generic validated" emission factor for wood logs in the Empreinte database, we have opted for a "specific validated" emission factor (E+/C- initiative = Positive Energy and Carbon Reduction label), in order to ensure a degree of consistency for the user browsing the calculation model
    (E+/C- initiative = Positive Energy and Carbon Reduction label), in order to ensure a degree of consistency for the user browsing the calculation model.
    However, E+/C- emissions factors are sometimes calculated according to rules that differ from those of the Empreinte database.
    It is therefore likely that this emission factor slightly underestimates the GHG impact of consuming one kWh of wood logs by not taking unburnt methane emissions into account.
