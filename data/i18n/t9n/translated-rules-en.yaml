services sociétaux . bien placer argent:
  titre: Investing your money wisely
  titre.auto: Investing your money wisely
  titre.lock: Bien placer son argent
  description: |
    Savings have a considerable role to play in the transition to a more sustainable, fairer and less carbon-intensive society. So if you have a few euros to spare, investing them wisely is essential.

    To help you get a clearer picture of sustainable finance, we recommend that you read the ADEME articles on <a href="https://agirpourlatransition.ademe.fr/particuliers/finances/finance-durable">how to identify the most sustainable products and the questions to ask your bank
    </a>
    That said, if you are a homeowner and your home is not very well insulated, carrying out insulation work is also a very worthwhile investment, both financially and for the planet! Bonus: <a href="https://mesaidesreno.beta.gouv.fr/">the government can help</a>!
  description.auto: |
    Savings have a considerable role to play in the transition to a more sustainable, fairer and less carbon-intensive society. So if you have a few euros to spare, investing them wisely is essential.

    To help you get a clearer picture of sustainable finance, we recommend that you read the ADEME articles on <a href="https://agirpourlatransition.ademe.fr/particuliers/finances/finance-durable">how to identify the most sustainable products and the questions to ask your bank
    </a>
    That said, if you are a homeowner and your home is not very well insulated, carrying out insulation work is also a very worthwhile investment, both financially and for the planet! Bonus: <a href="https://mesaidesreno.beta.gouv.fr/">the government can help</a>!
  description.lock: |
    En matière de transition vers une société plus durable, plus juste et moins carbonée, l'épargne a un rôle considérable à jouer. Aussi, si vous avez quelques euros de côté, bien les placer est essentiel.

    Pour vous aider à y voir plus clair dans la finance durable, nous vous conseillons de consulter les articles de l’ADEME qui vous permettront de comprendre [comment identifier les produits les plus durables et les questions à poser à votre banque](https://agirpourlatransition.ademe.fr/particuliers/finances/finance-durable)

    Ceci étant, si vous êtes propriétaire et que votre logement n'est pas très bien isolé, réaliser des travaux d'isolation est également un investissement très rentable, que ce soit financièrement, ou pour la planète ! Bonus : [l'État peut vous aider](https://mesaidesreno.beta.gouv.fr/) !
