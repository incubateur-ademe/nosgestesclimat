logement . chauffage . précision consommation . saisie DPE:
  question: What is the ECD of your home?
  question.auto: What is the ECD of your home?
  question.lock: Quelle est le DPE de votre logement ?
  titre: eCD entry
  titre.auto: eCD entry
  titre.lock: saisie DPE
  note: |
    The DPE provides a primary energy consumption per m2 and per year, according to the property's energy class. This consumption does not correspond to the energy actually consumed by the property (final energy).

    According to the <a href="https://rt-re-batiment.developpement-durable.gouv.fr/">FAQ RT-RE-bâtiment, "Building regulations"</a>:

    - In the case of electricity production, the conversion factor is currently 2.3. This means that for 1 kWh of electricity to be used in your home, 2.3 kWh of primary energy must be expended.
    - For energies that do not require transformation, such as wood, fuel oil and gas, the conversion factor is equal to 1. 1 kWh of primary energy is therefore enough to provide 1 kWh of final energy.
  note.auto: |
    The DPE provides a primary energy consumption per m2 and per year, according to the property's energy class. This consumption does not correspond to the energy actually consumed by the property (final energy).

    According to the <a href="https://rt-re-batiment.developpement-durable.gouv.fr/">FAQ RT-RE-bâtiment, "Building regulations"</a>:

    - In the case of electricity production, the conversion factor is currently 2.3. This means that for 1 kWh of electricity to be used in your home, 2.3 kWh of primary energy must be expended.
    - For energies that do not require transformation, such as wood, fuel oil and gas, the conversion factor is equal to 1. 1 kWh of primary energy is therefore enough to provide 1 kWh of final energy.
  note.lock: |
    Le DPE fournit une consommation d'énergie primaire, par m2 et annuelle, selon la classe énergétique du logement. Cette consommation ne correspond pas à l'énergie réellement consommée par le logement (énergie finale).

    Selon la [FAQ RT-RE-bâtiment, "Les réglementations du bâtiment"](https://rt-re-batiment.developpement-durable.gouv.fr/):

    - Dans le cas de la production d’électricité, le facteur de conversion est aujourd’hui de 2,3. Cela veut dire que, pour que vous bénéficiez chez vous d’1 kWh d’électricité, on considère qu’il a fallu dépenser 2,3kWh d’énergie primaire.
    - Pour les énergies qui ne nécessitent pas de transformation telles que le bois, le fioul et le gaz, le facteur de conversion est égal à 1. Ainsi, 1 kWh d’énergie primaire suffit à fournir 1 kWh d’énergie finale.
