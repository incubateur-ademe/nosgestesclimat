    On average, <a href="https://www.insee.fr/fr/statistiques/6535285?sommaire=6535307">households spend €1040 a year on cultural goods and services</a>, of which 22% goes on books and the press, i.e. €228, or just under €20 a month.
    With an average household size of 2.2 people, we can estimate that an adult spends an average of just under €10 a month on press, books and software.
  note.auto: |
    On average, <a href="https://www.insee.fr/fr/statistiques/6535285?sommaire=6535307">households spend €1040 a year on cultural goods and services</a>, of which 22% goes on books and the press, i.e. €228, or just under €20 a month.
    With an average household size of 2.2 people, we can estimate that an adult spends an average of just under €10 a month on press, books and software.
  note.lock: |
    En moyenne, [les ménages consacrent 1040€ par an aux achats de biens et services culturels](https://www.insee.fr/fr/statistiques/6535285?sommaire=6535307), dont 22% pour les livres et la presse, soit 228€, soit un peu moins de 20€ par mois.
    La taille du foyer étant en moyenne de 2,2 personnes, nous pouvons estimer qu'un adulte dépense en moyenne un peu moins de 10€ par mois pour la presse, les livres et les logiciels.
