  description: |
    🤔 It's highly likely that your journeys are not the same, and that you sometimes drive alone, sometimes with others.

    You should be aware that, on average in France, the occupancy rate of a car is 1.4 people on short journeys, and 2.25 people on long journeys. This rate increases slightly for families, particularly single-parent households (figures from https://www.statistiques.developpement-durable.gouv.fr/se-deplacer-en-voiture-seul-plusieurs-ou-en-covoiturage-0).

    By default, we assume an average occupancy rate of 1.6.
