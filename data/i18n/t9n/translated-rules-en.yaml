logement . âge:
  note: |
    It is not easy to find an 'average figure' for the age of homes in France. Nevertheless, <a href="https://www.insee.fr/fr/statistiques/7632072?geo=EPCI-242900553&sommaire=7632098">INSEE</a> provides, up to 2018, the age brackets for main residences in mainland France, i.e. :

    | Period | Distribution (%) |
    |----------------|----------------|
    | Before 1919 | 7.2 |
    | 1919-1945 | 5,4 |
    | 1946-1970 | 15,7 |
    | 1971-1990 | 32,0 |
    | 1991-2005 | 21,3 |
    | 2006-2017 | 18,4 |

    By assigning a median bracket for each period, we obtain a weighted average age of around 41 years. Assuming that the housing stock is growing each year while generally ageing, this value can be rounded up to 45 years for 2025.

    NB: For Paris, <a href="https://www.comeetie.fr/galerie/BatiParis">this</a> interactive <a href="https://www.comeetie.fr/galerie/BatiParis">map</a> is fascinating if you are interested in the age of its housing stock.
  note.auto: |
