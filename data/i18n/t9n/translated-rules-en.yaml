divers . textile . faire du tri:
  description: |
    Buying little is good. Giving a second life to what you no longer wear is even better! It allows others to dress more cheaply:

    - ecological: the vast majority of the footprint of clothes is created during the manufacturing process, so we need to make them last as long as possible
    - economical: second-hand clothing allows you to meet a need without blowing your budget

    If the garment is damaged and has to be reprocessed, it can be turned into insulation for the building industry, wiping cloths or new textile fibres.

    To find out where to take your clothes for recycling, go to <a href="https://quefairedemesobjets.ademe.fr/seconde-main/">Que Faire de Mes Objets</a>!

    If you want to make space in your cupboards and save up to 30% of the space in your home, <a href="https://agirpourlatransition.ademe.fr/particuliers/maison/emmenagement/faites-grand-tri-liberez-jusqua-30-pourcents-place-maison">follow ADEME's advice</a>
  description.auto: |
    Buying little is good. Giving a second life to what you no longer wear is even better! It allows others to dress more cheaply:

    - ecological: the vast majority of the footprint of clothes is created during the manufacturing process, so we need to make them last as long as possible
    - economical: second-hand clothing allows you to meet a need without blowing your budget

    If the garment is damaged and has to be reprocessed, it can be turned into insulation for the building industry, wiping cloths or new textile fibres.

    To find out where to take your clothes for recycling, go to <a href="https://quefairedemesobjets.ademe.fr/seconde-main/">Que Faire de Mes Objets</a>!

    If you want to make space in your cupboards and save up to 30% of the space in your home, <a href="https://agirpourlatransition.ademe.fr/particuliers/maison/emmenagement/faites-grand-tri-liberez-jusqua-30-pourcents-place-maison">follow ADEME's advice</a>
  description.lock: |
    Acheter peu, c'est bien. Donner une seconde-vie à ce que l'on ne porte plus, c'est encore mieux ! Cela permet à d'autres de s'habiller à moindre coût :

    - écologique : la grande majorité de l'empreinte des vêtements se situe au moment de leur fabrication, il faut donc les faire durer le plus longtemps possible
    - économique : la seconde-main permet de répondre à un besoin sans faire exploser son budget

    Si le vêtement est abîmé, et qu'il doit partir en filière de retraitement, il pourra se transformer en isolant pour le bâtiment, en chiffons d'essuyage, ou en nouvelles fibres textiles.

    Pour savoir où amener vos vêtements pour qu'ils soient revalorisés, rendez-vous sur [Que Faire de Mes Objets](https://quefairedemesobjets.ademe.fr/seconde-main/) !

    Vous avez envie de faire de la place dans vos placards et de gagner jusqu’à 30 % de place chez vous, [suivez les conseils de l’ADEME](https://agirpourlatransition.ademe.fr/particuliers/maison/emmenagement/faites-grand-tri-liberez-jusqua-30-pourcents-place-maison)
  titre: Sorting out my cupboards
  titre.auto: Sorting out my cupboards
  titre.lock: Faire du tri dans mes placards
