alimentation . déchets . collecte separee . part DAE:
  note: |
    In the collection of household waste there is always a share of waste from WAS (Waste from Economic Activities)
    See page 13 of the study [ADEME MODECOM 2017](https://librairie.ademe.fr/dechets-economie-circulaire/4351-modecom-2017-campagne-nationale-de-caracterisation-des-dechets-menagers-et-assimiles.html).

    We will therefore estimate the real quantity of waste at the scale of the invidu after deduction of the share of WAS (Waste from Economic Activities) contained
    in the collections.
  note.auto: |
    In the collection of household waste there is always a share of waste from WAS (Waste from Economic Activities)
    See page 13 of the <a href="https://librairie.ademe.fr/dechets-economie-circulaire/4351-modecom-2017-campagne-nationale-de-caracterisation-des-dechets-menagers-et-assimiles.html">ADEME MODECOM 2017</a> study.

    We will therefore estimate the real quantity of waste on the scale of the municipality after deduction of the share of WAS (Waste from Economic Activities) contained in the collections
    in the collections.
  note.lock: |
    Dans la collecte des déchets des ménages il y a toujours une part de déchets issus des DAE (Déchets des Activités Economiques)
    Voir page 13 de l'étude [ADEME MODECOM 2017](https://librairie.ademe.fr/dechets-economie-circulaire/4351-modecom-2017-campagne-nationale-de-caracterisation-des-dechets-menagers-et-assimiles.html).

    On estimera donc la quantité réelle de déchets à l'échelle de l'invidu après déduction de la part des DAE (Déchets des Activités Economiques) contenue
    dans les collectes.
