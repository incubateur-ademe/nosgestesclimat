alimentation . petit déjeuner . britannique:
  description.auto: |
    Breakfast with cold meats, 2 eggs and toast.

    The footprint of the British breakfast is given in the following table:

    | Ingredients | CIQUAL | Qty (g) | Kcal | Protein (g) | Fat (g) | kgCO2e/kg | kgCO2e |
    | ------------------------------------------ | ------ | ------- | ------ | ------------- | ----------- | --------- | -------- |
    | 28900 | 100 | 125 | 20.8 | 4.28 | 6.92 | 0.69 | Eggs, Raw (2 kgCO2e)
    | Egg, Raw (2) | 22000 | 120 | 168 | 15,24 | 11,8 | 3,17 | 0,38 |
    | Oil | 17440 | 7 | 63,07 | 0 | 7 | 2,57 | 0,02 |
    | Toast (2 slices - sandwich bread, regular) | 7200 | 50 | 137.5 | 3.57 | 1.8 | 1.75 | 0.09 |
    | Total | 277 | 493.57 | 39.61 | 24.88 | 14.41 | **1.18** |

    💡 Full documentation can be found in <a href="https://accelerateur-transition-ecologique-ademe.notion.site/Empreinte-des-repas-NGC-377d2143f3a14b558ab2c8e0426d2e23">our wiki</a>.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1L3p1m2jtbSK7f3i9AYvWIHntXhI_IiVIY9RM6-IxTb8/edit?gid=925636017#gid=925636017">available here</a> in spreadsheet format.
  description.lock: |
