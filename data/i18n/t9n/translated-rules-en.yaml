logement . vacances . empreinte hotel par nuit:
  titre: hotel footprint per night
  titre.auto: hotel footprint per night
  titre.lock: empreinte hotel par nuit
  note: |
    ## Our assumption on the emission factor used

      According to <a href="https://www.statistiques.developpement-durable.gouv.fr/resultats-detailles-de-lenquete-mobilite-des-personnes-de-2019?rubrique=60&dossier=1345">the 2019 French mobility survey</a>,
      86% of French people travel in France. We therefore assume that **nights are spent in France**.

    ## Our data source

      The final pre-deployment report on the environmental display for hotels, <a href="https://librairie.ademe.fr/consommer-autrement/4096-projet-de-pre-deploiement-de-l-affichage-environnemental-des-hotels.html">published by ADEME in March 2020</a>, gives an average of 9.91 kgCO2 eq/night.
      If we subtract the breakfast part (which accounts for 30% of the footprint), since we'd have double counting of the latter, we end up with a footprint per night of 9.91 * (1 - 30%) = 6.93 kg eqCO2.

      The report also splits the footprint according to hotel class. To start with, we've assumed an average footprint across all classes, but this can be implemented later. This would give :

      - Unclassified hotels: 4.73 kg CO2e / night
      - 2* hotels: 8.53 kg eqCO2 / night
      - 3* hotels: 8.47 kg eqCO2 / night
      - 4* hotels: 11.43 kg eqCO2 / night
      - 5* hotels: 17.11 kg eqCO2 / night

      For several years now, <a href="https://www.betterfly-tourism.com/affichage-environnemental-hotels/">Betterfly Tourism</a>, in partnership with ADEME (the French Environment and Energy Management Agency), has been implementing environmental labelling for hotels. It will therefore be possible to reassess the footprint with more recent data from their consolidated database.

      For its part, the <a href="https://sustainablehospitalityalliance.org/resource/hotel-carbon-measurement-initiative/">Hotel Carbon Measurement Initiative (HCMI</a> ), which feeds the <a href="https://greenview.sg/services/chsb-index/">Cornell Hotel Sustainability Benchmarking Index</a>, provides relevant <a href="https://ecommons.cornell.edu/handle/1813/109990">data</a> for our use.
      This could be a good starting point for the day when we want to differentiate between hotel nights spent in different countries.
      Note that the HCMI gives an average for France of 7.7 kgCO2 eq/night, which is very close to the figure we have chosen, calculated from the ADEME benchmark.

      > Point publicodes : As this rule is used in other areas, such as 'logement . vacances . hotel', it is important not to include it in this area, as this would render the footprint of the overnight stay inapplicable if the hotel rule is also inapplicable.
