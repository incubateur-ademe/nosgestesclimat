  note: |
    We have derived the French average from calculations made by the SDES (Service des Données et Études Statistiques). It corresponds to the sum of the domains corresponding to NAF codes R90 ("Creative, artistic and entertainment activities", excluding the part present in public services) and J59.1 ("Motion picture, video and television activities", excluding the part present in public services).
    <a href="https://nosgestesclimat.fr/documentation/empreinte-branche/J59-par-hab">See details of this branch</a>)
    This footprint is slightly overstated, as film, video and television activities encompass a wider swathe of the economy than cinema alone. At present, we are unable to distinguish between the part of this sector corresponding to cinema and that corresponding to television.
  note.auto: |
    We have derived the French average from calculations made by the SDES (Service des Données et Études Statistiques). It corresponds to the sum of the domains corresponding to NAF codes R90 ("Creative, artistic and entertainment activities", excluding the part present in public services) and J59.1 ("Motion picture, video and television activities", excluding the part present in public services).
    <a href="https://nosgestesclimat.fr/documentation/empreinte-branche/J59-par-hab">See details of this branch</a>)
    This footprint is slightly overstated, as film, video and television activities encompass a wider swathe of the economy than cinema alone. At present, we are unable to distinguish between the part of this sector corresponding to cinema and that corresponding to television.
  note.lock: |
    Nous tirons la moyenne française des calculs effectués par le SDES (Service des Données et Études Statistiques). Elle correspond à la somme des domaines correspondant aux codes NAF R90 ("Activités créatives, artistiques et de spectacles", excepté la part présente dans les services publics) et J59.1 ("Activités cinématographiques, vidéo et de télévision", excepté la part présente dans les services publics).
    ([Voir le détail de cette branche](https://nosgestesclimat.fr/documentation/empreinte-branche/J59-par-hab))
    Cette empreinte est légèrement surévaluée, car les activités cinématographies, vidéo et de télévision englobent un pan plus large de l'économie que le seul cinéma. À ce jour, nous n'avons pas la possibilité de distinguer la partie de ce secteur correspondant au cinéma, et celle correspondant à la télévision.
divers . loisirs . culture . concerts et spectacles . fréquence pondérée:
  titre: weighted frequency
  titre.auto: weighted frequency
  titre.lock: fréquence pondérée
  note: |
    In 2022, French cinemas recorded <a href="https://www.cnc.fr/professionnels/actualites/a-152-millions-dentrees-en-2022-fort-rebond-de-la-frequentation-dans-un-contexte-encore-atypique_1861985">152 million admissions</a>.
    In theater, <a href="https://www.artcena.fr/sites/default/files/medias/ASTP-Etude%20Les%20Franc%CC%A7ais%20et%20le%20The%CC%81a%CC%82tre%202023-diffusion%20juin%202023.pdf">7.4 million tickets were sold in 2022</a>.
    To this we can add <a href="https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Theatre-et-spectacles">4.2 million admissions for live</a> shows (2019 data).
    For street performances (same source), 37% attended a national event, 25% a local festival and 12% a mall event. Summing up these participations, we can estimate that half the population attended a street performance.
    Festivals recorded <a href="https://www.touslesfestivals.com/actualites/le-bilan-des-festivals-de-lannee-2022-lannee-de-reprise-110123">7.4 million admissions in 2022</a>.
    Lastly, in 2019, concerts recorded <a href="https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Spectacles-musicaux">27.9 million admissions</a>.

    All these figures in relation to the size of the population lead us to believe that, on average, a French person attends 3 shows a year, all types of shows included (this is surely an underestimate, as it misses some of the shows for which tickets are not sold)
    The footprint attributed to the individual undergoes a rule of 3 in relation to this average attendance, which corresponds to the average footprint of the sector divided by the population.
  note.auto: |
    In 2022, French cinemas recorded <a href="https://www.cnc.fr/professionnels/actualites/a-152-millions-dentrees-en-2022-fort-rebond-de-la-frequentation-dans-un-contexte-encore-atypique_1861985">152 million admissions</a>.
    In theater, <a href="https://www.artcena.fr/sites/default/files/medias/ASTP-Etude%20Les%20Franc%CC%A7ais%20et%20le%20The%CC%81a%CC%82tre%202023-diffusion%20juin%202023.pdf">7.4 million tickets were sold in 2022</a>.
    To this we can add <a href="https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Theatre-et-spectacles">4.2 million admissions for live</a> shows (2019 data).
    For street performances (same source), 37% attended a national event, 25% a local festival and 12% a mall event. Summing up these participations, we can estimate that half the population attended a street performance.
    Festivals recorded <a href="https://www.touslesfestivals.com/actualites/le-bilan-des-festivals-de-lannee-2022-lannee-de-reprise-110123">7.4 million admissions in 2022</a>.
    Lastly, in 2019, concerts recorded <a href="https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Spectacles-musicaux">27.9 million admissions</a>.

    All these figures in relation to the size of the population lead us to believe that, on average, a French person attends 3 shows a year, all types of shows included (this is surely an underestimate, as it misses some of the shows for which tickets are not sold)
    The footprint attributed to the individual undergoes a rule of 3 in relation to this average attendance, which corresponds to the average footprint of the sector divided by the population.
  note.lock: |
    En 2022, les cinémas français ont enregistré [152 millions d'entrées](https://www.cnc.fr/professionnels/actualites/a-152-millions-dentrees-en-2022-fort-rebond-de-la-frequentation-dans-un-contexte-encore-atypique_1861985).
    Côté théâtre, [7,4 millions de billets ont été vendus en 2022](https://www.artcena.fr/sites/default/files/medias/ASTP-Etude%20Les%20Franc%CC%A7ais%20et%20le%20The%CC%81a%CC%82tre%202023-diffusion%20juin%202023.pdf).
    À cela nous pouvons ajouter [4,2 millions d'entrées pour les spectacles vivants](https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Theatre-et-spectacles) (données de 2019).
    Pour les spectacles de rue (même source), 37% ont assisté à un événement national, 25% à une fête locale et 12% à une animation dans un centre commercial. En sommant ces participations, nous pouvons estimer que la moitié de la population a assisté à un spectacle de rue.
    Du côté des festivals, ils ont enregistré [7,4 millions d'entrées en 2022](https://www.touslesfestivals.com/actualites/le-bilan-des-festivals-de-lannee-2022-lannee-de-reprise-110123).
    Enfin pour les concerts, en 2019 ils enregistraient [27,9 millions d'entrées](https://www.culture.gouv.fr/Thematiques/Etudes-et-statistiques/Statistiques-culturelles/Donnees-statistiques-par-domaine_Cultural-statistics-databases/Spectacles-musicaux).

    L'ensemble de ces chiffres rapportés à la taille de la population nous porte à penser qu'en moyenne, un Français assiste à 3 spectacles par an, tous types de spectacles confondus (ceci est sûrement sous-évalué, car il manque une partie des spectacles ne donnant pas lieu à la vente de billets comptabilisés)
    L'empreinte qu'on attribue à l'individu subit une règle de 3 par rapport à cette moyenne de fréquentation, qui correspond à l'empreinte moyenne du secteur divisée par la population.
