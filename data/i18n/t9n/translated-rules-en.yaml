  titre.auto: notification of numerous travellers
  titre.lock: notif nombreux voyageurs
  description: |
    > Well done! You're making the most of your car journeys!

    > Is this your average occupancy rate? Unfortunately, this is often overestimated.

    > As a reminder, here are the average figures for France:

    - for long journeys: 2.25 passengers/car
    - for short journeys: 1.43 passengers/car
  description.auto: |
    > Well done! You're making the most of your car journeys!

    > Is this your average occupancy rate? Unfortunately, this is often overestimated.

    > As a reminder, here are the average figures for France:

    - for long journeys: 2.25 passengers/car
    - for short journeys: 1.43 passengers/car
  description.lock: |
    > Bravo ! Vous optimisez bien vos trajets en voiture !

    > Est-ce bien votre taux de remplissage moyen ? Celui-ci est malheureusement souvent surévalué.

    > Pour rappel, voici les chiffres moyens en France :

    - pour les trajets longs : 2,25 passagers/voiture
    - pour les trajets courts : 1,43 passagers/voiture
  note: |
    It's a shame, but it's not possible to extrapolate an average occupancy rate based on household size. But the section entitled "Family cars, the most full" gives us a good deal of information about full or self-drive journeys.

    Here is the text in question:

      "Multi-car journeys are made much more often by families (37%) than by non-family members (22%), with the remainder of journeys involving single drivers. As a result, single people, who also make less use of the car for their journeys, are more likely to drive alone (63%). On the other hand, solo driving is less common among people from single-parent families (41%) and couples with or without children (38% and 36% respectively). Similarly, the proportion of journeys made with three or more people on board increases gradually with the number of children in the household, rising from 15% for households with no children to 43% for those with two, and even to 47% for large families.

      It is far more common to be alone in a small car (a mini or city car) than in a large car (a large MPV, family or road saloon, non-urban SUV, road car, etc.) - (57% compared with 36%). These differences can be explained in part by family structure (large cars are often used by families with children), as well as by the distance travelled and the purpose of the journey. Small cars are more frequently used for short business trips, which are themselves more likely to be self-drive"

    <a href="https://www.statistiques.developpement-durable.gouv.fr/se-deplacer-en-voiture-seul-plusieurs-ou-en-covoiturage-0">Source</a>
  note.auto: |
    It's a shame, but it's not possible to extrapolate an average occupancy rate based on household size. But the section entitled "Family cars, the most full" gives us a good deal of information about full or self-drive journeys.

    Here is the text in question:

      "Multi-car journeys are made much more often by families (37%) than by non-family members (22%), with the remainder of journeys involving single drivers. As a result, single people, who also make less use of the car for their journeys, are more likely to drive alone (63%). On the other hand, solo driving is less common among people from single-parent families (41%) and couples with or without children (38% and 36% respectively). Similarly, the proportion of journeys made with three or more people on board increases gradually with the number of children in the household, rising from 15% for households with no children to 43% for those with two, and even to 47% for large families.

      It is far more common to be alone in a small car (a mini or city car) than in a large car (a large MPV, family or road saloon, non-urban SUV, road car, etc.) - (57% compared with 36%). These differences can be explained in part by family structure (large cars are often used by families with children), as well as by the distance travelled and the purpose of the journey. Small cars are more frequently used for short business trips, which are themselves more likely to be self-drive"

    <a href="https://www.statistiques.developpement-durable.gouv.fr/se-deplacer-en-voiture-seul-plusieurs-ou-en-covoiturage-0">Source</a>
  note.lock: |
    C'est bien dommage, mais il n'est pas possible d'extrapoler un taux de remplissage moyen en fonction de la taille du foyer. Mais le passage "Les voitures des familles, les plus remplies" nous donne pas mal de billes sur les trajets remplis ou autosolistes.

    Voici le texte en question :

      "Les déplacements en voiture à plusieurs sont effectués beaucoup plus souvent en famille (37 %) qu’en dehors (22 %), le reste des déplacements concernant des conducteurs seuls. Il en découle que les célibataires, qui ont par ailleurs moins recours à la voiture pour leurs déplacements, sont plus souvent seuls en voiture (63 %). En revanche, l’autosolisme est plus rare pour les individus d’une famille monoparentale (41 %) et d’un couple avec ou sans enfant (respectivement 38 % et 36 %). De même, la part des déplacements avec trois personnes ou plus à bord augmente graduellement avec le nombre d’enfants du ménage, passant de 15 % pour les ménages sans enfant à 43 % pour ceux qui en comptent deux et même à 47 % pour les familles nombreuses.

      Il est bien plus courant d’être seul à bord d’une petite voiture (mini ou citadine) que d’une grande (grand monospace, berline familiale ou routière, SUV non urbain, routière, etc.) - (57 % contre 36 %). Ces écarts s’expliquent en partie par la structure familiale (les grandes voitures sont souvent utilisées par les familles avec enfants), ainsi que par la distance et le motif des déplacements. Les petites voitures sont en effet plus fréquemment utilisées pour les déplacements courts et professionnels, eux-mêmes plus favorables à l’autosolisme."

    [Source](https://www.statistiques.developpement-durable.gouv.fr/se-deplacer-en-voiture-seul-plusieurs-ou-en-covoiturage-0)
