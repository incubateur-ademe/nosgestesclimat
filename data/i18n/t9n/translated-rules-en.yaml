divers . autres produits:
  abréviation: other products
  abréviation.auto: other products
  abréviation.lock: autres prod.
  description: |
    This sub-item captures the footprint of new product purchases, linked to a person's expenditure and standard of living, using a macro-economic approach.
    As with the method used for societal services, the <a href="https://nosgestesclimat.fr/documentation/empreinte-SDES">results of the SDES work</a> are used to reconstitute the carbon footprint of purchases not captured 'elsewhere' in the test for an average French person.

    Despite significant limitations (which we will discuss shortly), this item is included to broaden the scope of consumption covered by Nos Gestes Climat: here we take into account expenditure that is not captured in the rest of the test, such as **decoration, plants, gardening, kitchen equipment, household linen, materials for creative hobbies and DIY.** These purchases are often used over the long term and should therefore be depreciated depending on the type of product, but in this approach we consider that the footprint of purchases is equivalent from year to year and that depreciation is not necessary.

    To avoid overloading the test with a multitude of questions (how many vases? How many books? How many bath mats? How many cutlery sets? etc.), we have chosen to break down the footprint of "other new products" according to the answers already collected in the test, such as the surface area of the home, number of inhabitants, volume of textiles purchased, etc.

    In this question, we have therefore considered a <a href="https://github.com/incubateur-ademe/nosgestesclimat/blob/master/scripts/services-societaux/input/r%C3%A9partition_autres_produits.yaml">breakdown of</a> the following items whose carbon content has been assigned to all the economic sectors/sub-sectors:
      - Horticulture (plants, accessories, delivery)
      - Glassware, crockery, kitchen utensils
      - Leather goods, accessories (lighters, umbrellas, sunglasses, etc.), baby equipment
      - Carpets and other floor coverings, installation and repair
      - Tools for the home and garden
      - Repair services for computers and personal and household goods
      - Products for routine maintenance and repair of the home
      - Other manufactured products such as games, toys, sports equipment, musical instruments, jewellery and watches

    > For example, the horticulture item is made up of the sub-branch "Reproduction of plants" representing, in terms of turnover, 2% of the branch "Agricultural and hunting products and related services per inhabitant", the sub-branch "Wholesale of flowers and plants" representing 0.2% of the branch "Wholesale, excluding motor vehicles and motorbikes per capita" and finally the sub-branch "Retail sale of flowers, plants, seeds, fertilisers, pet animals and pet food in specialised shops" representing 1.5% of the "Retail sale, excluding motor vehicles and motorbikes per capita" branch

    However, **the footprint captured in this question should be treated with caution**.

    This is because the macro-economic approach has a number of limitations, as set out in <a href="https://github.com/incubateur-ademe/nosgestesclimat/wiki/Guide-technique-services-sociétaux">our technical guide on societal services</a>,
    in particular due to the accuracy of the initial data.
  description.auto: |
    This sub-item captures the footprint of new product purchases, linked to a person's expenditure and standard of living, using a macro-economic approach.
    As with the method used for societal services, the <a href="https://nosgestesclimat.fr/documentation/empreinte-SDES">results of the SDES work</a> are used to reconstitute the carbon footprint of purchases not captured 'elsewhere' in the test for an average French person.

