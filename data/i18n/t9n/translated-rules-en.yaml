logement . vacances:
  titre: Weekend or vacation nights
  titre.auto: Weekend or vacation nights
  titre.lock: Nuitées week-end ou vacances
  question: How are you accommodated for your weekends and vacations?
  question.auto: How are you accommodated for your weekends and vacations?
  question.lock: Comment êtes-vous hébergé pour vos week-ends, vos vacances ?
  note: |
    ### What do we mean by "nights away from home" in Our Climate Gestures?

      - Hotel or bed and breakfast
      - Camping pitch
      - Youth hostel
      - Furnished rental accommodation
      - Family or friends
      - Home exchange
      - Second home
      - Cruise ship

    Excludes nights in a hotel for **work-related reasons**.

    ### What data do we use?

    An ADEME study on the tourism sector in France published at the end of 2024, <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">Bilan des émissions de gaz à effet de serre du secteur du tourisme en France</a>, provides various figures relating to overnight stays in tourist accommodation. However, we lack background assumptions and are not in a position to 'check' their content to avoid double counting, for example. Unfortunately, the department in charge of the study was unable to provide us with more precise data. We have therefore reworked certain hosting methods using more transparent data where possible.

    ### Our hypotheses in brief

    - The footprint of a night spent with family or friends is now indirectly counted in the host's footprint.

    - For hotels and private rooms / B&Bs, we are considering a common emission factor for the time being.

    - The footprint of holiday accommodation (excluding youth hostels and cruises) is divided by the number of inhabitants in the accommodation. This is a strong assumption, as it's easy to imagine that families/households don't always travel in their entirety! Nevertheless, we assume that a family of more than 4 people will use 2 bedrooms.
  note.auto: |
    ### What do we mean by "nights away from home" in Our Climate Gestures?

      - Hotel or bed and breakfast
      - Camping pitch
      - Youth hostel
      - Furnished rental accommodation
      - Family or friends
      - Home exchange
      - Second home
      - Cruise ship

    Excludes nights in a hotel for **work-related reasons**.

    ### What data do we use?

    An ADEME study on the tourism sector in France published at the end of 2024, <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">Bilan des émissions de gaz à effet de serre du secteur du tourisme en France</a>, provides various figures relating to overnight stays in tourist accommodation. However, we lack background assumptions and are not in a position to 'check' their content to avoid double counting, for example. Unfortunately, the department in charge of the study was unable to provide us with more precise data. We have therefore reworked certain hosting methods using more transparent data where possible.

    ### Our hypotheses in brief

    - The footprint of a night spent with family or friends is now indirectly counted in the host's footprint.

    - For hotels and private rooms / B&Bs, we are considering a common emission factor for the time being.

    - The footprint of holiday accommodation (excluding youth hostels and cruises) is divided by the number of inhabitants in the accommodation. This is a strong assumption, as it's easy to imagine that families/households don't always travel in their entirety! Nevertheless, we assume that a family of more than 4 people will use 2 bedrooms.
  note.lock: |
    ### Qu'entend-on par "nuitées hors logement" dans Nos Gestes Climat?

      - Hôtel ou chambre d'hôtes
      - Emplacement en camping
      - Auberge de jeunesse
      - Locations meublées
      - Famille ou amis
      - Échange de maison
      - Résidence secondaire
      - Bateau de croisière

    Sont donc exclues les nuits en hôtel pour **raisons professionnelles**.

    ### Quelles données utilisons nous ?

    Une étude ADEME sur le secteur du tourisme en France sortie fin 2024, [Bilan des émissions de gaz à effet de serre du secteur du tourisme en France](https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html), fournit divers chiffres relatifs aux nuitées des logements touristiques. Néanmoins, nous manquons d'hypothèses d'arrière plan et ne sommes pas en mesure de "vérifier" leur contenu pour éviter le double comptage par exemple. Malheureusement, le service en charge de l'étude n'a pas pu nous fournir de données plus précises. Nous avons donc retravaillé certains mode d'hébergement à partir de données plus transparentes lorsque c'était possible.

    ### Nos hypothèses en bref

    - Pour l'empreinte d'une nuit au sein de sa famille ou chez des amis, l'empreinte est aujourd'hui indirectement comptée dans l'empreinte des accueillants.

    - Pour les hôtels et les chambres privées / chambres d'hôtes, nous considérons un facteur d'émission commun pour le moment.

    - L'empreinte des logements de vacances (hors auberge de jeunesse et croisière) est divisée par le nombre d'habitants du logement. C'est une hypothèse forte car on peut facilement imaginer que le famille / foyer ne voyage pas toujours au complet ! Néanmoins, on considère tout de qu'une famille composée de plus de 4 personnes prendra 2 chambres.
  description: |
    Enter here the different types of accommodation you use for your travels (**personal**).

    > If you never go away for the weekend or on holiday, you can click on "none" just below this question, then "Next".
  description.auto: |
    Enter here the different types of accommodation you use for your trips (**personal**).

    > If you never go away for the weekend or on holiday, you can click on "none" just below this question, then "Next".
  description.lock: |
