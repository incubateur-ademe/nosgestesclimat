divers . numérique . appareils . téléphone . empreinte:
  note: |
    In the first version of Nos Gestes Climat we divided the possibilities of this question into three categories, depending on the availability of data in the carbon base and manufacturers).

    - Basic phone (also known as a "feature phone", which today are a cross between the famous Nokia 3310 and the smartphone, with a small screen and low-end components)
    - Classic smartphone (mid-range, which accounts for the overwhelming majority of sales. Almost all smartphones sold in 2021 will have a screen larger than 5.5 inches)
    - Top-of-the-range smartphone (the GES balance sheet database does not include any "top-of-the-range phone" or "screen > 6 inches" categories. What's more, the footprint of an iPhone 11 estimated by Apple itself is 72kg of CO₂, 79% of which so ~57kg just for production.

    Nevertheless, the latest ADEME data (see Empreinte base), like the <a href="https://www.apple.com/environment/pdf/products/iphone/iPhone_11_PER_sept2019.pdf">manufacturers</a>, seem to give a higher value than the Carbon base figures.
  note.auto: |
    In the first version of Nos Gestes Climat we divided the possibilities of this question into three categories, depending on the availability of data in the carbon base and manufacturers).

    - Basic phone (also known as a "feature phone", which today are a cross between the famous Nokia 3310 and the smartphone, with a small screen and low-end components)
    - Classic smartphone (mid-range, which accounts for the overwhelming majority of sales. Almost all smartphones sold in 2021 will have a screen larger than 5.5 inches)
    - Top-of-the-range smartphone (the GES balance sheet database does not include any "top-of-the-range phone" or "screen > 6 inches" categories. What's more, the footprint of an iPhone 11 estimated by Apple itself is 72kg of CO₂, 79% of which so ~57kg just for production.

    Nevertheless, the latest ADEME data (see Empreinte base), like the <a href="https://www.apple.com/environment/pdf/products/iphone/iPhone_11_PER_sept2019.pdf">manufacturers</a>, seem to give a higher value than the Carbon base figures.
  note.lock: |
    Dans la première version de Nos Gestes Climat nous segmentions les possibilités de cette question en trois catégorie, selon les disponibilités des données dans la base carbone et fabricants).

    - Téléphone basique (aussi appelé "feature phone", qui sont aujourd'hui au croisement entre le fameux Nokia 3310 et le smartphone, dont l'écran reste petit et les composants bas de gamme)
    - Smartphone classique (milieu de gamme, qui représente l'écrasante majorité des ventes. Tous les smartphones vendus en 2021 ou presque ont un écran supérieur à 5.5 pouces)
    - Smartphone haut de gamme (la base bilan-GES n'inclut pas de catégories "téléphone haut de gamme" ou "écran > 6 pouces". De plus, l'empreinte d'un iPhone 11 estimée par Apple elle-même est de 72kg de CO₂, dont 79% donc ~57kg juste pour la production.

    Néanmoins, les dernières données ADEME (voir base Empreinte), à l'image des [constructeurs](https://www.apple.com/environment/pdf/products/iphone/iPhone_11_PER_sept2019.pdf), semblent donner une valeur plus élevée que les chiffres de la base Carbone.
