transport . voiture . construction:
  titre: Building the car
  titre.auto: Building the car
  titre.lock: Construction de la voiture
  description.auto: |
    ![](https://i.imgur.com/uIlZcEjl.jpg)

    A car is a big, big object, often weighing over a ton and a half. As a result, its construction has a significant footprint.

    In particular, the construction of an electric car in the same range as a combustion engine emits more greenhouse gases. This is mainly due to the battery and its considerable weight.

    Despite this, in France, over the life of the car and therefore the number of kilometers covered, the choice of an electric car is clearly better for the climate.

    Better, but far from poor! In 2020, it's not just a question of comparing technical solutions, it's a question of evaluating purchases in relation to climate objectives.
  description.lock: |
    ![](https://i.imgur.com/uIlZcEjl.jpg)

    Une voiture est un gros, très meuble ou électroménager, qui pèse souvent plus d'une tonne et demie. En conséquence, sa construction a une empreinte importante.

    En particulier, la construction d'une voiture électrique de gamme équivalente à une thermique émet plus de gaz à effet de serre. C'est notamment dû à la batterie et son poids important.

    Malgré cela, en France, sur la durée de vie de la voiture et donc les km parcourus, le choix de la voiture électrique est nettement mieux pour le climat.

    Mieux, mais loin d'être faible ! En 2020, il ne s'agit plus seulement de comparer des solutions techniques entre elles, il s'agit d'évaluer ses achats par rapport aux objectifs climat.
  note: |
    For the moment, we are not considering the full depreciation of a car (i.e. we do not have information on the age or full mileage of the car, so its construction will never be zero).
  note.auto: |
    For the moment, we are not considering the full depreciation of a car (i.e. we do not have information on the age or full mileage of the car, so its construction will never be zero).
  note.lock: |
    Pour le moment, nous ne considérons pas l'amortissement complet d'une voiture (c'est-à-dire que nous n'avons pas l'info de l'âge ou le kilométrage complet de la voiture donc sa contruction ne sera jamais nulle).
transport . voiture . amortissement:
  titre: amortization
  titre.auto: amortization
  titre.lock: amortissement
  description: |
    There were lively discussions about the car's depreciation. Previously, in order to discourage the purchase of new cars, a non-linear depreciation system had been devised, decreasing sharply over time, over 10 years.
    This non-linear depreciation had the merit of discouraging new purchases, and of making it clear to the user that a large part of the vehicle's footprint is linked to its production, and therefore to the purchase of a new car.

    But this non-linear depreciation was not easy for users to understand, and failed to achieve its educational objective.
    In addition, it created a double discourse in Nos Gestes Climat, because in the actions proposed to car owners, we propose the purchase of an electric vehicle, which is heavily penalised if it is bought new in the individual carbon footprint.

    Lastly, there was one exception in the Nos Gestes Climat simulator: all other assets are depreciated on a straight-line basis (the construction footprint is divided by the lifespan of the asset).

    We therefore decided to go back to straight-line depreciation over the life of the car, which is measured in years.

    But we still didn't like the way this worked: it penalised short-distance drivers a lot, and didn't seem very fair in relation to the reality of a vehicle, whose lifespan is expressed more in km.

    So, in the end, we opted for this system: the vehicle's depreciation is based on the number of km driven, in relation to the maximum number of km corresponding to the vehicle's size.
  description.auto: |
    There were lively discussions about the car's depreciation. Previously, in order to discourage the purchase of new cars, a non-linear depreciation system had been devised, decreasing sharply over time, over 10 years.
    This non-linear depreciation had the merit of discouraging new purchases, and of making it clear to the user that a large part of the vehicle's footprint is linked to its production, and therefore to the purchase of a new car.

    But this non-linear depreciation was not easy for users to understand, and failed to achieve its educational objective.
    In addition, it created a double discourse in Nos Gestes Climat, because in the actions proposed to car owners, we propose the purchase of an electric vehicle, which is heavily penalised if it is bought new in the individual carbon footprint.

    Lastly, there was one exception in the Nos Gestes Climat simulator: all other assets are depreciated on a straight-line basis (the construction footprint is divided by the lifespan of the asset).

    We therefore decided to go back to straight-line depreciation over the life of the car, which is measured in years.

    But we still didn't like the way this worked: it penalised short-distance drivers a lot, and didn't seem very fair in relation to the reality of a vehicle, whose lifespan is expressed more in km.

    So, in the end, we opted for this system: the vehicle's depreciation is based on the number of km driven, in relation to the maximum number of km corresponding to the vehicle's size.
  description.lock: |
    Les discussions ont été animées sur l'amortissement de la voiture. Précédemment, dans le but de décourager l'achat neuf, un amortissement non linéaire avait été imaginé, fortement dégressif dans le temps, sur 10 ans.
    Cet amortissement non linéaire avait le mérite de décourager l'achat, et de bien faire comprendre à l'utilisateur qu'une grande partie de l'empreinte du véhicule est liée à sa production, donc à l'achat neuf.

    Mais cet amortissement non linéaire n'était pas évident à comprendre pour les utilisateurs, et manquait son objectif pédagogique.
    Par ailleurs, il occasionnait un double-discours dans Nos Gestes Climat, car dans les actions proposées aux propriétaires de voitures, nous proposons l'achat d'un véhicule électrique, or celui-ci est fortement pénalisant s'il est acheté neuf dans l'empreinte carbone individuelle.

    Enfin, il était, dans le simulateur Nos Gestes Climat, une exception : tous les autres biens amortis le sont de manière linéaire (l'empreinte de construction est divisée par la durée de vie du bien).

    Nous avions donc fait le choix de revenir pour la voiture à un amortissement linéaire sur la durée de vie de la voiture, une durée de vie en années.

    Mais ce fonctionnement ne nous convenait toujours pas : en effet, elle pénalisait beaucoup les petits rouleurs, et ne paraissait pas très juste par rapport à la réalité d'un véhicule, dont la durée de vie s'exprime plutôt en km.

    C'est donc, finalement, ce choix-là que nous avons fait : l'amortissement du véhicule est fonction du nombre de km parcourus, au regard du nombre de km maximal correspondant au gabarit du véhicule.
