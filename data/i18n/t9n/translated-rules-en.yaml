divers . numérique . internet . diminuer:
  description: |
    Online video accounts for 60% of global data flows and is responsible for almost 1% of global CO2 emissions.

    You can limit your footprint by :
      - deactivating automatic playback in the application settings, for example;
      - choosing downloaded music or streaming audio rather than music videos;
      - choosing to watch videos in lower resolution (low definition rather than high definition)

    But the best thing, of course, is to reduce the amount of time you spend watching videos.

    > More content on our guide <a href="https://librairie.ademe.fr/consommer-autrement/7575-comment-adopter-la-sobriete-numerique--9791029724237.html">"How to adopt digital sobriety"</a>.

    > To estimate the carbon footprint of your digital uses, <a href="https://impactco2.fr/usagenumerique">use our calculator</a>.

    Discover many other tips for reducing your digital footprint on the <a href="https://altimpact.fr/">Alt Impact</a>website
  description.auto: |
