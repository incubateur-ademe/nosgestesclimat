alimentation . plats:
  description: |
    Choose the dishes that represent your typical week. A priori, you'll have 14: 7 lunches and 7 dinners. But you can choose fewer, or more.

    The menus have been designed to be representative of what the French eat.
  description.auto: |
    Choose the dishes that represent your typical week. A priori, you'll have 14: 7 lunches and 7 dinners. But you can choose fewer, or more.

    The menus have been designed to be representative of what the French eat.
  description.lock: |
    Choisissez les plats qui représentent votre semaine type. A priori, vous en aurez 14 : 7 déjeuners et 7 dîners. Mais vous pouvez néanmoins en saisir moins, ou plus.

    Les menus ont été travaillés pour être représentatifs des consommations alimentaires des français.
  mosaique:
    suggestions:
      - vegan
      - vegetarian
      - little meat
      - meat every day
    suggestions.auto:
      - vegan
      - vegetarian
      - little meat
      - meat every day
    suggestions.lock:
      - végétalien
      - végétarien
      - peu de viande
      - viande chaque jour
  note: |
    For the moment, we are proposing 6 typical meals for 6 different diets. It was decided to limit the granularity of the model to 6 menus representing
    the associated diets to simplify the estimation of the footprint of the food item for the user
    (the specific features of each person's diet could be covered by a full simulator dedicated to food).

    They are not directly based on the diets in the Empreinte database, <a href="https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm">documented by ADEME</a>, which are considered obsolete (not very exhaustive, FE not derived from Agribalyse).

    Instead, we worked on typical meals based on a multi-factor consolidation (total quantity of food consumed, quantity of meat and fish consumed, energy intake, average carbon footprint of a meal)
    based on data from <a href="https://www.anses.fr/fr/system/files/NUT2014SA0234Ra.pdf">the INCA 3 study</a>, to approximate the average French diet.

    💡 You can find the full documentation in <a href="https://accelerateur-transition-ecologique-ademe.notion.site/Empreinte-des-repas-NGC-377d2143f3a14b558ab2c8e0426d2e23">our wiki</a>.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1L3p1m2jtbSK7f3i9AYvWIHntXhI_IiVIY9RM6-IxTb8/edit?gid=925636017#gid=925636017">available here</a> in spreadsheet format.
  note.auto: |
    For the moment, we are proposing 6 typical meals for 6 different diets. It was decided to limit the granularity of the model to 6 menus representing
    the associated diets to simplify the estimation of the footprint of the food item for the user
    (the specific features of each person's diet could be covered by a full simulator dedicated to food).

    They are not directly based on the diets in the Empreinte database, <a href="https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm">documented by ADEME</a>, which are considered obsolete (not very exhaustive, FE not derived from Agribalyse).

    Instead, we worked on typical meals based on a multi-factor consolidation (total quantity of food consumed, quantity of meat and fish consumed, energy intake, average carbon footprint of a meal)
    based on data from <a href="https://www.anses.fr/fr/system/files/NUT2014SA0234Ra.pdf">the INCA 3 study</a>, to approximate the average French diet.

    💡 You can find the full documentation in <a href="https://accelerateur-transition-ecologique-ademe.notion.site/Empreinte-des-repas-NGC-377d2143f3a14b558ab2c8e0426d2e23">our wiki</a>.

    🧮 The detailed calculation is <a href="https://docs.google.com/spreadsheets/d/1L3p1m2jtbSK7f3i9AYvWIHntXhI_IiVIY9RM6-IxTb8/edit?gid=925636017#gid=925636017">available here</a> in spreadsheet format.
  note.lock: |
    Pour le moment, nous proposons 6 repas types pour 6 régimes différents. Il a été choisi de limiter la granularité du modèle via 6 menus représentatifs
    des régimes associés pour simplifier l'estimation de l'empreinte du poste alimentation pour l'utilisateur
    (les spécificités de l'alimentation de chacun pourraient donner lieu à un simulateur complet dédié à l'alimentation).

    Ils ne sont pas directement basés sur les régimes de la Base Empreinte, [documentés par l'ADEME](https://www.bilans-ges.ademe.fr/documentation/UPLOAD_DOC_FR/index.htm?repas.htm), jugés obsolètes (peu exhaustifs, FE non issus d'Agribalyse).

    En revanche, nous avons travaillé sur des repas types basés sur une consolidation multi-facteurs (quantité totale d'aliments consommés, quantité de viande et poisson consommés, apports énergétiques, empreinte carbone moyenne d'un repas)
    basé sur les données de [l'étude INCA 3](https://www.anses.fr/fr/system/files/NUT2014SA0234Ra.pdf), permettant de se rapprocher du régime moyen d'un Français.

