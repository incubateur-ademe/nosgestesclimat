transport . voiture:
  description: |
    In France today, cars are mainly combustion-powered (petrol and diesel), although electric cars are making slow progress.

    However, whether electric or combustion-powered, cars are still a highly inefficient means of transport:
    **On average, it is necessary to move a human being weighing 80kg in a metal box weighing 1200kg**.

    It's a bit like making lunch for 10 people every day and then throwing away 90% of the food, or deciding to heat the whole block rather than the inside of each of the 10 houses.

    Finally, it's important to take into account both the use (the kilometres travelled) and the construction of this vehicle, which contains over a tonne of various materials.
  description.auto: |
    In France today, cars are mainly combustion-powered (petrol and diesel), although electric cars are making slow progress.

    However, whether electric or combustion-powered, cars are still a highly inefficient means of transport:
    **On average, it is necessary to move a human being weighing 80kg in a metal box weighing 1200kg**.

    It's a bit like making lunch for 10 people every day and then throwing away 90% of the food, or deciding to heat the whole block rather than the inside of each of the 10 houses.

    Finally, it's important to take into account both the use (the kilometres travelled) and the construction of this vehicle, which contains over a tonne of various materials.
  description.lock: |
    La voiture est aujourd'hui en France essentiellement thermique (essence, diesel), bien que l'électrique progresse lentement.

    Pourtant, électrique ou thermique, elle reste un moyen de déplacement très peu efficient :
    **il s'agit en moyenne de déplacer un humain de 80kg dans une boîte en métal de 1200kg**.

    Un peu comme si chaque midi, nous faisions à manger pour 10 avant de jeter 90% de la nourriture, ou que nous décidions de chauffer tout le pâté de maisons plutôt que l'intérieur de chacune des 10 maisons.

    Notons finalement qu'il est important de prendre en compte à la fois l'usage (les km parcourus) et la construction de ce véhicule de plus d'une tonne de matériaux divers.
  titre: car
  titre.auto: car
  titre.lock: voiture
  note: |
    The detailed calculation and all the assumptions are available on this <a href="https://accelerateur-transition-ecologique-ademe.notion.site/Mod-lisation-de-l-empreinte-carbone-de-la-voiture-1f46523d57d780b3a1a8f1ceb5ff7f87">summary page</a>.
  note.auto: |
    The detailed calculation and all the assumptions are available on this <a href="https://accelerateur-transition-ecologique-ademe.notion.site/Mod-lisation-de-l-empreinte-carbone-de-la-voiture-1f46523d57d780b3a1a8f1ceb5ff7f87">summary page</a>.
  note.lock: |
    Le calcul détaillé et l'ensemble des hypothèses sont disponibles dans cette [page récapitulative](https://accelerateur-transition-ecologique-ademe.notion.site/Mod-lisation-de-l-empreinte-carbone-de-la-voiture-1f46523d57d780b3a1a8f1ceb5ff7f87).
