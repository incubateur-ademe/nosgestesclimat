  description: |
    The rules for attributing the age of the property are crucial here, since building and renovation costs are directly linked to the age of the property via depreciation thresholds.
  description.auto: |
    The rules for attributing the age of the property are crucial here, since building and renovation costs are directly linked to the age of the property via depreciation thresholds.
  description.lock: |
    Les règles d'atttribution de l'âge du logement sont primordiales ici puisque les postes de constructions et rénovation sont directement liées à l'ancienneté du logement via les seuils d'amortissement.
  note: |
    This intermediate variable is necessary because it allows us to consider the age entered in the old simulations, while allowing us to use the 3 new possibilities of dwelling age (we keep the same rule 'dwelling . age', we can even still use this rule for a numerical input).
  note.auto: |
    This intermediate variable is necessary because it allows us to consider the age entered in the old simulations, while allowing us to use the 3 new possibilities of dwelling age (we keep the same rule 'dwelling . age', we can even still use this rule for a numerical input).
