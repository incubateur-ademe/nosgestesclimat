logement . piscine . empreinte carbone:
  titre: carbon footprint
  titre.auto: carbon footprint
  titre.lock: empreinte carbone
  description: |
    This model for calculating the carbon footprint of a swimming pool comes from <a href="https://futur.eco/simulateur/piscine/empreinte">Futur.eco</a>, taken from the <a href="https://github.com/laem/futureco-data/blob/master/data/piscine.yaml">publicodes model</a> with its default values.

    It is the only open model of the carbon footprint of an individual swimming pool published to date.

    In this first version, we do not specifically take into account the use of the filter pump or heating, whose footprint is implicitly calculated as part of the home's energy consumption.
    At a later stage, it could be useful to separate the 2 consumptions to propose more personalised actions.

    Note that the water consumption aspect is not dealt with here as a matter of principle (our calculations focus on carbon emissions), but it is obviously essential to pay attention to it.
  description.auto: |
    This model for calculating the carbon footprint of a swimming pool comes from <a href="https://futur.eco/simulateur/piscine/empreinte">Futur.eco</a>, taken from the <a href="https://github.com/laem/futureco-data/blob/master/data/piscine.yaml">publicodes model</a> with its default values.

    It is the only open model of the carbon footprint of an individual swimming pool published to date.

    In this first version, we do not specifically take into account the use of the filter pump or heating, whose footprint is implicitly calculated as part of the home's energy consumption.
    At a later stage, it could be useful to separate the 2 consumptions to propose more personalised actions.

    Note that the water consumption aspect is not dealt with here as a matter of principle (our calculations focus on carbon emissions), but it is obviously essential to pay attention to it.
  description.lock: |
    Ce modèle de calcul de l'empreinte carbone d'une piscine nous provient de [Futur.eco](https://futur.eco/simulateur/piscine/empreinte), tiré du [modèle publicodes](https://github.com/laem/futureco-data/blob/master/data/piscine.yaml) avec ses valeurs par défaut.

    C'est le seul modèle ouvert d'empreinte carbone d'une piscine individuelle publié à ce jour.

    Dans cette première version, nous ne prenons pas spécifiquement en compte l'utilisation de la pompe de filtrage ou le chauffage dont l'empreinte est implicitement calculée dans les consommations énergétiques du logement.
    Par la suite, il pourrait être intéressant de bien séparer les 2 consommations pour proposer notamment des actions plus personalisées.

    Notez que l'aspect consommation d'eau n'est pas traité ici par principe (nos calculs portent sur les émissions de carbone), mais il est évidemment primordial de s'en soucier.
  note: |
    To help you understand the calculation of the pool's footprint, here are a few points:

      - The water footprint depends on both supply and treatment
      - Water evaporation is not taken into account
      - It is assumed that the pool is refilled every year: this is a strong assumption, but an acceptable one in the sense that people who keep their pool water in winter will use more chemicals.
      - Construction takes many factors into account: masonry, waterproofing, technical equipment, etc. for "concrete" pools, etc
      - Chemical treatment is now a constant. It could be made variable depending on the size of the pool or the number of months it is used.
      - Any pool shelters and accessories such as play equipment are not taken into account for the moment
      - For above-ground pools, the footprint of the chemical treatment is still taken into account, but an arbitrary factor of 2 is applied.

    It is important to note that this calculation model is continually being improved (see https://github.com/laem/futureco-data/issues/97)
  note.auto: |
    To help you understand the calculation of the pool's footprint, here are a few points:

      - The water footprint depends on both supply and treatment
      - Water evaporation is not taken into account
      - It is assumed that the pool is refilled every year: this is a strong assumption, but an acceptable one in the sense that people who keep their pool water in winter will use more chemicals.
      - Construction takes many factors into account: masonry, waterproofing, technical equipment, etc. for "concrete" pools, etc
      - Chemical treatment is now a constant. It could be made variable depending on the size of the pool or the number of months it is used.
      - Any pool shelters and accessories such as play equipment are not taken into account for the moment
      - For above-ground pools, the footprint of the chemical treatment is still taken into account, but an arbitrary factor of 2 is applied.

    It is important to note that this calculation model is continually being improved (see https://github.com/laem/futureco-data/issues/97)
  note.lock: |
    Afin de mieux comprendre le calcul de l'empreinte de la piscine, quelques élements:

      - L'empreinte de l'eau dépend à la fois de l'acheminement et du traitement
      - L'évaporation de l'eau n'est pas prise en compte
      - On considère que la piscine est re-remplie chaque année : c'est une hypothèse forte mais acceptable dans le sens ou les personnes qui conservent l'eau de leur piscine l'hiver consommeront davantage de produits chimiques.
      - La construction prend en compte de nombreux facteurs : maçonnerie, étanchéité, équipements techniques etc...  pour des piscines "béton"
      - Le traitement chimique est aujourd'hui une constante. On pourrait imaginer le variabiliser selon la taile ou le nombre de mois d'utilisation de la piscine.
      - L'éventuel abri de piscine, les acccessoires type jeux ne sont pas pris en compte pour le moment
      - Pour la piscine hors sol, on considère toujours l'empreinte du traitemetn chimique mais on applique un facteur 2 (arbitraire).

    Il est important de noter que ce modèle de calcul est amélioré en continu. (Voir https://github.com/laem/futureco-data/issues/97)
