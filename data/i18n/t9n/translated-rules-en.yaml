alimentation . de saison . consommation:
  description.auto: |
    This question enables us to correct the imprint of your diet on the seasonal nature of your purchases.

    This impact is relatively low, as the proportion of seasonal products represents only 7% of the average French person's diet.

    But that's still something, and the benefits of seasonal consumption don't stop at the climate footprint.

    > But when is an apple or cauliflower in season?
    > Discover our mini-site <a href="https://mesfruitsetlegumesdesaison.fr">Mes fruits et légumes de saison</a>.
  description.lock: |
    Cette question nous permet de corriger l'empreinte de votre régime alimentaire en fonction de votre habitude sur le caractère de saison de vos achats.

    Cet impact est relativement faible, car la part de produits de saison représente seulement 7% de l'alimentation moyenne d'un Français.

    Mais c'est toujours ça de gagné, et les avantages d'une consommation de saison ne s'arrêtent pas à l'empreinte climat.

    > Mais quelle est la saison d'une pomme, d'un chou-fleur ?
    > Découvrez notre mini-site [Mes fruits et légumes de saison](https://mesfruitsetlegumesdesaison.fr).
  note: See details of the calculation approach [here](http://nosgestesclimat/documentation/alimentation/de-saison/pourcentage-saisonable)
  note.auto: See details of the calculation approach <a href="http://nosgestesclimat/documentation/alimentation/de-saison/pourcentage-saisonable">here</a>
  note.lock: Voir détail de l'approche de calcul [ici](http://nosgestesclimat/documentation/alimentation/de-saison/pourcentage-saisonable)
  question: How often do you eat seasonal fruit and vegetables?
  question.auto: How often do you eat seasonal fruit and vegetables?
  question.lock: À quelle fréquence consommez vous des fruits et légumes de saison ?
