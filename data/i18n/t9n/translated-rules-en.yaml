divers . textile . réduire neuf . diviser par deux achats:
  titre: Buy half as many clothes
  titre.auto: Buy half as many clothes
  titre.lock: Acheter deux fois moins de vêtements
  description: |-
    Every year in France, almost 3.3 billion items of clothing, footwear and household linen are put on the market, more than twice as many as in the 1980s. Clothes are sold at attractive prices, so more are being bought than a few years ago. And that's not without its problems.

    The manufacture of clothing involves numerous stages and processes that generate pollution. What's more, textile workers have to work in very difficult conditions.

    To limit the impact of your clothes, make them last, buy less and buy second-hand more often.

    > <a href="https://quefairedemesobjets.ademe.fr/seconde-main/">Use this simulator to</a> find all the second-hand clothes shops, depots, recycling centres and second-hand shops in your area.

    > Dive behind the scenes of fashion and fast-fashion with <a href="https://librairie.ademe.fr/consommer-autrement/7747-tout-comprendre-les-impacts-de-la-mode-et-de-la-fast-fashion-9791029724602.html">this guide to everything you need to know
    </a>
  description.auto: |-
    Every year in France, almost 3.3 billion items of clothing, footwear and household linen are put on the market, more than twice as many as in the 1980s. Clothes are sold at attractive prices, so more are being bought than a few years ago. And that's not without its problems.

    The manufacture of clothing involves numerous stages and processes that generate pollution. What's more, textile workers have to work in very difficult conditions.

    To limit the impact of your clothes, make them last, buy less and buy second-hand more often.

    > <a href="https://quefairedemesobjets.ademe.fr/seconde-main/">Use this simulator to</a> find all the second-hand clothes shops, depots, recycling centres and second-hand shops in your area.

    > Dive behind the scenes of fashion and fast-fashion with <a href="https://librairie.ademe.fr/consommer-autrement/7747-tout-comprendre-les-impacts-de-la-mode-et-de-la-fast-fashion-9791029724602.html">this guide to everything you need to know
    </a>
  description.lock: |
    Chaque année en France, près de 3,3 milliards de vêtements, chaussures, linge de maison sont mis sur le marché, soit plus de deux fois plus que dans les années 80. Les vêtements sont vendus à des prix attractifs ; on en achète donc plus qu’il y a quelques années. Et cela n’est pas sans poser de problèmes.

    La fabrication des vêtements comprend de nombreuses étapes et procédés qui génèrent des pollutions. De plus, les ouvriers du textile travaillent dans des conditions très difficiles.

    Pour limiter les impacts des vêtements, faites-les durer, achetez moins et plus souvent d’occasion.

    > Découvrez toutes les friperies, dépôts-vente, ressourceries et magasin de seconde main de votre quartier [sur ce simulateur](https://quefairedemesobjets.ademe.fr/seconde-main/).

    > Plongez dans l'envers du décor de la mode et de la fast-fashion avec [ce guide pour tout comprendre](https://librairie.ademe.fr/consommer-autrement/7747-tout-comprendre-les-impacts-de-la-mode-et-de-la-fast-fashion-9791029724602.html)
