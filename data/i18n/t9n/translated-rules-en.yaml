divers . publicité:
  description: |-
    Advertising and marketing often encourage us to buy things we don't really need and to renew our equipment quickly.

    Sales periods and promotions sometimes encourage us to buy things we don't need, so as not to miss out on a "bargain".

    Avoiding these large-scale purchases and not renewing items that still work will help to reduce your impact on the climate.

    Find out more about ADEME's advice on how to adopt a more sober and sustainable consumption style: https://agirpourlatransition.ademe.fr/particuliers/conso

    > Before buying a new object, give yourself a few minutes to think about it and <a href="https://mtaterre.fr/ressource/infographie-5-questions-a-se-poser-avant-dacheter/">ask yourself these 5 questions</a>.

    > Focus on clothing with this dossier on <a href="https://librairie.ademe.fr/consommer-autrement/7747-tout-comprendre-les-impacts-de-la-mode-et-de-la-fast-fashion-9791029724602.html">the impact of fashion and fast-fashion
    </a>
