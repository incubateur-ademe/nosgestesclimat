divers . textile . indice de durabilité moyen:
  titre: Average durability coefficient
  titre.auto: Average durability coefficient
  titre.lock: Coefficient de durabilité moyen
  description: |
    We have chosen to work with an overall sustainability coefficient for all garments, as opposed to a more specific, item-by-item approach. There is no reason to buy T-shirts differently from trousers

    We decided to work with 2 sets of data: the average number of wears per garment, taken from the <a href="https://pefapparelandfootwear.eu/">PEFCR</a>, European methodologies for the textile industry, and also the number of garments actually purchased per year. Crossed with the number of times in the year that the garment can be worn and the number of 'active' garments in the wardrobe, we obtain a real number of wears.

    For each garment, we calculated an average durability coefficient according to the formula: `durability coefficient = actual number of wears / average number of wears`, bearing in mind that the value of this coefficient is restricted to between 0.67 and 1.45. This gives an average figure of 0.91 for average purchases.
  description.auto: |
    We have chosen to work with an overall sustainability coefficient for all garments, as opposed to a more specific, item-by-item approach. There is no reason to buy T-shirts differently from trousers

    We decided to work with 2 sets of data: the average number of wears per garment, taken from the <a href="https://pefapparelandfootwear.eu/">PEFCR</a>, European methodologies for the textile industry, and also the number of garments actually purchased per year. Crossed with the number of times in the year that the garment can be worn and the number of 'active' garments in the wardrobe, we obtain a real number of wears.

    For each garment, we calculated an average durability coefficient according to the formula: `durability coefficient = actual number of wears / average number of wears`, bearing in mind that the value of this coefficient is restricted to between 0.67 and 1.45. This gives an average figure of 0.91 for average purchases.
  description.lock: |
    Nous avons choisi de travailler avec un coefficient de durabilité global sur l'ensemble des vêtements, contrairement à une approche plus spécifique, item par item. En effet, il n'y a pas de raison d'avoir une pratique d'achat différente pour ses tee-shirts par rapport à ses pantalons

    Nous avons décidé de travailler avec 2 jeux de données: le nombre de portés moyen par vêtement, issu du [PEFCR](https://pefapparelandfootwear.eu/), méthodologies européennes pour l'industrie textile, et également le nombre de vêtements réellement achetés par an. Croisés avec le nombre de fois dans l'année pendant lesquels le vêtement peut être porté et le nombre de vêtements "actifs" dans la garde-robe, on obtient un nombre de portés réels.

    Pour chaque vêtement, nous avons calculé un coefficient de durabilité moyen selon la formule : `coefficient de durabilité = nombre de portés réel / nombre de portés moyen`, sachant que la valeur de ce coefficient est retreint entre 0,67 et 1,45. On obtient en moyenne un chiffre de 0.91 pour les achats moyens.
