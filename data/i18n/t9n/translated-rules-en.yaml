transport . voiture . limitation autoroute . réduction:
  description: |
    ![](https://imgur.com/NB9CUUt.jpg)
    From this graph, by graphical deduction (we have not yet gone back to the <a href="http://theses.univ-lyon2.fr/documents/getpart.php?id=1026&action=pdf">study</a> data, page 151 figure 26), we find the data below.

    Diesel: 6.5 l/100 at 130km/h -> 4.75 at 110km/h

    Gasoline: 11.75 l/100 at 130km/h -> 8.65 at 110km/h

    So -27% in diesel and -26% in petrol by going from 130 to 110. We keep the order of magnitude of 25%.
  description.auto: |
    ![](https://imgur.com/NB9CUUt.jpg)
    From this graph, by graphical deduction (we have not yet gone back to the <a href="http://theses.univ-lyon2.fr/documents/getpart.php?id=1026&action=pdf">study</a> data, page 151 figure 26), we find the data below.

    Diesel: 6.5 l/100 at 130km/h -> 4.75 at 110km/h

    Petrol: 11.75 l/100 at 130km/h -> 8.65 at 110km/h

    So -27% in diesel and -26% in petrol by going from 130 to 110. We keep the order of magnitude of 25%.
  description.lock: |
    ![](https://imgur.com/NB9CUUt.jpg)
    D'après ce graphique, par déduction graphique (nous n'avons pas encore remonté aux données [de l'étude](http://theses.univ-lyon2.fr/documents/getpart.php?id=1026&action=pdf), page 151 figure 26), on trouve les données ci-dessous.

    Diesel : 6.5 l/100 à 130km/h -> 4.75 à 110km/h

    Essence : 11.75 l/100 à 130km/h -> 8.65 à 110km/h

    Donc -27% en diesel et - 26% en essence en passant de 130 à 110. Nous retenons l'ordre de grandeur de 25%.
  note: |
    This calculation should be refined.
    Some sources to investigate for the calculation.
    - a citizen who makes his test for a clio. He finds a reduction between -20% and -50% !
       https://twitter.com/CptQwark_/status/1289499582871658499
       Another citizen finds rather -10% with a bigger car
    - <a href="<https://www.ecologie.gouv.fr/sites/default/files/Théma - Reduction of speeds on the roads.pdf>">Report of the CGDD</a>, where we have not found for the moment the explanation of the calculation of CO₂ savings
    - Aurélien Bigo who criticizes the CGDD report https://twitter.com/AurelienBigo/status/1276459283291439114, but who does not give us any information about the calculation of the CO₂ itself.
    - another evaluation, which gives us the calculation :)  : https://twitter.com/Tomsawy22670318/status/1274257122373570565
      Attention, to be rigorous, as mentioned in this last thread, it is necessary to take into account the distribution of the speed and the category of car (presence of a 6th gear for example). Obviously, we do not drive at 130 all the time.
  note.auto: |
    This calculation should be refined.
    Some sources to investigate for the calculation.
    - a citizen who makes his test for a clio. He finds a reduction between -20% and -50% !
       https://twitter.com/CptQwark_/status/1289499582871658499
       Another citizen finds rather -10% with a bigger car.
    - <a href="<https://www.ecologie.gouv.fr/sites/default/files/Théma - Réduction des vitesses sur les routes.pdf>">Report of the CGDD</a>, where we did not find for the moment the explanation of the calculation of the CO₂ saving
    - Aurélien Bigo who criticizes the report of the CGDD https://twitter.com/AurelienBigo/status/1276459283291439114, but who does not give us any information on the calculation of the CO₂ itself.
    - another evaluation, which gives us the calculation :)  : https://twitter.com/Tomsawy22670318/status/1274257122373570565
      Attention, to be rigorous, as mentioned in this last thread, it is necessary to take into account the distribution of the speed and the category of car (presence of a 6th gear for example). Obviously, we do not drive at 130 all the time.
  note.lock: |
    Il faudrait affiner ce calcul.
    Quelques sources à investiguer pour le calcul.
    - un citoyen qui fait son test pour une clio. Il trouve une réduction entre -20% et -50% !
       https://twitter.com/CptQwark_/status/1289499582871658499
       Un autre citoyen trouve plutôt -10% avec une plus grosse voiture.
    - [Rapport du CGDD](<https://www.ecologie.gouv.fr/sites/default/files/Théma - Réduction des vitesses sur les routes.pdf>), où nous n'avons pas trouvé pour l'instant l'explication du calcul de l'économie de CO₂
    - Aurélien Bigo qui critique le rapport du CGDD https://twitter.com/AurelienBigo/status/1276459283291439114, mais qui ne nous donne pas d'infos sur le calcul du CO₂ lui même.
    - une autre évaluation, qui elle nous donne le calcul :)  : https://twitter.com/Tomsawy22670318/status/1274257122373570565
      Attention, pour être rigoureux, comme évoqué dans ce dernier fil, il faut prendre en compte la distribution de la vitesse et la catégorie de voiture (présence d'une 6ème vitesse par exemple). On ne roule évidement pas tout le temps à 130.
