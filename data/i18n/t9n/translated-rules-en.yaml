empreinte branche . E36 par hab . services publics:
  description: |
    The water distribution system <a href="https://www.vie-publique.fr/eclairage/24024-le-service-public-local-de-leau-potable-et-de-lassainissement">is a public service</a>, although it is often operated by private companies, at the discretion of the municipality.

    Everyone has easy access to running water in France.

    It would be possible in a future version to modulate the individual footprint according to water consumption, as is done for electricity and other energy sources, but let's keep in mind that this item, along with the climate indicator, is very low.
