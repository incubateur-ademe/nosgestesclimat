  note: |
    At present, we include the following branches:

    - Manufacture of musical instruments (C32.2, except for the part in public services, corresponding to 1% of C32)

    It could be interesting to integrate (but this is not the case at the moment):

    - Retail sale of musical instruments and sheet music (G47.00.58 but we do not have this level of detail: it belongs to the subcategory Retail sale of furniture, lighting equipment and other household articles in specialised shops, corresponding to 0.34 * 0.10 * G47)
    - Music instruction (P85.52.12: currently counted entirely in public services)
    - Repair and maintenance services of musical instruments (S95.29.13: currently counted in "current expenditure / new goods")
  note.auto: |
    At present, we include the following branches:

    - Manufacture of musical instruments (C32.2, except for the part in public services, corresponding to 1% of C32)

    It could be interesting to integrate (but this is not the case at the moment):

    - Retail sale of musical instruments and sheet music (G47.00.58 but we do not have this level of detail: it belongs to the subcategory Retail sale of furniture, lighting equipment and other household articles in specialised shops, corresponding to 0.34 * 0.10 * G47)
    - Music instruction (P85.52.12: currently counted entirely in public services)
    - Repair and maintenance services of musical instruments (S95.29.13: currently counted in "current expenditure / new goods")
  note.lock: |
    Actuellement, nous prenons ici en compte les branches :

    - Fabrication d'instruments de musique (C32.2, excepté la part présente dans les services publics, correspondant à 1% de C32)

    Il pourrait être intéressant de réussir à intégrer (mais ce n'est pas le cas pour le moment):

    - Commerce de détail d'instruments de musique et de partitions musicales (G47.00.58 mais nous n'avons pas ce niveau de détail : il appartient à la sous-catégorie Commerce de détail de meubles, appareils d'éclairage et autres articles de ménage en magasin spécialisé, correspondant à 0.34 * 0.10 * G47)
    - Enseignement musical (P85.52.12 : entièrement compté dans les services publics actuellement)
    - Services de réparation et entretien d'instruments de musique (S95.29.13 : actuellement compté dans la question "dépenses courantes / produits neufs")
