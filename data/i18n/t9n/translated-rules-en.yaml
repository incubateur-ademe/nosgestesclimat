  description: |
    Sharing a flat is not only great for sharing bills and creating social links, it's also a way of reducing your impact on the climate by sharing space, consumption and equipment.

    We tend to want to live in larger homes, but this contributes to urban sprawl and the artificialization of land. What's more, building new homes consumes a lot of energy and increases greenhouse gas emissions.

    Sharing living space is therefore one way of reducing our impact on the climate.
  description.auto: |
    Sharing a flat is not only great for sharing bills and creating social links, it's also a way of reducing your impact on the climate by sharing space, consumption and equipment.

    We tend to want to live in larger homes, but this contributes to urban sprawl and the artificialization of land. What's more, building new homes consumes a lot of energy and increases greenhouse gas emissions.

    Sharing living space is therefore one way of reducing our impact on the climate.
  description.lock: |
    Vivre en colocation n'est pas seulement intéressant pour partager les factures et créer des liens sociaux, c'est aussi un moyen de réduire son empreinte sur le climat en mutualisant les espaces, les consommations et les équipements.

    Nous avons tendance à vouloir vivre dans de plus grands logements mais cela contribue à l’étalement urbain et à l’artificialisation des sols. De plus, la construction de nouveaux logements consomme beaucoup d’énergie et augmente les émissions de gaz à effet de serre.

    Partager des espaces de vie est donc une solution pour diminuer notre impact sur le climat.
  titre: Sharing your home
  titre.auto: Sharing your home
  titre.lock: Partager son logement
