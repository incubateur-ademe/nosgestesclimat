transport . train . km par défaut:
  titre: km default
  titre.auto: km default
  titre.lock: km par défaut
  note: |
    According to the <a href="https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transports/fr/16-transport-ferroviaire-de-voyageurs"> SDES's "Chiffres clés des transports"</a>, rail transport (excluding Eurotunnel) will account for 107 billion passenger-km in 2023. This figure probably takes into account journeys made by foreign passengers, but it can nevertheless be used to obtain a good approximation of the average distance travelled by French people by train.
  note.auto: |
    According to the <a href="https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transports/fr/16-transport-ferroviaire-de-voyageurs"> SDES's "Chiffres clés des transports"</a>, rail transport (excluding Eurotunnel) will account for 107 billion passenger-km in 2023. This figure probably takes into account journeys made by foreign passengers, but it can nevertheless be used to obtain a good approximation of the average distance travelled by French people by train.
  note.lock: |
    Selon les ["Chiffres clés des transports" du SDES](https://www.statistiques.developpement-durable.gouv.fr/edition-numerique/chiffres-cles-transports/fr/16-transport-ferroviaire-de-voyageurs), le transport ferroviaire (hors Eurotunnel) représente 107 milliards de passagers-km en 2023. Ce chiffre prend vraisemblablement en compte les trajets effectués par des voyageurs étrangers mais on peut néanmoins utiliser ce chiffre pour obtenir une bonne approximation de la distance moyenne parcourue en train par français.
