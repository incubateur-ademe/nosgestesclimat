    If you absolutely must fly, you can reduce the carbon impact of a flight by opting for the longest possible stay, avoiding stopovers (take-off is a major source of greenhouse gas emissions) and travelling light.

    If you want to go far away, try not to multiply your flights by taking longer holidays. Avoid air travel for short holidays of a few days several times a year.
