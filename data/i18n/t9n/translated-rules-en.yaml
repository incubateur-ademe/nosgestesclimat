    According to the study <a href="https://www.culture.gouv.fr/Media/Thematiques/Etudes-et-statistiques/Files/Publications/Culture-etudes/20212/Note-de-synthese-CREDOC">"Visiting museums, exhibitions and monuments in 2019"</a>,
    "69% of the population claim to have visited at least one monument, museum or exhibition".
    This figure is different from that found by summing up occasional and amateur visitors (which may exclude visitors to temporary exhibitions).
