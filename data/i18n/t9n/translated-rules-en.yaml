    | Period | Distribution (%) |
    |----------------|----------------|
    | Before 1919 | 7.2 |
    | 1919-1945 | 5,4 |
    | 1946-1970 | 15,7 |
    | 1971-1990 | 32,0 |
    | 1991-2005 | 21,3 |
    | 2006-2017 | 18,4 |

    By assigning a median bracket for each period, we obtain a weighted average age of around 41 years. Assuming that the housing stock is growing each year while generally ageing, this value can be rounded up to 45 years for 2025.

    NB: For Paris, <a href="https://www.comeetie.fr/galerie/BatiParis">this</a> interactive <a href="https://www.comeetie.fr/galerie/BatiParis">map</a> is fascinating if you are interested in the age of its housing stock.
  note.lock: |
    Il n'est pas évident de trouver un "chiffre moyen" pour l'âge des logements en France. Néanmoins, l'[INSEE](https://www.insee.fr/fr/statistiques/7632072?geo=EPCI-242900553&sommaire=7632098) fournit, jusqu'à 2018, les tranches d'ancienneté des résidences principales en France métropolitaine, à savoir :

    | Période        | Répartition (%) |
    |----------------|----------------|
    | Avant 1919     | 7,2            |
    | 1919–1945      | 5,4            |
    | 1946–1970      | 15,7           |
    | 1971–1990      | 32,0           |
    | 1991–2005      | 21,3           |
    | 2006–2017      | 18,4           |

    En affectant une tranche médiane pour chaque période, on obtient un âge moyen pondéré d'environ 41 ans. En considérant que le parc de logements s'agrandit chaque année tout en vieillissant de manière générale, on peut arrondir cette valeur à 45 ans pour 2025.

    NB: Pour Paris, [cette carte](https://www.comeetie.fr/galerie/BatiParis) interactive est fascinante si la question de l'âge de ses logements vous intéresse.
