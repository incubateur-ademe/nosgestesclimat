alimentation . repas . réduire viande . max 1 par jour:
  titre: Reduce meat to one meal a day
  titre.auto: Reduce meat to one meal a day
  titre.lock: Réduire la viande à un repas par jour
  description: |
    Do you eat meat at every meal?

    To easily reduce your consumption of animal proteins, eat meat only once a day and in smaller quantities. That's a good start to limiting your carbon footprint.
  description.auto: |
    Do you eat meat at every meal?

    To easily reduce your consumption of animal proteins, eat meat only once a day and in smaller quantities. That's a good start to limiting your carbon footprint.
  description.lock: |
    Vous consommez de la viande à tous les repas ?

    Pour réduire facilement votre consommation de protéines animales, ne consommez de viande qu’une fois par jour et en plus petite quantité. C’est un bon début pour limiter votre empreinte carbone.
alimentation . repas . réduire viande . max 1 par jour . nouveau régime:
  titre: new regime
  titre.auto: new regime
  titre.lock: nouveau régime
alimentation . repas . réduire viande . max 2 par semaine:
  titre: Limit meat to two meals a week
  titre.auto: Limit meat to two meals a week
  titre.lock: Limiter la viande à deux repas par semaine
  description: |
    Do you want to reduce your carbon footprint by changing your eating habits and eating fewer animal products?

    By not eating meat more than twice a week, you can significantly reduce your greenhouse gas emissions.

    Alternatively, you can divide your meat portions by 2 and eat it more often in the week, but in smaller quantities.

    Find out more tips for eating well while limiting your impact on the environment <a href="https://agirpourlatransition.ademe.fr/particuliers/conso/alimentation">on our website Agir</a>.
  description.auto: |
    Do you want to reduce your carbon footprint by changing your eating habits and eating fewer animal products?

    By not eating meat more than twice a week, you can significantly reduce your greenhouse gas emissions.

    Alternatively, you can divide your meat portions by 2 and eat it more often in the week, but in smaller quantities.

    Find out more tips for eating well while limiting your impact on the environment <a href="https://agirpourlatransition.ademe.fr/particuliers/conso/alimentation">on our website Agir</a>.
  description.lock: |
    Vous voulez réduire votre empreinte carbone en changeant vos habitudes alimentaires et en consommant moins de produits d'origine animale ?

    Ne pas manger de viande plus de deux fois par semaine, vous permettra de réduire de façon importante vos émissions de gaz à effet de serre.

    Autre possibilité : vous pouvez diviser les portions de viande par 2 pour en consommer plus souvent dans la semaine mais en petite quantité.

    Découvrez d’autres conseils pour bien manger en limitant ses impacts sur l’environnement [sur notre site Agir](https://agirpourlatransition.ademe.fr/particuliers/conso/alimentation).
alimentation . repas . réduire poisson . max 2 par semaine:
  titre: Reduce fish to two meals a week
  titre.auto: Reduce fish to two meals a week
  titre.lock: Réduire le poisson à deux repas par semaine
  description: |
    Do you want to reduce your carbon footprint by changing your eating habits, eating less animal products and preserving marine resources?

    By not eating fish more than twice a week, you can significantly reduce your greenhouse gas emissions. It's also a good way of avoiding the depletion of certain species of fish that are fished too heavily.
  description.auto: |
    Do you want to reduce your carbon footprint by changing your eating habits, eating less animal products and preserving marine resources?

    By not eating fish more than twice a week, you can significantly reduce your greenhouse gas emissions. It's also a good way of avoiding the depletion of certain species of fish that are fished too heavily.
  description.lock: |
    Vous voulez réduire votre empreinte carbone en changeant vos habitudes alimentaires et en consommant moins de produits d'origine animale et en préservant les ressources de la mer ?

    Ne pas manger de poisson plus de plus de deux fois par semaine, vous permettra de réduire de façon importante vos émissions de gaz à effet de serre. C’est aussi un bon moyen d’éviter la raréfaction de certaines espèces de poisson trop pêchées.
