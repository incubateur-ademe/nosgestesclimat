  titre.auto: Refurbishment work
  titre.lock: Travaux de rafraîchissement
  description: |
    Every 10 years, refurbishment work is _by default_ considered to have been carried out. These are minor works to make the home more comfortable (painting, flooring, etc.).

    This type of work is also carried out on very recent homes: it can be considered to be finishing work that is not taken into account in the construction footprint defined by the RE2020.

    They are therefore always taken into account in the calculation of the footprint.
  description.auto: |
    Every 10 years, refurbishment work is _by default_ considered to have been carried out. These are minor works to make the home more comfortable (painting, flooring, etc.).

    This type of work is also carried out on very recent homes: it can be considered to be finishing work that is not taken into account in the construction footprint defined by the RE2020.

    They are therefore always taken into account in the calculation of the footprint.
  description.lock: |
    Tous les 10 ans, on considère _par défaut_ que des travaux de rafraîchissement sont réalisés. On parle de petits travaux pour le confort du logement (peintures, revêtement de sol, etc.).

    Ces travaux sont également attribués aux logements très récents : on peut considérer que ce sont les travaux de second d'oeuvre qui ne sont pas pris en compte dans l'empreinte de construction définie par la RE2020.

    Ils sont donc toujours pris en compte dans le calcul de l'empreinte.
  note: |
    This emission factor is the result of a <a href="https://www.architectes.org/actualites/quel-est-le-poids-carbone-des-logements-avec-ou-sans-renovation-92667">joint study by CentraleSupélec and the Observatoire de l'Immobilier Durable (OID</a>).
