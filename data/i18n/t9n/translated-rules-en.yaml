    gave a potential reduction of 2.4kg/inhabitant/year by consuming in bulk.

    <a href="https://librairie.ademe.fr/consommer-autrement/5064-panorama-et-evaluation-environnementale-du-vrac-en-france.html">Another ADEME study</a>
    more recent and more complete is to be investigated to specify this impact.

    We could also act directly on the quantity of packaging, cardboard and plastic, of the waste sub-items. (e.g. food . waste . gestures . omr . plastics . quantity)
