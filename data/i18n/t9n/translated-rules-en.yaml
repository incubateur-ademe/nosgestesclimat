divers . loisirs . sports:
  titre: Sports
  titre.auto: Sports activities
  titre.lock: Pratiques sportives
  question: What sports do you practice regularly?
  question.auto: What sports do you play regularly?
  question.lock: Quels sont les sports que vous pratiquez régulièrement ?
  note: |
    The notion of regularity is deliberately imprecise, as it depends on the sports practised and the level of the athlete.

    For example, sailing once a month might be considered regular, while jogging once a month might be considered anecdotal.

    Also, a "committed" sportsman will consider regular practice to mean several training sessions a week, while a more amateur sportsman may set the bar a little lower.
  note.auto: |
    The notion of regularity is deliberately imprecise, as it depends on the sports practised and the level of the athlete.

    For example, sailing once a month might be considered regular, while jogging once a month might be considered anecdotal.

    Also, a "committed" sportsman will consider regular practice to mean several training sessions a week, while a more amateur sportsman may set the bar a little lower.
  note.lock: |
    La notion de régularité est volontairement imprécise, car elle dépend des sports pratiqués ainsi que du niveau du sportif.

    Ainsi, on pourra estimer que faire de la voile une fois par mois est une pratique régulière, alors que faire un footing par mois est une pratique anecdotique.

    Également, un sportif "engagé" considérera qu'une pratique régulière implique plusieurs entraînements par semaine, quand un sportif plus amateur placera peut-être la barre un peu plus bas.
divers . loisirs . sports . empreinte sportif:
  titre: Sports leisure footprint
  titre.auto: Sports leisure footprint
  titre.lock: Empreinte des loisirs sportifs
  note: |
    > There are so many questions that could be asked to estimate the footprint of sports-related leisure activities...

    To be exhaustive, we'd need to list all existing sports, ask about frequency of practice, facilities used, whether or not people belong to a club, and how often personal equipment is renewed.

    But that would be far too many questions, given the weight of sport in the final footprint.

    > For the moment, we estimate this footprint using a "macro" approach, i.e. we start with the footprint of the sector in France, which we then relate to the individual, weighting the values using "market" data: number of people practising, number of club members...

    The macro subdivision we have at our disposal enables us to isolate: the use of sports facilities or general sports services (attributed to all sportsmen and women), sports club membership (attributed to all sportsmen and women whose sport is *majority* club-based), and fitness club membership (attributed to those who tick "gym or weight room").

    In addition, a study carried out on behalf of the resorts of Tignes, Le Grand Bornand and La Clusaz has enabled us to allocate a footprint to winter sports enthusiasts.
  note.auto: |
    > There are so many questions that could be asked to estimate the footprint of sports-related leisure activities...

    To be exhaustive, we'd need to list all existing sports, ask about frequency of practice, facilities used, whether or not people belong to a club, and how often personal equipment is renewed.

    But that would be far too many questions, given the weight of sport in the final footprint.

    > For the moment, we estimate this footprint using a "macro" approach, i.e. we start with the footprint of the sector in France, which we then relate to the individual, weighting the values using "market" data: number of people practising, number of club members...

    The macro subdivision we have at our disposal enables us to isolate: the use of sports facilities or general sports services (attributed to all sportsmen and women), sports club membership (attributed to all sportsmen and women whose sport is *majority* club-based), and fitness club membership (attributed to those who tick "gym or weight room").

    In addition, a study carried out on behalf of the resorts of Tignes, Le Grand Bornand and La Clusaz has enabled us to allocate a footprint to winter sports enthusiasts.
  note.lock: |
    > Il y aurait tant de questions à poser pour estimer l'empreinte liée aux loisirs sportifs...

    Pour être exhaustif, il nous faudrait lister l'intégralité des sports existants, demander une fréquence de pratique, les infrastructures utilisées, l'adhésion ou non à un club et la fréquence de renouvellement du matériel personnel utilisé.

    Mais cela représenterait un nombre de questions bien trop important au regard du poids du sport dans l'empreinte finale.

    > Pour le moment, nous estimons cette empreinte avec une approche dite "macro", à savoir que nous partons de l'empreinte du secteur en France que nous rapportons à l'individu, en pondérant les valeurs grâce à des données "marché" : quantité de pratiquants, d'adhérents à des clubs...

    La subdivision macro dont nous disposons nous permet d'isoler : l'utilisation d'infrastructures sportives ou de services sportifs généraux (attribués à tous les sportifs), l'appartenance à un club de sport (attribuée à tous les sportifs dont le sport se pratique *majoritairement* en club), et l'adhésion à un club de fitness (attribuée à ceux qui cochent "salle de sport ou de musculation").

    En complément, une étude réalisé pour le compte des stations de Tignes, le Grand Bornand et la Clusaz nous permet d'attribuer aux pratiquants de sports d'hiver une empreinte dédiée à cette pratique.
