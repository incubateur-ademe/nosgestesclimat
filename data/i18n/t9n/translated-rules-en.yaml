transport . avion:
  description: |
    The aircraft's footprint is substantial. It is not necessarily more polluting *per kilometre* than a car that only moves one person,
    but the distance, and especially the distance covered in an hour (commonly referred to as speed), means that you can change continents for a weekend.

    We should also bear in mind that the average French person takes few or no flights. Most of the aviation footprint is therefore concentrated on 10% or less of the French population.
  description.auto: |
    The aircraft's footprint is substantial. It is not necessarily more polluting *per kilometre* than a car that only moves one person,
    but the distance, and especially the distance covered in an hour (commonly referred to as speed), means that you can change continents for a weekend.

    We should also bear in mind that the average French person takes few or no flights. Most of the aviation footprint is therefore concentrated on 10% or less of the French population.
  description.lock: |
    L'empreinte de l'avion est conséquente. Il n'est pas forcément plus polluant *au kilomètre* qu'une voiture qui ne déplace qu'une personne,
    mais la distance et surtout la distance parcourue en une heure (qu'on appelle couramment la vitesse), permet de changer de continent pour un week-end.

    Gardons aussi en tête que le Français moyen ne prend pas ou peu l'avion. L'essentiel de l'empreinte de l'aviation est donc concentrée sur 10% ou moins des Français.
  note: |
    We have chosen to ask for the total number of flight hours, rather than asking the user to enter information for each of their flights
    via the departure and arrival airports and the economy class. This is a possible future development. It should also be noted that stopovers lead to additional take-offs, which consume more fuel than a normal speed
    fuel than a cruising speed. This is another parameter to be taken into account later on.
  note.auto: |
    We have chosen to ask for the total number of flight hours, rather than asking the user to enter information for each of their flights
    via the departure and arrival airports and the economy class. This is a possible future development. It should also be noted that stopovers lead to additional take-offs, which consume more fuel than a normal speed
    fuel than a cruising speed. This is another parameter to be taken into account later on.
  note.lock: |
    Nous avons fait le choix de demander le total d'heures de vol, plutôt que de demander à l'utilisateur de renseigner chacun de ses vols
    via l'aéroport de départ, d'arrivée et la classe économique. C'est une évolution possible par la suite. A noter aussi que les escales entrainent des décollages supplémentaires, qui consomment plu
    s de carburant qu'une vitesse de croisière. C'est aussi un paramètre à prendre en compte par la suite.
