  titre: Average number of nights per French person
  titre.auto: Average number of nights per French person
  titre.lock: Nombre de nuitées en moyenne par français
  note: |
    According to <a href="https://cruising.org/sites/default/files/2025-06/CLIA%20001%20Overview%20Global%202024%20Annual%20Report%20w%20Cover.pdf">CLIA (Cruise Lines International Association)</a>, in 2024 there will be 573,000 cruise passengers in France. This survey also gives an average cruise duration of 9 days, or 8 nights.

     This gives an average number of nights per French person. However, there is a limit to this figure, as we have no information on the uniqueness of a passenger: an individual may be a passenger several times over. And we do not know whether French passengers are of French nationality or boarding in France.
  note.auto: |
    According to <a href="https://cruising.org/sites/default/files/2025-06/CLIA%20001%20Overview%20Global%202024%20Annual%20Report%20w%20Cover.pdf">CLIA (Cruise Lines International Association)</a>, in 2024 there will be 573,000 cruise passengers in France. This survey also gives an average cruise duration of 9 days, or 8 nights.

     This gives an average number of nights per French person. However, there is a limit to this figure, as we have no information on the uniqueness of a passenger: an individual may be a passenger several times over. And we do not know whether French passengers are of French nationality or boarding in France.
  note.lock: |
    D'après la [CLIA (Cruise Lines International Association)](https://cruising.org/sites/default/files/2025-06/CLIA%20001%20Overview%20Global%202024%20Annual%20Report%20w%20Cover.pdf), en 2024, on comptait en France 573 000 passagers. Cette enquête donne également une durée moyenne de 9 jours par croisière, soit 8 nuitées.

     On obtient donc un nombre de nuitées moyen par français. Néanmoins, il existe une limite sur cette valeur puisque nous n'avons pas d'information sur le caractère unique d'un passager : un individu peut éventuellement être plusieurs fois passager. Et nous ne savons pas si les passagers français sont de nationalités française ou embarquant en France.
