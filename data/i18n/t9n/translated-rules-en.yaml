parc français . CEREN:
  titre: CEREN
  titre.auto: CEREN
  titre.lock: CEREN
  description: |

    > ℹ️ This rule comes from the <a href="https://github.com/incubateur-ademe/publicodes-empreinte-carbone-chauffage">`@incubator-ademe/publicodes-carbon-footprint-heating`</a> model.


    This model is based on the Ceren and SDES dataset <a href="https://www.statistiques.developpement-durable.gouv.fr/consommation-denergie-par-usage-du-residentiel">Energy consumption by residential use</a>, for the year 2023.

    The SDES-CEREN excel gives us access to the surface area of dwellings by main energy source on the one hand, and total consumption by main and auxiliary energy on the other. Combining these data tends to increase consumption per m2. We use the following ratios, supplied by CEREN, to differentiate, in the total consumption, between main and auxiliary heating (data that can only be used in our model).

    | Energy | Share of consumption devoted to main heating
    |---------|-------------------------|
    | Wood 66% |
    | Joule electricity | 89% |
    | Heat pump electricity 74% |
    | Fuel oil | 94% |
    | Other energies | 100% |
      
    A few comments:
      
      1) There is a large number of air/air heat pumps that Ceren classifies as associated heating equipment, which explains the rate of 74%
      2) The 2024 data published by the SDES will show electricity heating consumption by Joule effect to be significantly higher than in 2023, following the overhaul of the consumption model by use.
  description.auto: |

    > ℹ️ This rule comes from the <a href="https://github.com/incubateur-ademe/publicodes-empreinte-carbone-chauffage">`@incubator-ademe/publicodes-carbon-footprint-heating`</a> model.


    This model is based on the Ceren and SDES dataset <a href="https://www.statistiques.developpement-durable.gouv.fr/consommation-denergie-par-usage-du-residentiel">Energy consumption by residential use</a>, for the year 2023.

    The SDES-CEREN excel gives us access to the surface area of dwellings by main energy source on the one hand, and total consumption by main and auxiliary energy on the other. Combining these data tends to increase consumption per m2. We use the following ratios, supplied by CEREN, to differentiate, in the total consumption, between main and auxiliary heating (data that can only be used in our model).

    | Energy | Share of consumption devoted to main heating
    |---------|-------------------------|
    | Wood 66% |
    | Joule electricity | 89% |
    | Heat pump electricity 74% |
    | Fuel oil | 94% |
    | Other energies | 100% |
      
    A few comments:
      
      1) There is a large number of air/air heat pumps that Ceren classifies as associated heating equipment, which explains the rate of 74%
      2) The 2024 data published by the SDES will show electricity heating consumption by Joule effect to be significantly higher than in 2023, following the overhaul of the consumption model by use.
  description.lock: |

    > ℹ️ Cette règle provient du modèle [`@incubateur-ademe/publicodes-empreinte-carbone-chauffage`](https://github.com/incubateur-ademe/publicodes-empreinte-carbone-chauffage).


    Ce modèle est basé sur le jeu de données du Ceren et SDES [Consommation d'énergie par usage du résidentiel](https://www.statistiques.developpement-durable.gouv.fr/consommation-denergie-par-usage-du-residentiel), pour l'année 2023.

    L'excel SDES-CEREN nous donne accès aux surfaces des logements par énergie dont c'est la source principale d'un côté et de la consommation totale par énergie principale et appoint de l'autre. Combiner ces données a tendance à augmenter la consommation par m2. Nous utilisons les ratios suivants, fournis par le CEREN, pour différencier, dans la consommation totale, ce qui relève du chauffage principal et de l'appoint (données utilisables uniquement dans notre modèle).

    | Énergie | Part de la conso dédiée au chauffage principal |
    |---------|-------------------------|
    | Bois | 66% |
    | Électricité Joule | 89% |
    | Électricité PAC | 74% |
    | Fioul | 94% |
    | Autres énergies | 100% |
      
    Quelques remarques:
      
      1) Il y a un nombre important de PAC AIR/AIR que le Ceren classe en équipement de chauffage associé, ce qui explique le taux de 74%
      2) Les données de 2024 publiées par le SDES feront apparaitre des consommations de chauffage d’électricité par effet Joule sensiblement supérieures à celles de 2023 suit à la refonte du modèle de consommation par usage.
