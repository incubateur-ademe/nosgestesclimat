  titre: Fingerprints associated with the animal's veterinary care
  titre.auto: Fingerprints associated with the animal's veterinary care
  titre.lock: Empreinte asociées aux soins vétérinaires de l'animal
  description: This figure, associated with the footprint corresponding to the animal's veterinary care, is derived by dividing the macro-economic footprint associated with veterinary care by the number of pets (excluding fish).
  description.auto: This figure, associated with the footprint corresponding to the animal's veterinary care, is derived by dividing the macro-economic footprint associated with veterinary care by the number of pets (excluding fish).
  description.lock: Ce chiffre, associé à l'empreinte correspondant aux soins vétérinaires de l'animal, est issu du prorata de l'empreinte macro-économique associées aux soins vétérinaires par le nombre d'animaux domestiques (hors poissons).
  note: |
    The idea is to start from the <a href="https://nosgestesclimat.fr/documentation/empreinte-branche/M75">macro-economic</a> footprint associated with the NAF M75 branch (Veterinary activities).
    INSEE gives <a href="https://www.insee.fr/fr/metadonnees/cpfr21/sousCategorie/75.00.11?champRecherche=false">this description</a>:
      - Medical, surgical and dental services provided to pets in veterinary clinics or elsewhere. The purpose of these services is to care for the animals, improve and/or stabilize their state of health.
      - Hospital services, laboratory services, technical services, food (including special diets), etc.

    According to the <a href="https://www.facco.fr/wp-content/uploads/2022/05/rapport-annuel-facco-2022pdf.pdf">FACCO annual report</a>, in 2020 France will have
    75 million pets.

    Assuming that fish do not benefit from veterinary care, we reach 49 million animals.
    We have also deducted backyard birds, which apparently do not require clinical care, bringing us to **35.7 million animals**.

    ![](https://user-images.githubusercontent.com/55186402/229517254-01e77c3d-acef-4053-9b8f-2931a6ce33a9.png)

    We can then deduce the average footprint of veterinary services per animal.
  note.auto: |
    The idea is to start from the <a href="https://nosgestesclimat.fr/documentation/empreinte-branche/M75">macro-economic</a> footprint associated with the NAF M75 branch (Veterinary activities).
    INSEE gives <a href="https://www.insee.fr/fr/metadonnees/cpfr21/sousCategorie/75.00.11?champRecherche=false">this description</a>:
      - Medical, surgical and dental services provided to pets in veterinary clinics or elsewhere. The purpose of these services is to care for the animals, improve and/or stabilize their state of health.
      - Hospital services, laboratory services, technical services, food (including special diets), etc.

    According to the <a href="https://www.facco.fr/wp-content/uploads/2022/05/rapport-annuel-facco-2022pdf.pdf">FACCO annual report</a>, in 2020 France will have
    75 million pets.

    Assuming that fish do not benefit from veterinary care, we reach 49 million animals.
    We have also deducted backyard birds, which apparently do not require clinical care, bringing us to **35.7 million animals**.

    ![](https://user-images.githubusercontent.com/55186402/229517254-01e77c3d-acef-4053-9b8f-2931a6ce33a9.png)

    We can then deduce the average footprint of veterinary services per animal.
  note.lock: |
    L'idée est de partir de l'empreinte de [l'empreinte macro-économique](https://nosgestesclimat.fr/documentation/empreinte-branche/M75) associée à la branche NAF M75 (Activités vétérinaires).
    L'INSEE donne [cette description](https://www.insee.fr/fr/metadonnees/cpfr21/sousCategorie/75.00.11?champRecherche=false):
      - Services médicaux, chirurgicaux et dentaires fournis à des animaux de compagnie dans des cliniques vétérinaires ou ailleurs. Ces services ont pour but de soigner les animaux, d'améliorer et/ou de stabiliser leur état de santé.
      - Services hospitaliers, services des laboratoires, services techniques, nourriture (y compris les régimes alimentaires spéciaux), etc.

    Par ailleurs, d'après le [rapport annuel FACCO](https://www.facco.fr/wp-content/uploads/2022/05/rapport-annuel-facco-2022pdf.pdf), la France comptait en 2020
    75 millions d'animaux domestiques.

    En faisant l'hypothèse que les poissons ne bénéficient pas de soins vétérinaires, on atteint 49 millions d'animaux.
    Nous avons également déduit les oiseaux de basse-cour qui semble-t-il n'ont pas besoin de soins cliniques, ce qui nous amène à **35,7 millions d'animaux**.

    ![](https://user-images.githubusercontent.com/55186402/229517254-01e77c3d-acef-4053-9b8f-2931a6ce33a9.png)

    On peut alors en déduire l'empreinte moyenne des services vétérinaires par animal.
