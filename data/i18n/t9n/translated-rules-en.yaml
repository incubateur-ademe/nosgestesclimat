divers . ameublement:
  note: |
    We only count the footprint of furniture manufacturing and distribution. So be careful not to confuse ADEME's LCA data
    data (which take into account the entire life cycle: from cradle to grave) and the Base Carbone's EFs, which only give the impact of a product's manufacture
    the impact of a product's manufacture (although the "distribution" phase is included in the EF).

    These EFs do not take into account the "end-of-life" phase, which is taken into account via <a href="https://nosgestesclimat.fr/documentation/alimentation/d%C3%A9chets">the NGC waste model</a> (which takes into account the quantities of waste taken to waste collection centers, where furniture is (theoretically) taken at the end of its life).

    We consider that all the furniture is used by the whole household, even if some of it may only be used individually, which is a limitation of the test.
