transport . voiture . usage au kilomètre calculé:
  note: |
    For the time being, we have not used the values from the GHG balance sheet database for hybrid cars, because they are complicated to interpret:
      - the "rechargeable hybrid" category has a surprisingly small footprint (on a par with electric cars), but above all it has 0 combustion emissions. So it's a petrol vehicle that doesn't use any petrol at all? [A recent topic] on the bilan-GES forum does not explain the inconsistency.
      - the difference between Prius full hybrid and P2 full hybrid is not explained
      - in these 2 categories, there is no entry-level model.

    The FNH-Carbone4 study could be used to calculate the footprint per km of plug-in hybrid vehicles. Here is the structuring hypothesis used:

    > Distribution of driving modes (combustion/electric) for hybrids: 50%/50% in 2016

    However, it is worth noting the recent controversy over the footprint of plug-in hybrid vehicles following <a href="https://www.transportenvironment.org/press/les-hybrides-rechargeables-au-cœur-d’un-nouveau-scandale-d’émissions-des-tests-révèlent-des">a study</a> by Transport & Environnement, which found that the actual footprint was incomparable to the footprint claimed by manufacturers.

    For the time being, therefore, we have used the calculation made by the MicMac calculator, which is the basis of Nos Gestes Climat, but unfortunately the source is inaccessible:

    > Hybrid: deduct 15% from the above consumption figures (source ADEME: http://www2.ademe.fr/servlet/KBaseShow?catid=13655)
  note.auto: |
    For the time being, we have not used the values from the GHG balance sheet database for hybrid cars, because they are complicated to interpret:
      - the "rechargeable hybrid" category has a surprisingly small footprint (on a par with electric cars), but above all it has 0 combustion emissions. So it's a petrol vehicle that doesn't use any petrol at all? [A recent topic] on the bilan-GES forum does not explain the inconsistency.
      - the difference between Prius full hybrid and P2 full hybrid is not explained
      - in these 2 categories, there is no entry-level model.

    The FNH-Carbone4 study could be used to calculate the footprint per km of plug-in hybrid vehicles. Here is the structuring hypothesis used:

    > Distribution of driving modes (combustion/electric) for hybrids: 50%/50% in 2016

    However, it is worth noting the recent controversy over the footprint of plug-in hybrid vehicles following <a href="https://www.transportenvironment.org/press/les-hybrides-rechargeables-au-cœur-d’un-nouveau-scandale-d’émissions-des-tests-révèlent-des">a study</a> by Transport & Environnement, which found that the actual footprint was incomparable to the footprint claimed by manufacturers.

    For the time being, therefore, we have used the calculation made by the MicMac calculator, which is the basis of Nos Gestes Climat, but unfortunately the source is inaccessible:

    > Hybrid: deduct 15% from the above consumption figures (source ADEME: http://www2.ademe.fr/servlet/KBaseShow?catid=13655)
  note.lock: |
    Pour la voiture hybride, nous n'avons pour l'instant pas utilisé les valeurs de la base bilan-GES, car elles sont compliquées à interpréter :
      - la catégorie "hybride rechargeable" a une empreinte étonnamment faible (du niveau de l'électrique), mais surtout 0 émission à la combustion. Ce serait donc un véhicule essence qui n'utilise pas d'essence à l'usage ? [Un sujet récent] sur le forum de bilan-GES n'explique pas l'incohérence.
      - la différence entre Hybride full Prius et Hybride full P2 n'est pas expliquée
      - dans ces 2 catégories, il n'y a pas l'entrée de gamme.

    L'étude FNH-Carbone4 pourrait être utilisée pour l'empreinte au km des véhicules hybrides rechargeables. Voici l'hypothèse structurante retenue :

    > Répartition des modes de roulage (thermique / électrique) pour les hybrides : 50% / 50% en 2016

    Mais on notera la controverse récente sur l'empreinte des véhicules hybrides rechargeable suite à [une étude](https://www.transportenvironment.org/press/les-hybrides-rechargeables-au-cœur-d’un-nouveau-scandale-d’émissions-des-tests-révèlent-des) de Transport & Environnement faisant état d'une empreinte réelle incomparable à l'empreinte annoncée par les constructeurs.

    Nous avons donc pour l'instant retenu le calcul du calculateur MicMac qui est la base de Nos Gestes Climat, dont la source est malheureusement inaccessible :

    > Hybride : enlever 15% aux consommations ci-dessus (source ADEME: http://www2.ademe.fr/servlet/KBaseShow?catid=13655)
