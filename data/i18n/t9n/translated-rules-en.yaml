    According to the study <a href="https://www.culture.gouv.fr/Media/Thematiques/Etudes-et-statistiques/Files/Publications/Culture-etudes/20212/Note-de-synthese-CREDOC">"Visiting museums, exhibitions and monuments in 2019"</a>,
    "69% of the population claim to have visited at least one monument, museum or exhibition".
    This figure is different from that found by summing up occasional and amateur visitors (which may exclude visitors to temporary exhibitions).
    What's more, it concerns people over the age of 18. So there's a slight bias here.
  note.lock: |
    D'après l'étude ["La visite des musées, expositions et monuments en 2019"](https://www.culture.gouv.fr/Media/Thematiques/Etudes-et-statistiques/Files/Publications/Culture-etudes/20212/Note-de-synthese-CREDOC),
    "69% de la population déclare avoir visité au moins un monument, un musée ou une exposition".
    Ce chiffre est différent de celui que l'on retrouve en sommant les visiteurs occasionnels et amateurs (qui excluent peut-être les visiteurs d'expositions temporaires).
    De plus, il concerne les personnes de plus de 18 ans. On a donc un léger biais ici.
