logement . chauffage . gaz . consommation estimée via le coût . facteur:
  titre: Cost per kWh of gas
  titre.auto: Cost per kWh of gas
  titre.lock: Coût du kWh de gaz
  note: |
    A priori, there is no API for this figure, so we are updating this value manually via its Best Before Date.
  note.auto: |
    A priori, there is no API for this figure, so we are updating this value manually via its Best Before Date.
  note.lock: |
    A priori, il n'existe pas d'API pour ce chiffre, nous mettons donc à jour cette valeur manuellement via sa Date Limite d'Utilisation Optimale.
  description: |
    This is the factor that enables us to go from the price paid by the household to consumption in kWh.

    There is no single price for a kWh of gas, because the price depends on the supplier, the offer chosen, the geographical area, etc.

    Nevertheless, we have decided to use the <a href="https://www.cre.fr/consommateurs/prix-reperes-et-references/prix-repere-de-vente-de-gaz-naturel-a-destination-des-clients-residentiels.html">benchmark gas price</a>, the reference tariff published monthly by the French Energy Regulatory Commission, as the basis for the subscription and the cost per kWh.

    Please note that the gas market is largely liberalised, so the benchmark price, which is the basis for our calculation, is not exclusive.

    The grid provided by CRE clearly shows a difference in rates between customers who use gas as their main source of heating or solely for cooking and domestic hot water.

    An average figure is also proposed, "based on current consumption assumptions, all consumers combined". For the sake of simplicity, we have chosen to use this figure in the simulator.
  description.auto: |
    This is the factor that enables us to go from the price paid by the household to consumption in kWh.

    There is no single price for a kWh of gas, because the price depends on the supplier, the offer chosen, the geographical area, etc.

    Nevertheless, we have decided to use the <a href="https://www.cre.fr/consommateurs/prix-reperes-et-references/prix-repere-de-vente-de-gaz-naturel-a-destination-des-clients-residentiels.html">benchmark gas price</a>, the reference tariff published monthly by the French Energy Regulatory Commission, as the basis for the subscription and the cost per kWh.

    Please note that the gas market is largely liberalised, so the benchmark price, which is the basis for our calculation, is not exclusive.

    The grid provided by CRE clearly shows a difference in rates between customers who use gas as their main source of heating or solely for cooking and domestic hot water.

    An average figure is also proposed, "based on current consumption assumptions, all consumers combined". For the sake of simplicity, we have chosen to use this figure in the simulator.
  description.lock: |
    C'est le facteur qui nous permet de passer du prix payé par le ménage à la consommation en kWh.

    Il n'existe pas de prix unique du kWh de gaz, car le prix dépend du fournisseur, de l'offre choisie, de la zone géographique, etc.

    Néanmoins, nous avons décidé de nous appuyer sur le [prix repère du gaz](https://www.cre.fr/consommateurs/prix-reperes-et-references/prix-repere-de-vente-de-gaz-naturel-a-destination-des-clients-residentiels.html), tarif de référence publié mensuellement par la Commission de Régulation de l'Énergie en France, pour l'abonnement et le coût du kWh.

    Attention, le marché du gaz est largement libéralisé, ainsi le prix repère, qui est la base de notre calcul, n'est pas exclusif.

    La grille mise à disposition par la CRE met bien en avant une différence de tarif entre les clients utilisant le gaz comme énergie principale de chauffage ou bien uniquement pour la cuisson et l'eau chaude sanitaire.

    Un chiffre moyen est également proposé, "selon les hypothèses actuelles de consommation, tous consommateurs confondus". C'est ce chiffre que nous avons choisi d'utiliser au sein du simulateur dans un souci de simplicité.
logement . chauffage . citerne propane . consommation estimée via le coût . facteur:
  titre: factor
  titre.auto: factor
  titre.lock: facteur
  note: |
