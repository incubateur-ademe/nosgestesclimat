logement . chauffage . installer une PAC:
  titre: Installing a heat pump
  titre.auto: Installing a heat pump
  titre.lock: Installer une pompe à chaleur
  description: |
    Replacing a heating system that uses fossil fuels (such as gas) with one that uses renewable energy can significantly reduce greenhouse gas emissions.

    > To find out more about the different heat pumps, their advantages and disadvantages, and to find out more about their costs, installation and maintenance, <a href="https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html">consult our guide</a>.
  description.auto: |
    Replacing a heating system that uses fossil fuels (such as gas) with one that uses renewable energy can significantly reduce greenhouse gas emissions.

    > To find out more about the different heat pumps, their advantages and disadvantages, and to find out more about their costs, installation and maintenance, <a href="https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html">consult our guide</a>.
  description.lock: |
    Remplacer un système de chauffage fonctionnant avec une énergie fossile (comme le gaz) par un système fonctionnant grâce à une énergie renouvelable permet de limiter de façon importante ses émissions de gaz à effet de serre.

    > Pour découvrir les différentes pompes à chaleur, leurs avantages et leurs inconvénients, en savoir plus sur leurs coûts, leur installation et leur entretien, [consultez notre guide](https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html).
  note: |
    For the moment, we consider that replacing kWh of gas with the same amount of kWh of electricity is a good first-order approximation. We can then adapt this to the performance of residential installations.

    This action involves replacing both the air heating system and the domestic hot water system. We are assuming that the heat pump installed is an air-to-water heat pump, which also heats domestic hot water, but this is not necessarily the case.

    See <a href="https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html">the ADEME guide to heat pumps</a>
  note.auto: |
    For the moment, we consider that replacing kWh of gas with the same amount of kWh of electricity is a good first-order approximation. We can then adapt this to the performance of residential installations.

    This action involves replacing both the air heating system and the domestic hot water system. We are assuming that the heat pump installed is an air-to-water heat pump, which also heats domestic hot water, but this is not necessarily the case.

    See <a href="https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html">the ADEME guide to heat pumps</a>
  note.lock: |
    Nous considérons pour l'instant que le remplacement des kWh de gaz par la même quantité de kWh électrique est une bonne approximation de premier ordre. Nous pourrons par la suite l'adapter en fonction du rendement des installations résidentielles.

    Cette action chiffre le remplacement du système de chauffage de l'air mais aussi de l'eau chaude sanitaire. Nous faisons le pari que la PAC installée est une PAC air-eau, qui chauffe aussi l'eau sanitaire, mais ce n'est pas nécessairement le cas.

    Voir [le guide ADEME sur les pompes à chaleur](https://librairie.ademe.fr/energies/7749-tout-comprendre-les-pompes-a-chaleur-9791029724145.html)
logement . chauffage . chauffe eau solaire . installer chauffe eau solaire:
  titre: Installing a solar water heater
  titre.auto: Installing a solar water heater
  titre.lock: S’équiper d’un chauffe-eau solaire
  description: |
    This is the simplest solar thermal solution to install. It can cover a large proportion of a home's hot water needs, and can also cut hot water costs by a factor of 2 or even 3 compared with an electric, gas or oil-fired system.

    > To find out more about the technology, how it works and installation costs, see <a href="https://librairie.ademe.fr/energies-renouvelables-reseaux-et-stockage/6136-adopter-le-solaire-thermique.html">our guide "Adopting solar thermal energy"</a>.
  description.auto: |
    This is the simplest solar thermal solution to install. It can cover a large proportion of a home's hot water needs, and can also cut hot water costs by a factor of 2 or even 3 compared with an electric, gas or oil-fired system.

    > To find out more about the technology, how it works and installation costs, see <a href="https://librairie.ademe.fr/energies-renouvelables-reseaux-et-stockage/6136-adopter-le-solaire-thermique.html">our guide "Adopting solar thermal energy"</a>.
  description.lock: |
    C'est la solution solaire thermique la plus simple à mettre en œuvre. Elle permet de couvrir une bonne partie des besoins d'eau chaude de la maison et permet également de diviser les dépenses d’eau chaude par 2 voire par 3 par rapport à un système électrique, au gaz ou au fioul.

    > Pour en savoir plus sur la technologie, son fonctionnement et les coûts d’installation, consultez [notre guide "Adopter le solaire thermique"](https://librairie.ademe.fr/energies-renouvelables-reseaux-et-stockage/6136-adopter-le-solaire-thermique.html).
