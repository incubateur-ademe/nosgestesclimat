logement . électricité verte:
  titre: Choosing a committed electricity offer
  titre.auto: Choosing a committed electricity offer
  titre.lock: Choisir une offre d'électricité engagée
  description: |-
    Certain offers encourage the development of renewable energy in our region.

    ### Here are some explanations to make things clearer

    At present, the vast majority of electricity offers in France are advertised as green. However, not all of them guarantee that the electricity purchased supports the production of renewable energy in France, as the term "green" might suggest.

    > How does it work?
    > Some electricity offers claim to be "green" because the supplier buys certificates, known as "guarantees of origin", from European producers of renewable electricity, whereas it buys the electricity (which will be resold to its customers) from another producer who uses gas, coal or any other non-renewable energy source to make the electricity.
    &gt
    > Having "guarantee of origin" certificates means that the electricity supplier can declare its offer to be green, regardless of how the electricity it sells to its customers is actually produced.
    &gt
    > This possibility is made possible by the operation of the European market in guarantee of origin certificates. These were created to encourage the development of renewable energies, but the system has reached its limits: in some cases, the certificates are bought from producers in distant countries who do not exchange electricity with France. It is therefore impossible for electricity generated from renewable sources to reach the homes of French consumers. What's more, the current very low price of the certificates does not really make it possible to finance the development of new renewable energy installations.
    &gt
    > In order to make the content of 'green' electricity offers more transparent and to help consumers, ADEME has decided to award a label (the Vervolt label) to offers where energy suppliers are linked to renewable energy producers in France for all the electricity they supply to their consumers.
    &gt
    > All the information on the Vervolt label and the committed or very committed energy offers <a href="https://agirpourlatransition.ademe.fr/particuliers/vertvolt">can be found here</a>.
    &gt
    > And if you want to find out more about the development of renewable energies in France, you can find out more <a href="https://librairie.ademe.fr/energies/7345-tout-comprendre-l-eolien-9791029723247.html">about wind power here</a> and <a href="https://librairie.ademe.fr/energies/7545-l-electricite-photovoltaique-en-10-questions-9791029721465.html">photovoltaics</a> <a href="https://librairie.ademe.fr/energies/7345-tout-comprendre-l-eolien-9791029723247.html">here</a> <a href="https://librairie.ademe.fr/energies/7545-l-electricite-photovoltaique-en-10-questions-9791029721465.html">
    </a>
  description.auto: |-
    Certain offers encourage the development of renewable energy in our region.

    ### Here are some explanations to make things clearer

    At present, the vast majority of electricity offers in France are advertised as green. However, not all of them guarantee that the electricity purchased supports the production of renewable energy in France, as the term "green" might suggest.

    > How does it work?
    > Some electricity offers claim to be "green" because the supplier buys certificates, known as "guarantees of origin", from European producers of renewable electricity, whereas it buys the electricity (which will be resold to its customers) from another producer who uses gas, coal or any other non-renewable energy source to make the electricity.
    &gt
    > Having "guarantee of origin" certificates means that the electricity supplier can declare its offer to be green, regardless of how the electricity it sells to its customers is actually produced.
    &gt
    > This possibility is made possible by the operation of the European market in guarantee of origin certificates. These were created to encourage the development of renewable energies, but the system has reached its limits: in some cases, the certificates are bought from producers in distant countries who do not exchange electricity with France. It is therefore impossible for electricity generated from renewable sources to reach the homes of French consumers. What's more, the current very low price of the certificates does not really make it possible to finance the development of new renewable energy installations.
    &gt
    > In order to make the content of 'green' electricity offers more transparent and to help consumers, ADEME has decided to award a label (the Vervolt label) to offers where energy suppliers are linked to renewable energy producers in France for all the electricity they supply to their consumers.
    &gt
    > All the information on the Vervolt label and the committed or very committed energy offers <a href="https://agirpourlatransition.ademe.fr/particuliers/vertvolt">can be found here</a>.
    &gt
    > And if you want to find out more about the development of renewable energies in France, you can find out more <a href="https://librairie.ademe.fr/energies/7345-tout-comprendre-l-eolien-9791029723247.html">about wind power here</a> and <a href="https://librairie.ademe.fr/energies/7545-l-electricite-photovoltaique-en-10-questions-9791029721465.html">photovoltaics</a> <a href="https://librairie.ademe.fr/energies/7345-tout-comprendre-l-eolien-9791029723247.html">here</a> <a href="https://librairie.ademe.fr/energies/7545-l-electricite-photovoltaique-en-10-questions-9791029721465.html">
    </a>
  description.lock: |
    Certaines offres favorisent le développement d'offres d'énergies renouvelables sur notre territoire.

    ### Quelques explications pour y voir plus clair

    Actuellement, en France, une grande majorité des offres d’électricité sont affichées comme vertes. Pourtant, toutes ne garantissent pas que l’électricité achetée soutient la production d’énergies renouvelables en France, comme le terme « vert » pourrait le laisser penser.

    > **Comment ça marche ?**
    > Certaines offres d’électricité se déclarent « vertes » car le fournisseur achète à des producteurs européens d’électricité renouvelable des certificats, appelés « garantie d’origine » alors qu’il achète l’électricité (qui sera revendue à ses clients) à un autre producteur utilisant du gaz, du charbon ou toute autre énergie non renouvelable pour fabriquer l’électricité.
    >
    > Le fait de posséder des certificats « garantie d’origine » permet donc au fournisseur d’électricité de déclarer son offre verte, peu importe comment est réellement fabriquée l’électricité qu’il vend à ses clients.
    >
    > Cette possibilité est permise par le fonctionnement du marché européen des certificats de garantie d’origine. Ils ont été créés pour favoriser le développement des énergies renouvelables mais ce système a monté des limites : dans certains cas, les certificats sont achetés à des producteurs dans des pays éloignés et qui n'échangent pas d’électricité avec la France. Il est donc impossible que l’électricité produite avec des énergies renouvelables atteigne le foyer des consommateurs français. De plus, le prix actuellement très bas des certificats ne permet pas vraiment de financer le développement de nouvelles installations d’énergies renouvelables.
    >
    > C’est pour rendre plus transparent le contenu des offres d’électricité « verte » et pour aider les consommateurs que l’ADEME a décidé d’attribuer un label (le label Vervolt) aux offres pour lesquelles les fournisseurs d’énergie sont liés à des producteurs d’énergies renouvelables en France sur la totalité de l’électricité qu’ils fournissent à leurs consommateurs.
    >
    > Toutes les infos sur le label VertVolt et les offres d'énergie engagées ou très engagées [sont à retrouver ici](https://agirpourlatransition.ademe.fr/particuliers/vertvolt).
    >
    > Et si vous voulez en savoir plus sur le développement des énergies renouvelables en France, ça se passe [ici pour l'éolien](https://librairie.ademe.fr/energies/7345-tout-comprendre-l-eolien-9791029723247.html) ou [là pour le photovoltaïque](https://librairie.ademe.fr/energies/7545-l-electricite-photovoltaique-en-10-questions-9791029721465.html)
