transport . voiture . voiture 5km:
  description: |
    In town, 40% of daily journeys made by car are less than 3 km long. In addition, these journeys are twice as polluting as journeys of greater distance: the fault lies in the extra fuel consumption when the engine is cold, or in the frequent stopping and restarting associated with city traffic.

    Cycling is just as fast as driving for distances of less than 5 km. Walking is also an excellent solution. It is the 2nd most popular mode of transport in France.

    > For even more solutions and to find out about the assistance available, <a href="https://agirpourlatransition.ademe.fr/particuliers/bureau/deplacements/changons-air-changeons-mobilite">see our article</a>.
