logement . vacances . locations . empreinte par nuit:
  titre: footprint per night
  titre.auto: footprint per night
  titre.lock: empreinte par nuit
  note: |
    These data are taken from the <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">Bilan des émissions de gaz à effet de serre du secteur du tourisme en France</a>.

    They represent a "top-down" approach. First, we assume that the surface areas provided by Airbnb in France are representative of seasonal rentals in the country. We then apply the emission factors from the carbon base corresponding to second homes in France to these surface areas. Finally, we apply an occupancy rate for seasonal rentals of 25%.
    Nos GEStes Climat usually takes a bottom-up approach: we start with usage, apply the emission factors and obtain a footprint.
    However, the bottom-up approach is very complex to implement here: it would involve asking the user a large number of questions (surface area, heating method for seasonal lets, etc.).
    The figure obtained by the top-down approach, 5.3 kg CO2 eq, is entirely consistent with the rest of the data available on other types of tourist accommodation, and seems to us to be a good start for approximating this complex data.
  note.auto: |
    These data are taken from the <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">Bilan des émissions de gaz à effet de serre du secteur du tourisme en France</a>.

    They represent a "top-down" approach. First, we assume that the surface areas provided by Airbnb in France are representative of seasonal rentals in the country. We then apply the emission factors from the carbon base corresponding to second homes in France to these surface areas. Finally, we apply an occupancy rate for seasonal rentals of 25%.
    Nos GEStes Climat usually takes a bottom-up approach: we start with usage, apply the emission factors and obtain a footprint.
    However, the bottom-up approach is very complex to implement here: it would involve asking the user a large number of questions (surface area, heating method for seasonal lets, etc.).
    The figure obtained by the top-down approach, 5.3 kg CO2 eq, is entirely consistent with the rest of the data available on other types of tourist accommodation, and seems to us to be a good start for approximating this complex data.
  note.lock: |
    Ces données sont issues du [Bilan des émissions de gaz à effet de serre du secteur du tourisme en France](https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html).

    Elles représentent une approche dite "top-down", que voici. On considère d'abord que les surfaces fournies par Airbnb en France sont représentatives de la location saisonnière dans le Pays. On applique à ces surfaces les facteurs d'émission de la base Carbone correspondant aux résidences secondaires en France. Enfin, on applique un taux d'occupation des locations saisonnières de 25%.
    L'approche de Nos GEStes Climat, habituellement, est plutôt "bottom-up" : nous partons de l'usage, appliquons les facteurs d'émission et obtenons une empreinte.
    Néanmoins, l'approche bottom-up est ici très complexe à implémenter : elle supposerait de poser une quantité importante de questions à l'utilisateur (surface, mode de chauffage des locations saisonnières louées...).
    Le chiffre obtenu par l'approche top-down, 5,3 kg éqCO2, est tout à fait cohérent avec le reste des données disponibles sur les autres types de logement touristiques, et nous paraît un bon début pour approximer cette donnée complexe.
