alimentation . déchets . composter:
  description: |
    Our bio-waste (peelings, leftovers from meals, garden maintenance, etc.) is now easy to recycle. It can be taken to collection points, placed in public spaces, taken to waste collection centres or composted at home or in the garden.

    > Discover useful tips in <a href="https://librairie.ademe.fr/dechets-economie-circulaire/5487-comment-reussir-son-compost--9791029719325.html">the "How to make a success of your compost" guide.</a>

    > You would like to get started, but don't know how? <a href="https://librairie.ademe.fr/7245-quel-equipement-pour-faire-son-compost-.html#/44-type_de_produit-format_electronique">This guide will help</a>.
  description.auto: |
    Our bio-waste (peelings, leftovers from meals, garden maintenance, etc.) is now easy to recycle. It can be taken to collection points, placed in public spaces, taken to waste collection centres or composted at home or in the garden.

    > Discover useful tips in <a href="https://librairie.ademe.fr/dechets-economie-circulaire/5487-comment-reussir-son-compost--9791029719325.html">the "How to make a success of your compost" guide.</a>

    > Would you like to get started, but don't know how? <a href="https://librairie.ademe.fr/7245-quel-equipement-pour-faire-son-compost-.html#/44-type_de_produit-format_electronique">This guide will help</a>.
  description.lock: |
    Nos biodéchets (épluchures, restes de repas, entretien du jardin, etc.) sont aujourd’hui faciles à valoriser. Ils peuvent être apportés dans des bornes de collecte, placés dans les espaces publics, apportés en déchèteries ou compostés à la maison ou dans le jardin.

    > Découvrez des conseils utiles dans [le guide « Comment réussir son compost »](https://librairie.ademe.fr/dechets-economie-circulaire/5487-comment-reussir-son-compost--9791029719325.html).

    > Vous souhaitez vous équiper, mais vous ne savez pas comment ? [Ce guide va vous aider](https://librairie.ademe.fr/7245-quel-equipement-pour-faire-son-compost-.html#/44-type_de_produit-format_electronique).
  titre: Compost
  titre.auto: Compost
  titre.lock: Composter
