transport . ferry:
  titre: Ferry
  titre.auto: Ferry
  titre.lock: Ferry
  description.auto: |
    The ferry model comes from <a href="https://futur.eco/ferry">Futur.eco</a>.
    This model is explained in simplified form on the <a href="https://nosgestesclimat.fr/documentation/transport/ferry/empreinte-par-km-volume">"Footprint per km and passenger"</a> page, and is based on an in-depth study <a href="https://hackmd.io/@laem/empreinte-ferry">(see the complete methodological note</a>)

    In order to simplify the assessment of the user's footprint, we propose an estimate based on travel time (in hours). We then set the other calculation parameters as such:
    - Cabin travel
    - One car on board
    - 2 people share cabin, car
    - Ferry model considered (layout, average speed): <a href="https://www.greenferries.org/ships/mega-express-four-9086590/">Mega Express Four</a>
  description.lock: |
    Le modèle ferry provient de [Futur.eco](https://futur.eco/ferry).
    Ce modèle est explicité de manière simplifiée sur la page ["Empreinte par km et passager"](https://nosgestesclimat.fr/documentation/transport/ferry/empreinte-par-km-volume), et basé sur une étude approfondie ([voir la note méthodo complète](https://hackmd.io/@laem/empreinte-ferry))

    Afin de simplifier pour l'utilisateur l'évaluation de son empreinte, nous proposons une estimation via la durée des voyages (en heure). Nous fixons ainsi les autres paramètres du calcul comme tels:
    - Voyage en cabine
    - Une voiture à bord
    - 2 personnes partagent la cabine, la voiture
    - Modèle de ferry considéré (plan, vitesse moyenne) : [Méga Express Four](https://www.greenferries.org/ships/mega-express-four-9086590/)
