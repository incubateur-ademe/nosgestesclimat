logement . chauffage . bois . fe granulés:
  titre: fe granules
  titre.auto: fe granules
  titre.lock: fe granulés
  note.auto: |
    Please note: there is no "generic validated" emission factor for pellets in the Empreinte database (the generic validated EF available does not correspond to use in an individual stove but in a heating network),
    we have opted for a "specific validated" emission factor (E+/C- initiative = Positive Energy and Carbon Reduction label), in order to ensure a degree of consistency for the user browsing the calculation model.
    However, E+/C- emissions factors are sometimes calculated according to rules that differ from those of the Empreinte database.
    It is therefore likely that this emission factor slightly underestimates the GHG impact of consuming one kWh of wood logs by not taking unburnt methane emissions into account.
  note.lock: |
    Attention : faute de facteur d'émission de statut "validé générique" pour les granulés dans la Base Empreinte (le FE valide générique disponible ne correspond pas à un usage dans un poêle individuel mais dans un réseau de chaleur),
    nous optons pour un facteur d'émission "validé spécifique" (initiative E+/C- = label Energie Positive et Réduction Carbone), afin d'assurer une certaine cohérence pour l'utilisateur parcourant le modèle de calcul.
    Cependant, les facteurs d'émissions E+/C- suivent des règles d'élaboration parfois différentes des règles de calcul de la Base Empreinte.
    Il est donc probable que ce facteur d'émission sous-estime légèrement l'impact GES de la consommation d'un kWh de bois bûche en ne prenant pas en compte les émissions de méthane imbrulé.
logement . chauffage . biogaz . intensité carbone:
  titre: Biogas emission factor
  titre.auto: Biogas emission factor
  titre.lock: Facteur d'émission du biogaz
  description: |
    We use HHV (Higher Calorific Value) rather than LHV (Lower Calorific Value), because HHV is used as a conversion coefficient in invoices to convert the volume of gas used into kWh:
    it is assumed that the gas boiler recovers the latent heat of condensation.

    Empreinte Base documentation: HCV/COI ratio = 1.111

    Footprint : Biomethane/Injected into networks/Average mix (in kWh NCV)
  description.auto: |
    We use HHV (Higher Calorific Value) rather than LHV (Lower Calorific Value), because HHV is used as a conversion coefficient in invoices to convert the volume of gas used into kWh:
    it is assumed that the gas boiler recovers the latent heat of condensation.

    Empreinte Base documentation: HCV/COI ratio = 1.111

    Footprint : Biomethane/Injected into networks/Average mix (in kWh NCV)
  description.lock: |
    On raisonne en PCS (Pouvoir Calorifique Supérieur) et non en PCI (Pouvoir Calorifique Inférieur), car le PCS est utilisé en tant que coefficient de conversion dans les factures pour convertir le volume de gaz utilisé en kWh :
    on fait l'hypothèse que la chaudière gaz récupère bien la chaleur latente de condensation.

    Documentation de la Base Empreinte: Rapport PCS/PCI = 1,111

    Base Empreinte : Biométhane/Injecté dans les réseaux/Mix moyen (en kWh PCI)
