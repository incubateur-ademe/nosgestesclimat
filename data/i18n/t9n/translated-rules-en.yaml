divers . électroménager . appareils . petit réfrigérateur . empreinte:
  titre: Small refrigerator footprint
  titre.auto: Small refrigerator footprint
  titre.lock: Empreinte petit réfrigérateur
  note: |
    As there is no emission factor for a small (sub-floor) fridge in the Empreinte database, we have chosen to consider its footprint to be equivalent to that of a half-cabinet size combined fridge.
    A sub-floor fridge has an average capacity of just over 100 litres, including 15 litres for freezing, compared with 200 + 80 litres for a combined fridge. It weighs between 25 and 35 kg, compared with 60 to 70 kg for a combined fridge.
  note.auto: |
    As there is no emission factor for a small (sub-floor) fridge in the Empreinte database, we have chosen to consider its footprint to be equivalent to that of a half-cabinet size combined fridge.
    A sub-floor fridge has an average capacity of just over 100 litres, including 15 litres for freezing, compared with 200 + 80 litres for a combined fridge. It weighs between 25 and 35 kg, compared with 60 to 70 kg for a combined fridge.
  note.lock: |
    Ne disposant pas de facteur d'émission pour un petit réfrigérateur (sous-plan) dans la base Empreinte, nous avons fait le choix de considérer que son empreinte était équivalente à celle d'un demi réfrigérateur combiné, format armoire.
    En effet, un frigo sous-plan a une capacité moyenne d'un peu plus de 100 litres, dont 15 en congélation, contre 200 + 80 côté réfrigérateur combiné. Son poids varie entre 25 et 35 kg, pour 60 à 70 du côté du réfrigérateur combiné.
