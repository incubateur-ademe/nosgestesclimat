alimentation . déchets . réduire gaspillage:
  description: |
    Every French person throws away around 30 kg of food every year, 7 kg of which is still packaged!

    Reducing food waste is essential if we are to avoid producing to throw away.

    > You can find more information and advice on how to avoid wasting food <a href="https://agirpourlatransition.ademe.fr/particuliers/conso/alimentation/pourquoi-gaspillons-autant-nourriture">here</a>

    > And if you're looking for recipes and tips, <a href="https://librairie.ademe.fr/agriculture-alimentation-foret-bioeconomie/7595-recettes-et-astuces-anti-gaspi.html">you'll find this guide very useful</a>!

    > Finally, if you prefer the infographic format, <a href="https://librairie.ademe.fr/consommer-autrement/1885-mieux-manger-moins-gaspiller-moins-polluer-.html#/44-type_de_produit-format_electronique">it's over here</a>.
  description.auto: |
