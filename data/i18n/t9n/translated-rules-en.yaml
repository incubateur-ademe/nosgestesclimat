transport . voiture . thermique . consommation estimée:
  titre: Estimated car consumption
  titre.auto: Estimated car consumption
  titre.lock: Consommation estimée voiture
  note: |
    > While we have worked on proposals for average consumption, the ideal situation, given the impact of this data, is for users to enter their own actual consumption, averaged over their usage.

    The calculation of average consumption is based on the ADEME <a href="https://carlabelling.ademe.fr/index/">Car Labelling</a> database. We have used the <a href="https://explore.data.gouv.fr/fr/datasets/607d3dfa434fd3f49e61436c/#/resources/e85bd68f-0690-4753-adb9-ce1f5eab7a58">raw data</a> directly via a script that extracts the average fuel consumption for each size and engine based on this mapping:

      - Body = COMBISPACE: "LCV"
      - Weight < 1400kg : "petite"
      - Poids 1400-1600kg: "moyenne"
      - Poids > 1600kg and Luxury or Superior range: "SUV"
      - Weight > 1600kg, other ranges: "Saloon"

    | Consumption if petrol in L/100km (actual) Consumption if diesel in L/100km (actual)
    | --- | --- | --- |
    | Small** | 5.46 L/100km (933) | 3.95 L/100km (92) |
    | Medium** | 6.49 L/100km (394) | 4.68 L/100km (174) |
    | LCV** | 6.34 L/100km (60) | 4.7 L/100km (82) |
    | Berline** (estate car) | 7.06 L/100km (75) | 6.16 L/100km (151) |
    **SUV** | 10.38 L/100km (119) | 5.55 L/100km (71) |

    This is the manufacturer's fuel consumption figure. In conjunction with ADEME's Transport Department, it has been decided to correct these figures using a factor that approximates actual fuel consumption on the basis of the manufacturer's fuel consumption figures.

    According to <a href="https://climate-energy.eea.europa.eu/topics/transport/real-world-emissions/data">EAA</a> (source provided by ADEME's transport department), we have:
      - Petrol: +21
      - Diesel: +17

    There is another limitation: this database contains data on recent vehicles, which are not necessarily representative of vehicles on the road.

    Finally, to obtain the fuel consumption of vehicles running on E85 petrol, we have applied an **overconsumption of 25%** compared with petrol vehicles, a figure that seems to be widely accepted.

    Similarly, to obtain the fuel consumption of vehicles running on LPG, we applied an **overconsumption of 15%** compared with petrol vehicles, except for LPG, for which we already have the data.
  note.auto: |
