    and <a href="https://librairie.ademe.fr/dechets-economie-circulaire/4804-la-collecte-des-dechets-par-le-service-public-en-france.html#/44-type_de_produit-format_electronique">Waste collection by the public service in France - Results and thematic zooms 2019 - ADEME 2021</a>
