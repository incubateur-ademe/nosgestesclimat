services sociétaux:
  abréviation: S. societal
  abréviation.auto: S. societal
  abréviation.lock: S. sociétaux
  description: |
    This item includes the footprint of French public services, and market services that can be considered essential to everyone's life, divided by the country's population.

    The first category "public services" includes for example the footprint of French hospitals, or justice. We consider that this footprint should be equally distributed for all citizens, because these are "republican" jobs that only democracy can make evolve, not directly by individual consumption choices

    The second category "market services" includes the telecommunications network (fiber, telephone, etc.), but also insurance and the post office. These are relatively universal services for which we do not yet have the details that would allow us to distribute the footprint according to the consumption choices of citizens.

    <RavijenChartSocietaux/>
  description.auto: |
    This item includes the footprint of French public services, and market services that can be considered essential to everyone's life, divided by the country's population.

    The first category "public services" includes for example the footprint of French hospitals, or justice. We consider that this footprint should be equally distributed for all citizens, because these are "republican" jobs that only democracy can make evolve, not directly by individual consumption choices.

    The second category "market services" includes the telecommunications network (fiber, telephone, etc.), but also insurance and the post office. These are relatively universal services for which we do not yet have the details that would allow us to distribute the footprint according to the consumption choices of citizens.

    <RavijenChartSocietaux/>
  description.lock: |
    Ce poste inclus l'empreinte des services publics français, et des services marchands que l'on peut considérer comme étant essentiels à la vie de chacun, divisées par la population du pays.

    La première catégorie "services publics" comprend par exemple l'empreinte des hôpitaux français, ou de la justice. Nous considérons que cette empreinte doit être également répartie pour tous les citoyens, car ce sont des postes "républicains" que seule la démocratie peut faire évoluer, pas directement par les choix de consommation individuels.

    La deuxième catégorie "services marchands" comprend notamment le réseau de télécommunications (fibre, téléphone, etc.), mais aussi les assurances ou encore la poste. Ce sont des services relativement universels pour lesquels nous n'avons pas encore le détail qui nous permettrait de répartir l'empreinte en fonction des choix de consommation des citoyens.

    <RavijenChartSocietaux/>
  note: |
    The model that enables us to calculate these two constants 'public services' and 'market services' is different from the rest of the Nos Gestes Climat model in that it is 'macroscopic'. It is a macroscopic reconstruction based on the volume of money exchanged in billions of euros by sector.

    The inclusion of this macro model makes it possible to hybridize the UCS model. We can therefore say that it is predominantly micro with a macro component.

    Our source for the two macro constants is the calculation of the French national footprint by the Ministry of Ecology. Here is the <a href="https://www.statistiques.developpement-durable.gouv.fr/lempreinte-carbone-de-la-france-de-1995-2021">most recent article</a>, which gives us an estimate of the national footprint of 8.9 tonnes in 2021. The figure is extrapolated with its share of additional uncertainties compared with the figure of 9.2 tonnes in 2018.

    To understand how this model works, see <a href="https://github.com/incubateur-ademe/nosgestesclimat/issues/1583">this explanation page</a>.
  note.auto: |
    The model that enables us to calculate these two constants 'public services' and 'market services' is different from the rest of the Nos Gestes Climat model in that it is 'macroscopic'. It is a macroscopic reconstruction based on the volume of money exchanged in billions of euros by sector.

    The inclusion of this macro model makes it possible to hybridize the UCS model. We can therefore say that it is predominantly micro with a macro component.

    Our source for the two macro constants is the calculation of the French national footprint by the Ministry of Ecology. Here is the <a href="https://www.statistiques.developpement-durable.gouv.fr/lempreinte-carbone-de-la-france-de-1995-2021">most recent article</a>, which gives us an estimate of the national footprint of 8.9 tonnes in 2021. The figure is extrapolated with its share of additional uncertainties compared with the figure of 9.2 tonnes in 2018.

    To understand how this model works, see <a href="https://github.com/incubateur-ademe/nosgestesclimat/issues/1583">this explanation page</a>.
  note.lock: |
    Le modèle qui nous permet de calculer ces deux constantes "services publics" et "services marchands" se distingue du reste du modèle Nos Gestes Climat car il est dit "macroscopique". C'est une reconstition macroscopique qui est basée sur les volumes d'échanges d'argent en milliard d'€ par secteurs.

    L'inclusion de ce modèle macro permet d'hybrider le modèle NGC. On peut ainsi dire qu'il est à dominante micro avec une composante macro.

    Notre source pour les deux constantes macro est le calcul de l'empreinte nationale française par le Ministère de l'Écologie. Voici [l'article le plus récent](https://www.statistiques.developpement-durable.gouv.fr/lempreinte-carbone-de-la-france-de-1995-2021), qui nous donne d'ailleurs une estimation de l'empreinte nationale de 8,9 tonnes en 2021. Le chiffre est extrapolé avec son lot d'incertitudes supplémentaires par rapport au chiffre de 9,2 tonnes en 2018.

    Pour comprendre comment ce modèle fonctionne, voir [cette page d'explication](https://github.com/incubateur-ademe/nosgestesclimat/issues/1583).
