  titre.auto: Average distance travelled by a French person on medium- and long-haul flights
  titre.lock: Distance moyenne parcourue un Français sur des vols moyen et long courrier
  note: |
    We are making a large approximation by assuming that the proportion of kilometres travelled by French people is the same as the proportion of French passengers.

    Furthermore, this figure is probably underestimated because it does not take into account journeys made by French people from foreign airports, particularly long-haul flights with stopovers or domestic flights abroad.
  note.auto: |
    We are making a large approximation by assuming that the proportion of kilometres travelled by French people is the same as the proportion of French passengers.

    Furthermore, this figure is probably underestimated because it does not take into account journeys made by French people from foreign airports, particularly long-haul flights with stopovers or domestic flights abroad.
  note.lock: |
    On fait une grosse approximation en considérant que la proportion des kilomètres parcourus par des français est la même que la proportion des passagers français.

    Par ailleurs, ce chiffre est sans doute sous-estimé car on ne prend pas en compte les trajets des français depuis les aéroports étrangers, notamment pour les vols long-courriers avec des escales ou bien les vols internes à l'étranger.
