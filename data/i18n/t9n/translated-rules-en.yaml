  titre: Carpooling to work
  titre.auto: Carpooling to work
  titre.lock: Aller au travail en covoiturage
  note: |
    See The Conversation article <a href="https://theconversation.com/a-quelles-conditions-le-covoiturage-sera-t-il-un-mode-de-transport-durable-124122">Under what conditions will car sharing be a sustainable mode of transport?</a>
  note.auto: |
    See The Conversation article <a href="https://theconversation.com/a-quelles-conditions-le-covoiturage-sera-t-il-un-mode-de-transport-durable-124122">Under what conditions will car sharing be a sustainable mode of transport?</a>
  note.lock: |
    Voir l'article The Conversation [À quelles conditions le covoiturage sera-t-il un mode de transport durable ?](https://theconversation.com/a-quelles-conditions-le-covoiturage-sera-t-il-un-mode-de-transport-durable-124122)
  description: |
    only 3% of daily journeys in France are made by carpooling. That's not very many, especially when you consider that 70% of home-to-work journeys are made using private vehicles.

    5 good reasons to try carpooling
      - It's good value for money: two, three or even four people, neighbours or colleagues, can divide their fuel costs by the number of passengers;
      - It's environmentally friendly: the private car alone accounts for over 15% of greenhouse gas emissions in France. Carpooling allows you to divide the number of CO2 emissions by the number of passengers. It also reduces pollutant emissions and therefore the impact on air quality;
      - It's socially responsible: carpooling is a solution with great potential, particularly in areas that are currently poorly served by public transport;
      - It's friendly: with colleagues, friends, neighbours and even strangers (thanks to existing car-sharing platforms), the journey is shorter..
      - Last but not least, car-sharing is a way of reducing traffic (and your stress).

    > To find out more about the support available to help you get started, <a href="https://agirpourlatransition.ademe.fr/particuliers/bureau/deplacements/covoiturage-bonnes-raisons-de-se-lancer">see our article</a>
  description.auto: |
    only 3% of daily journeys in France are made by carpooling. That's not very many, especially when you consider that 70% of home-to-work journeys are made using private vehicles.

    5 good reasons to try carpooling
      - It's good value for money: two, three or even four people, neighbours or colleagues, can divide their fuel costs by the number of passengers;
      - It's environmentally friendly: the private car alone accounts for over 15% of greenhouse gas emissions in France. Carpooling allows you to divide the number of CO2 emissions by the number of passengers. It also reduces pollutant emissions and therefore the impact on air quality;
      - It's socially responsible: carpooling is a solution with great potential, particularly in areas that are currently poorly served by public transport;
      - It's friendly: with colleagues, friends, neighbours and even strangers (thanks to existing car-sharing platforms), the journey is shorter..
      - Last but not least, car-sharing is a way of reducing traffic (and your stress).

    > To find out more about the support available to help you get started, <a href="https://agirpourlatransition.ademe.fr/particuliers/bureau/deplacements/covoiturage-bonnes-raisons-de-se-lancer">see our article</a>
  description.lock: |
    3 % seulement des déplacements quotidiens en France sont réalisés en covoiturage. C’est peu, surtout quand on sait que 70 % des déplacements domicile-travail sont réalisés au moyen de véhicules individuels.

    5 bonnes raisons de tenter le covoiturage
      - C’est économique : à deux, à trois voire à quatre, entre voisins ou entre collègues, c’est une opportunité de diviser ses frais de carburant par le nombre de passagers ;
      - C’est écologique : la voiture individuelle représente à elle seule plus de 15 % des émissions de gaz à effet de serre en France. Or, le covoiturage permet de diviser le nombre des émissions de CO2 par le nombre de voyageurs. Il réduit aussi les émissions de polluants et donc les impacts sur la qualité de l’air ;
      - C’est solidaire : le covoiturage est une solution pleine de potentiel, en particulier dans les zones aujourd’hui peu desservies par les transports en commun ;
      - C’est convivial : entre collègues, entre amis, entre voisins, et même entre inconnus (grâce aux plateformes de covoiturage existantes), la route est moins longue…
      - Dernier atout : le covoiturage constitue une solution pour réduire le trafic (et votre stress).

    > Pour en savoir plus sur les aides disponibles pour vous lancer, [consultez notre article](https://agirpourlatransition.ademe.fr/particuliers/bureau/deplacements/covoiturage-bonnes-raisons-de-se-lancer)
