  question: What clothes do you usually buy in a year (new or second-hand)?
  question.auto: What clothes do you usually buy in a year (new or second-hand)?
  question.lock: Quels vêtements achetez-vous en général dans une année (neufs ou de seconde main) ?
  description.auto: |
    At this stage, we exclude thrift shops, salvage and second-hand goods from the calculation.

    Purchases with a frequency of more than 2 years are considered negligible.
  description.lock: |
    À ce stade, nous excluons du calcul l'achat en friperies, la récupération, l'occasion.

    Les achats dont la fréquence est supérieure à 2 ans sont jugés comme négligeables.
  note.auto: |
    The carbon and water footprint data are taken from the <a href="https://ecobalyse.beta.gouv.fr/">Ecobalyse simulator</a> from ADEME.

    In this simulator, the differences between the footprints of more and less sustainable garments are reflected in <a href="https://fabrique-numerique.gitbook.io/ecobalyse/textile/durabilite">the sustainability index</a>. We have looked at calculating an 'average' sustainability index (see 'various . textiles . sustainability index').
  note.lock: |
    Les données d'empreinte carbone et eau sont issues du [simulateur Ecobalyse](https://ecobalyse.beta.gouv.fr/), de l'ADEME.

    Sur ce simulateur, les différences d'empreinte entre les empreintes des vêtements plus ou moins durables se retrouvent dans [l'indice de durabilité](https://fabrique-numerique.gitbook.io/ecobalyse/textile/durabilite). Nous nous sommes penchés sur le calcul d'un indice de durabilité "moyen" (voir `divers . textile . indice de durabilité`).
