divers . loisirs . culture . pratique de la musique . proportion de pratiquants:
  titre: proportion of practising
  titre.auto: proportion of practising
  titre.lock: proportion de pratiquants
  note: |
    According to <a href="https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf">this study</a>, 6% of French people play a musical instrument regularly. 31% have learned but no longer play or hardly play at all.
    This <a href="https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf">other study (unfortunately a little dated)</a> leads us to believe that as long as people have learned music, they own a musical instrument at home (same proportion of learners and owners).
    We can therefore estimate that 37% of French people own a musical instrument at home.
  note.auto: |
    According to <a href="https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf">this study</a>, 6% of French people play a musical instrument regularly. 31% have learned but no longer play or hardly play at all.
    This <a href="https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf">other study (unfortunately a little dated)</a> leads us to believe that as long as people have learned music, they own a musical instrument at home (same proportion of learners and owners).
    We can therefore estimate that 37% of French people own a musical instrument at home.
  note.lock: |
    D'après [cette étude](https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf), 6% des français pratiquent un instrument de musique régulièrement. 31% a appris mais ne pratique plus du tout ou quasiment plus du tout.
    Cette [autre étude (malheureusement un peu datée)](https://www.ifop.com/wp-content/uploads/2018/03/3933-1-study_file.pdf) nous porte à croire que pourvu que l'individu ait appris la musique, il possède chez lui un instrument de musique (même proportion d'apprenants et de possédants).
    Nous pouvons donc estimer que 37% des Français possèdent un instrument de musique chez eux.
