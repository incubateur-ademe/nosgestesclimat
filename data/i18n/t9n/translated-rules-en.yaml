logement . vacances . croisière . empreinte par nuit:
  titre: footprint per night
  titre.auto: footprint per night
  titre.lock: empreinte par nuit
  note: |
    A study published in September 2024 on <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">the impact of tourism in France in 2022</a> gives an emission factor for the footprint of a cruise of 103 kgCO2e/night (page 59).

    It seems that the calculations are based on the 2023 <a href="https://www.transportenvironment.org/articles/return-of-the-cruise">"Return of the cruise"</a> study, which deducts the fuel combustion footprint from all the journeys made by 176 cruise ships. The details are not transparent, but the study indicates that the footprint per overnight stay covers operations, catering (excluding food on board), leisure activities and energy.

    At first glance, this is in line with what we have read elsewhere, with YachtCO2Tracker calculating a 107 kgCO2e/night for Icon of the Seas. However, <a href="https://www.researchgate.net/publication/280008702_A_Life_Cycle_Assessment_of_the_Environmental_Impact_of_Cruise_Holidays">another (American) study</a> puts the figure at almost 200 kgCO2e/night. Nonetheless, with double counting of transport to destination and food (but these are not the most important items).
  note.auto: |
    A study published in September 2024 on <a href="https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html">the impact of tourism in France in 2022</a> gives an emission factor for the footprint of a cruise of 103 kgCO2e/night (page 59).

    It seems that the calculations are based on the 2023 <a href="https://www.transportenvironment.org/articles/return-of-the-cruise">"Return of the cruise"</a> study, which deducts the fuel combustion footprint from all the journeys made by 176 cruise ships. The details are not transparent, but the study indicates that the footprint per overnight stay covers operations, catering (excluding food on board), leisure activities and energy.

    At first glance, this is in line with what we have read elsewhere, with YachtCO2Tracker calculating a 107 kgCO2e/night for Icon of the Seas. However, <a href="https://www.researchgate.net/publication/280008702_A_Life_Cycle_Assessment_of_the_Environmental_Impact_of_Cruise_Holidays">another (American) study</a> puts the figure at almost 200 kgCO2e/night. Nonetheless, with double counting of transport to destination and food (but these are not the most important items).
  note.lock: |
    Une étude sortie en septembre 2024 sur [l’impact du tourisme en France en 2022](https://librairie.ademe.fr/changement-climatique/7637-bilan-des-emissions-de-gaz-a-effet-de-serre-du-secteur-du-tourisme-en-france-en-2022.html) donne un facteur d’émission pour l’empreinte d’une croisière de 103 kgCO2e/nuitée (page 59).

    Il semble que les calculs se basent sur l'étude 2023 ["Return of the cruise"](https://www.transportenvironment.org/articles/return-of-the-cruise) permettant de déduire de l'ensemble des trajets de 176 navires de croisière, l'empreinte liées à la combustion des carburants. Le détail n'est pas transparent mais l'étude indique que l'empreinte par nuitée couvre l'exploitation, la restauration (hors alimentation à bord), les loisirs, l'énergie.

    À première vue, il correspond à ce que nous avions pu lire par ailleurs, avec YachtCO2Tracker qui avait calculé un 107 kgCO2e/nuitée pour Icon of the Seas. Par contre, [une autre étude (américaine)](https://www.researchgate.net/publication/280008702_A_Life_Cycle_Assessment_of_the_Environmental_Impact_of_Cruise_Holidays) affiche plutôt un presque 200 kgCO2e/nuitée. Néanmoins, avec un double compte de transport vers destination et nourriture (mais ce ne sont pas les postes les plus importants).
