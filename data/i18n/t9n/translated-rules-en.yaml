  description: |
    Direct" water is the water that comes out of your tap every day.
    We are not talking here about the **virtual** water that hides behind your food or your consumer goods.
  description.auto: |
    Direct" water is the water that comes out of your tap every day.
    We are not talking here about the **virtual** water that hides behind your food or your consumer goods.
  description.lock: |
    L'eau **directe** correspond à l'eau qui sort de votre robinet au quotidien.
    Il n'est donc pas question ici de l'eau **virtuelle** qui se cache derrière votre alimentation ou vos biens de consommation.
  note: |
    The values associated with this calculation are taken from various sources and from the <a href="https://www.cieau.com/le-metier-de-leau/usages-consommation-conseils/calculateur-consommation-eau-annuelle/">CIEAU</a> (Centre d'Information sur l'EAU) <a href="https://www.cieau.com/le-metier-de-leau/usages-consommation-conseils/calculateur-consommation-eau-annuelle/">simulator</a>.

    According to a number of information sites (unfortunately not sourced), the theoretical breakdown of water consumption is as follows:

    | Use | Share |
    | ---------------- | -------- |
    | Baths and showers | 39% |
    | Toilets | 20% |
    | Linen | 12% |
    | Dishes | 10% |
    | Car / garden | 6% |
    | Kitchen 6% |
    | Drink | 1% |
    | Other 6% |

    Depending on seasonality and geography, domestic water consumption can be subject to major tensions. In France too, water is <a href="https://agirpourlatransition.ademe.fr/particuliers/eau-ressource-a-preserver">a resource to be preserved. Find out how and why with ADEME</a>.
  note.auto: |
    The values associated with this calculation are taken from various sources and from the <a href="https://www.cieau.com/le-metier-de-leau/usages-consommation-conseils/calculateur-consommation-eau-annuelle/">CIEAU</a> (Centre d'Information sur l'EAU) <a href="https://www.cieau.com/le-metier-de-leau/usages-consommation-conseils/calculateur-consommation-eau-annuelle/">simulator</a>.

    According to a number of information sites (unfortunately not sourced), the theoretical breakdown of water consumption is as follows:

    | Use | Share |
    | ---------------- | -------- |
    | Baths and showers | 39% |
    | Toilets | 20% |
    | Linen | 12% |
    | Dishes | 10% |
    | Car / garden | 6% |
    | Kitchen 6% |
    | Drink | 1% |
    | Other 6% |

    Depending on seasonality and geography, domestic water consumption can be subject to major tensions. In France too, water is <a href="https://agirpourlatransition.ademe.fr/particuliers/eau-ressource-a-preserver">a resource to be preserved. Find out how and why with ADEME</a>.
  note.lock: |
    Les valeurs associées à ce calcul sont tirées de sources diverses et du [simulateur du CIEAU](https://www.cieau.com/le-metier-de-leau/usages-consommation-conseils/calculateur-consommation-eau-annuelle/) (Centre d'Information sur l'EAU).

    Selon de nombreux site d'information (mais non sourcés malheureusement), la répartition théorique de la consommation d'eau est la suivante :

    |      Usage       |   Part   |
    | ---------------- | -------- |
    | Bains et douches | 39%      |
    | Toilettes        | 20%      |
    | Linge            | 12%      |
    | Vaisselle        | 10%      |
    | Voiture / jardin | 6%       |
    | Cuisine          | 6%       |
    | Boisson          | 1%       |
    | Autres           | 6%       |

    Selon la saisonnalité et la géographie, la consommation d'eau domestique peut être sujette à de grandes tensions. En France aussi, l'eau est [une ressource à préserver, découvrez comment et pourquoi avec l'ADEME](https://agirpourlatransition.ademe.fr/particuliers/eau-ressource-a-preserver).
