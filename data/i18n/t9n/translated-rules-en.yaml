  description: |
    Adopting a vegetarian diet, with no meat or fish but eggs, milk, cheese and yoghurt, will significantly reduce the greenhouse gas emissions generated by your diet.

    Include <a href="https://agirpourlatransition.ademe.fr/particuliers/conso/alimentation/pourquoi-faut-manger-plus-legumineuses">more legumes in your menus</a>. They will provide you with vegetable proteins.

    > To find ideas for recipes based on pulses, <a href="https://librairie.ademe.fr/consommer-autrement/1768-recettes-des-4-saisons-a-base-de-legumes-et-legumineuses.html">consult our recipe book</a>

    To find out how to prepare pulses, see <a href="https://librairie.ademe.fr/economie-circulaire-et-dechets/5831-les-legumes-secs-aux-petits-oignons.html">our infographic</a>.

