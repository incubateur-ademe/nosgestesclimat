    For this item, we are using the data provided by ADEME's SoNum service, in particular:
      - Equipment LCA data, which can be downloaded from the Empreinte Base website (Documentation section > 2- AE - Référentiels sectoriels & Echelles > Numérique). This data is also available via the publicodes model <a href="https://github.com/incubateur-ademe/publicodes-acv-numerique">@incubateur-ademe/publicodes-acv-numerique</a>.
      - The <a href="https://www.arcep.fr/cartes-et-donnees/nos-publications-chiffrees/barometre-du-numerique/le-barometre-du-numerique-edition-2025.html">digital barometer</a>, piloted by Arcep in particular, providing data on the spread of digital equipment (number of devices in households), changes in their use and perceptions of their environmental footprint.
  description.auto: |
    For this item, we are using the data provided by ADEME's SoNum service, in particular:
