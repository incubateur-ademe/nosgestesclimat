divers . textile:
  titre: textile
  titre.auto: textile
  titre.lock: textile
  note: |
    The carbon and water footprint data are taken from ADEME's <a href="https://ecobalyse.beta.gouv.fr/">Ecobalyse simulator</a>(version 7.2.0). This latest version significantly increases the footprint of clothing. This change is linked to the switch to Agribalyse 3.2. With Agribalyse 3.1, there was a WTU patch that had been hard-coded into the EF3.1 method for a long time, and which originated from errors in Agribalyse 3.1. This WTU patch also modified the ecoinvent impacts.

    Since we switched to Agribalyse 3.2, this WTU patch has been removed, and we've gone back to the original version of EF 3.1, resulting in the following changes:

    - Ethiopia's electricity has decreased by 91
    - brazil's electricity increased by 31
    - peru's electricity has increased by 115
    - organic cotton increased by 35
    - flax has increased by 45
  note.auto: |
    The carbon and water footprint data are taken from ADEME's <a href="https://ecobalyse.beta.gouv.fr/">Ecobalyse simulator</a>(version 7.2.0). This latest version significantly increases the footprint of clothing. This change is linked to the switch to Agribalyse 3.2. With Agribalyse 3.1, there was a WTU patch that had been hard-coded into the EF3.1 method for a long time, and which originated from errors in Agribalyse 3.1. This WTU patch also modified the ecoinvent impacts.

    Since we switched to Agribalyse 3.2, this WTU patch has been removed, and we've gone back to the original version of EF 3.1, resulting in the following changes:

    - Ethiopia's electricity has decreased by 91
    - brazil's electricity increased by 31
    - peru's electricity has increased by 115
    - organic cotton increased by 35
    - flax has increased by 45
  note.lock: |
    Les données d'empreinte carbone et eau sont issues du [simulateur Ecobalyse](https://ecobalyse.beta.gouv.fr/), de l'ADEME (version 7.2.0). Cette dernière version augmente l'empreinte des vêtements de manière importante. Ce changement est lié au passage à Agribalyse 3.2. Avec Agribalyse 3.1, il y avait un patch WTU ajouté en dur depuis longtemps dans la méthode EF3.1, et qui prenait son origine dans des erreurs d'Agribalyse 3.1. Or ce patch WTU modifiait aussi les impacts ecoinvent.

    Depuis qu'on est passé à Agribalyse 3.2, ce patch WTU a été supprimé, et on est repassé à la version originale d'EF 3.1. et a engendré les changements suivants:

    - L'électricité d'Ethiopie a diminué de 91%
    - celle du Brésil a augmenté de 31%
    - celle du Pérou a augmenté de 115%
    - le coton bio a augmenté de 35%
    - le lin a augmenté de 45%
