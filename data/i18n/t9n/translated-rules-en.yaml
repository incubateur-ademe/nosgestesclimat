logement . chauffage . précision consommation . ressenti:
  titre: feelings
  titre.auto: feelings
  titre.lock: ressenti
  question: How do you feel about the thermal comfort of your home in winter?
  question.auto: How do you feel about the thermal comfort of your home in winter?
  question.lock: Quel est votre ressenti sur le confort thermique de votre logement en hiver ?
  description: |
    If you live in a region where heating is not necessary, ask the same question about how it feels in summer, with air conditioning for example.
  description.auto: |
    If you live in a region where heating is not necessary, ask the same question about how it feels in summer, with air conditioning for example.
  description.lock: |
    Si vous vivez dans une région où il n'est pas nécessaire de chauffer, transposez la question sur le ressenti en été, avec la climatisation par exemple.
  note: |
    The idea is to use this variable to weight the estimated consumption of an average dwelling by the actual consumption of the French housing stock, assuming an average DPE in France of D. In this way, the average consumption value can be adjusted by a jump in class from D to A or from D to G, depending on the user's perception.
  note.auto: |
    The idea is to use this variable to weight the estimated consumption of an average dwelling by the actual consumption of the French housing stock, assuming an average DPE in France of D. In this way, the average consumption value can be adjusted by a jump in class from D to A or from D to G, depending on the user's perception.
  note.lock: |
    L'idée est d'utiliser cette variable pour pondérer les consommations d'un logement moyen estimées via les consommations réelles du parc français, en considérant un DPE moyen en France à D. Ainsi, on peut ajuster la valeur moyenne de consommation avec un saut de classe de D vers A ou de D vers G selon le ressenti de l'utilisateur.
