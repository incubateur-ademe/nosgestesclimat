alimentation:
  abréviation: alim.
  abréviation.auto: alim.
  abréviation.lock: alim.
  description: |
    What we eat, and to a lesser extent what we drink, has a major influence on our footprint.

    We use Agribalyse data to estimate the impact of our meals.

    ## Climate footprint

    The first factor is the quantity of meat and dairy products:
      - the production of a kilo of meat emits CO₂, but also other gases (such as methane) that warm the climate much more quickly
      - the animals have to be fed on cereals that we could have eaten ourselves, which are often the result of deforestation.

    Contrary to what we often hear, the distance travelled by our food, the seasonal nature of fruit and vegetables, and the amount of plastic packaging are of secondary importance.

    ## Water footprint

    The water footprint of food is very important, because agriculture is particularly water-intensive. According to current data, the footprint between vegetarian and meat meals is not so different because of the large footprint of the average side dish (vegetables, starches) in each type of meal, which smoothes out the differences between them.
  description.auto: |
    What we eat, and to a lesser extent what we drink, has a major influence on our footprint.

    We use Agribalyse data to estimate the impact of our meals.

    ## Climate footprint

    The first factor is the quantity of meat and dairy products:
      - the production of a kilo of meat emits CO₂, but also other gases (such as methane) that warm the climate much more quickly
      - the animals have to be fed on cereals that we could have eaten ourselves, which are often the result of deforestation.

    Contrary to what we often hear, the distance travelled by our food, the seasonal nature of fruit and vegetables, and the amount of plastic packaging are of secondary importance.

    ## Water footprint

    The water footprint of food is very important, because agriculture is particularly water-intensive. According to current data, the footprint between vegetarian and meat meals is not so different because of the large footprint of the average side dish (vegetables, starches) in each type of meal, which smoothes out the differences between them.
  description.lock: |
    Ce que l'on mange, et dans une moindre mesure ce que l'on boit, influence largement notre empreinte.

    Nous nous basons sur les données Agribalyse pour estimer l'impact de nos repas.

    ## Empreinte climat

    La premier facteur est la quantité de viande et de laitages :
      - la production d'un kilo de viande émet du CO₂, mais aussi d'autres gaz (comme le méthane) qui réchauffent le climat bien plus rapidement
      - il faut nourrir les animaux avec des productions céréalières que l'on aurait pu manger nous-même, souvent issues de la déforestation.

    Contrairement à ce que l'on entend souvent, la distance parcourue par nos aliments, le caractère de saison des fruits et légumes, et la quantité d'emballages plastique sont au second plan.

    ## Empreinte eau

    L'empreinte eau de l'alimentation est très importante, car l'agriculture est particulèrement consommatrice d'eau. Selon les données actuelles, l'empreinte entre les repas végétariens et carnés ne sont pas si différentes du fait de l'empreinte importante de l'accompagnement moyen (légumes, féculents) dans chacun des types de repas qui lisse les différences entre ces derniers.
  titre: Food
  titre.auto: Power supply
  titre.lock: Alimentation
