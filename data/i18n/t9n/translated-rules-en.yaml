divers . aider les autres:
  description: |
    If your footprint falls below 4.5 tonnes of CO2e, or if certain constraints make progress impossible, you can still do one more thing: help those around you to reduce their greenhouse gas emissions.

    How can you do this? By spreading the word about this simulator, discussing environmental issues with your friends and family, and running workshops in companies or associations.

    > Find ideas for everyday action on <a href="https://agirpourlatransition.ademe.fr/particuliers/">the ADEME solutions website</a>.
