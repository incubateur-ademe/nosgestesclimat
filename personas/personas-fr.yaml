personas . corentin:
  nom: Corentin
  résumé: |
    Corentin est étudiant en région parisienne. Il a peu de budget et se déplace en scooter.
  description: |
    Corentin a 22 ans et vit en région parisienne, à Pantin, seul dans un appartement de 25 m². Il est étudiant et se rend à l'école en scooter thermique. 
    Il a assez peu de moyens. En conséquence, il achète très peu de viande, et tout d'occasion (sauf les vêtements, mais il en achète peu). 
    Pour ses vacances, il rend visite à sa famille. Son plaisir en été, ce sont les festivals, et généralement il campe dans la région avec ses amis.
