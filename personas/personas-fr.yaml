personas . sylviane:
  nom: Sylviane
  résumé: |
    Retraitée, 70 ans. Vit seule à la campagne (Bretagne) dans la maison de famille mal isolée.
  description: |
    Sylviane vit seule dans la maison qu'elle a partagée avec son conjoint puis avec ses enfants, à Sainte-Anne-sur-Vilaine (en Bretagne). Aujourd'hui, ils sont tous partis et la maison est trop frande pour elle (110 m²). Elle a besoin de rénovation qui a débuté avec l'isolation. Elle ne connaît pas ses consommations énergétiques. Elle possède un chauffe-eau solaire.
    Pour ses déplacements, relativement rares, elle a une vieille voiture thermique. Elle prend parfois l'autocar.
    Elle n'est pas spécialement engagée pour l'environnement mais a toujours prêté une grande attention au gaspillage, et n'a jamais consommmé beaucoup de viande (plat de fêtes).
    Elle consomme neuf, mais très peu. Elle fait de courts séjours chaque année chez ses enfants, et pratique la randonnée.
