personas . sandy:
  nom: Sandy
  icônes: 🏡👩‍👦‍👦
  résumé: |
    Sandy est maman solo de deux enfants. Maison (périphérie de Caen). Très dépendants de la voiture.
  description: |
    Sandy a deux enfants de 7 et 10 ans. Elle vit dans une maison de 105 m² des années 70 en lotissement, à Mondeville (en banlieue de Caen). Sa maison est chauffée au gaz. 
    Elle utilise des bouteilles de gaz également.
    Elle utilise beaucoup sa voiture (20 000km) par an pour aller au travail, et pour amener les enfants à l'école et à leurs activités. 
    En vacances, ils partent avec leur vieille caravane. Sandy a peu de loisirs et fait peu d'achats, par manque de temps et de moyens.
    Sandy fume de temps en temps, en soirée ou autour d'un café (pas plus d'un paquet par semaine)
