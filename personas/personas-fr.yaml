  nom: Nolan
  résumé: |
    Lycéen. Habite avec sa famille dans une maison près de Toulouse. Fait du rugby et va souvent au cinéma.
  description: |
    Nolan est lycéen, c'est l'ainé d'une fratrie de deux enfants. Sa mère est anglaise. Pour le petit-déjeuner, son côté anglais ressort. 
    Il vit avec son frère et ses parents à Auzeville-Tolozane (en banlieue de Toulouse) dans une maison de 120 m². 
    Il utilise les transports en commun pour aller au lycée et à ses activités (le rugby, les sorties avec les copains, dont le cinéma) et se fait parfois transporter par ses parents en voiture.
    Il mange de tout. Achète quelques trucs neufs, surtout de l'électronique, avec ses économies. En vacances, ils passent un mois sur la côte dans leur appartement vers Biarritz.
