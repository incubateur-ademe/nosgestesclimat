personas . mehdi:
  nom: Mehdi
  résumé: Papa de 3 enfants. Voiture électrique. Maison neuve en Picardie. Branché viande et tech.
  description: |
    Mehdi a 50 ans, il est marié et ils ont trois enfants. Il vit à Tartigny (en Picardie) dans une maison récente de 210 m² avec piscine (chauffée trois mois dans l'année).
    Pour ses déplacements, il a acheté il y a deux ans une voiture électrique. Il possède aussi une trottinette électrique qu'il utilise à l'occasion.
    Mehdi aime beaucoup la viande, il est branché tech, aime posséder les dernières technologies. En vacances, ils partent l'été en famille au Club Med deux semaines, dans un pays différent à chaque fois (en avion), et passent 2 semaines l'hiver dans leur appartement dans les Alpes.
    Mehdi possède un bateau à moteur de 200 CV avec lequel il s'adonne à sa passion : le ski-nautique (sur lac).
